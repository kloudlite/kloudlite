{{- if .Values.ociInstaller.enabled }}
{{- $tag := .Values.ociInstaller.image.tag | default .Values.global.imageTag }}
---
# This is a reference Job template. Console creates Job instances dynamically.
# This manifest validates the spec and can be used for dry-run testing.
apiVersion: batch/v1
kind: Job
metadata:
  name: oci-installer-template
  labels:
    app: oci-installer
    {{- include "kloudlite.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.ociInstaller.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.ociInstaller.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: oci-installer
    spec:
      restartPolicy: Never
      containers:
        - name: oci-installer
          image: "{{ .Values.ociInstaller.image.repository }}:{{ $tag }}"
          resources:
            {{- toYaml .Values.ociInstaller.resources | nindent 12 }}
          env:
            - name: JOB_NAMESPACE
              value: {{ .Release.Namespace }}
{{- end }}
