{{- if .Values.console.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: console
  labels:
    app: console
    {{- include "kloudlite.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: console-job-manager
  labels:
    app: console
    {{- include "kloudlite.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: console-job-manager
  labels:
    app: console
    {{- include "kloudlite.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: console
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: console-job-manager
  apiGroup: rbac.authorization.k8s.io
{{- end }}
