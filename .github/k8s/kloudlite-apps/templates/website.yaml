{{- if .Values.website.enabled }}
{{- $tag := .Values.website.image.tag | default .Values.global.imageTag }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  labels:
    app: website
    {{- include "kloudlite.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.website.replicas }}
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: website
      containers:
        - name: website
          image: "{{ .Values.website.image.repository }}:{{ $tag }}"
          ports:
            - containerPort: {{ .Values.website.port }}
              name: http
          resources:
            {{- toYaml .Values.website.resources | nindent 12 }}
          env:
            {{- range $key, $val := .Values.website.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- if .Values.website.secretRef }}
          envFrom:
            - secretRef:
                name: {{ .Values.website.secretRef }}
                optional: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.website.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.website.port }}
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: website
  labels:
    app: website
    {{- include "kloudlite.labels" . | nindent 4 }}
spec:
  selector:
    app: website
  ports:
    - port: 80
      targetPort: {{ .Values.website.port }}
      protocol: TCP
      name: http

{{- if .Values.website.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: website
  labels:
    app: website
    {{- include "kloudlite.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.website.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  number: 80
{{- end }}
{{- end }}
