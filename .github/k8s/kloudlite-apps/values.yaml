global:
  registry: ghcr.io/kloudlite/kloudlite
  imageTag: "IMAGE_TAG"  # replaced at deploy time

console:
  enabled: true
  replicas: 2
  image:
    repository: ghcr.io/kloudlite/kloudlite/console
    tag: ""  # defaults to global.imageTag
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    host: console.kloudlite.io
  env:
    NODE_ENV: production
    PORT: "3000"
    OCI_INSTALLER_JOB_NAME: oci-installer
  # Additional secrets loaded from K8s Secret "console-secrets"
  secretRef: console-secrets

website:
  enabled: true
  replicas: 2
  image:
    repository: ghcr.io/kloudlite/kloudlite/website
    tag: ""  # defaults to global.imageTag
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    host: kloudlite.io
  env:
    NODE_ENV: production
    PORT: "3000"
  secretRef: website-secrets

ociInstaller:
  enabled: true
  image:
    repository: ghcr.io/kloudlite/kloudlite/oci-installer
    tag: ""  # defaults to global.imageTag
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
