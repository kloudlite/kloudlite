name: "Build Docker Image"

on:
  workflow_call:
    inputs:
      app:
        description: 'App to build'
        required: true
        type: string
      tag:
        description: 'Image tag'
        required: true
        type: string
      is_nightly:
        description: 'Whether this is a nightly build'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ inputs.app }}
    runs-on: ubuntu-latest

    concurrency:
      group: docker-${{ inputs.app }}-${{ inputs.tag }}
      cancel-in-progress: true

    steps:
      - name: Resolve app config
        id: app
        run: |
          APP="${{ inputs.app }}"

          case "${APP}" in
            platform-controller)
              BUILD_TYPE="go"
              BUILD_CMD="CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ./bin/api-server ./cmd/server"
              DOCKERFILE="./api/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="platform-controller"
              ;;
            tunnel-server)
              BUILD_TYPE="go"
              BUILD_CMD='CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ./bin/tunnel-server ./cmd/tunnel-server'
              DOCKERFILE="./api/cmd/tunnel-server/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="tunnel-server"
              ;;
            workmachine-node-manager)
              BUILD_TYPE="go"
              BUILD_CMD="CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ./bin/workmachine-node-manager ./cmd/workmachine-node-manager"
              DOCKERFILE="./api/Dockerfile.workmachine-node-manager"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="workmachine-node-manager"
              ;;
            wm-ingress-controller)
              BUILD_TYPE="go"
              BUILD_CMD='CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ./bin/wm-ingress ./cmd/wm-ingress-controller'
              DOCKERFILE="./api/cmd/wm-ingress-controller/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="wm-ingress-controller"
              ;;
            oci-installer)
              BUILD_TYPE="go"
              BUILD_CMD='CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ./bin/oci-installer ./cmd/kli/oci-installer'
              DOCKERFILE="./api/cmd/kli/oci-installer/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="oci-installer"
              ;;
            code-analyzer)
              BUILD_TYPE="go"
              BUILD_CMD='CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ./bin/code-analyzer ./cmd/code-analyzer'
              DOCKERFILE="./api/cmd/code-analyzer/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="code-analyzer"
              ;;
            k3s-backup)
              BUILD_TYPE="docker-only"
              BUILD_CMD=""
              DOCKERFILE="./api/Dockerfile.k3s-backup"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="k3s-backup"
              ;;
            workspace-base)
              BUILD_TYPE="docker-only"
              BUILD_CMD=""
              DOCKERFILE="./api/workspace-images/base/Dockerfile"
              DOCKER_CONTEXT="./api/workspace-images/base"
              IMAGE_SUFFIX="workspace-base"
              ;;
            workspace-comprehensive)
              BUILD_TYPE="workspace-comprehensive"
              BUILD_CMD='CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o bin/kl-linux cmd/kl/main.go'
              DOCKERFILE="./api/workspace-images/comprehensive/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="workspace-comprehensive"
              ;;
            console)
              BUILD_TYPE="web"
              BUILD_CMD="bun run --filter console build"
              DOCKERFILE="./web/apps/console/Dockerfile.runtime"
              DOCKER_CONTEXT="./web/apps/console"
              IMAGE_SUFFIX="console"
              ;;
            dashboard)
              BUILD_TYPE="web"
              BUILD_CMD="bun run --filter dashboard build"
              DOCKERFILE="./web/apps/dashboard/Dockerfile.runtime"
              DOCKER_CONTEXT="./web/apps/dashboard"
              IMAGE_SUFFIX="dashboard"
              ;;
            website)
              BUILD_TYPE="web"
              BUILD_CMD="bun run --filter website build"
              DOCKERFILE="./web/apps/website/Dockerfile.runtime"
              DOCKER_CONTEXT="./web/apps/website"
              IMAGE_SUFFIX="website"
              ;;
            *)
              echo "::error::Unknown app: ${APP}"
              exit 1
              ;;
          esac

          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "build_cmd=${BUILD_CMD}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "docker_context=${DOCKER_CONTEXT}" >> "$GITHUB_OUTPUT"
          echo "image_suffix=${IMAGE_SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Prepare docker tags
        id: docker_tags
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ github.repository }}/${{ steps.app.outputs.image_suffix }}"
          TAGS="${IMAGE_BASE}:${{ inputs.tag }}"

          if [ "${{ inputs.is_nightly }}" = "true" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_BASE}:nightly"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Go setup ─────────────────────────────────────────────────────
      - name: Set up Go
        if: steps.app.outputs.build_type == 'go' || steps.app.outputs.build_type == 'workspace-comprehensive'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: api/go.sum

      - name: Build Go binary
        if: steps.app.outputs.build_type == 'go'
        run: |
          cd api
          mkdir -p bin
          ${{ steps.app.outputs.build_cmd }}
          ls -lh ./bin/

      - name: Build kl binary
        if: steps.app.outputs.build_type == 'workspace-comprehensive'
        run: |
          cd api
          mkdir -p bin
          ${{ steps.app.outputs.build_cmd }}
          ls -lh bin/kl-linux

      # ── Bun setup (web apps) ─────────────────────────────────────────
      - name: Setup Bun
        if: steps.app.outputs.build_type == 'web'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        if: steps.app.outputs.build_type == 'web'
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            web/apps/*/node_modules
            web/packages/*/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v3-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v3-

      - name: Install web dependencies
        if: steps.app.outputs.build_type == 'web'
        working-directory: web
        run: bun install

      - name: Create build-time env file
        if: steps.app.outputs.build_type == 'web'
        run: |
          APP="${{ inputs.app }}"
          case "$APP" in
            console)
              cat > web/apps/console/.env.local << 'EOF'
          NEXT_PUBLIC_BASE_URL=https://console.kloudlite.io
          NEXT_PUBLIC_CONSOLE_URL=https://console.kloudlite.io
          NEXT_PUBLIC_INSTALLATION_DOMAIN=khost.dev
          NEXT_PUBLIC_TURNSTILE_SITE_KEY=0x4AAAAAACVzkPXwxkSHKMwt
          NEXT_PUBLIC_SUPABASE_URL=https://vsrhxnpsxpqlyyetvrhy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder
          EOF
              ;;
            dashboard)
              cat > web/apps/dashboard/.env.local << 'EOF'
          NEXT_PUBLIC_BASE_URL=https://dashboard.kloudlite.io
          NEXT_PUBLIC_SUPABASE_URL=https://vsrhxnpsxpqlyyetvrhy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder
          NEXT_PUBLIC_GITHUB_CLIENT_ID=placeholder
          NEXT_PUBLIC_GOOGLE_CLIENT_ID=placeholder
          NEXT_PUBLIC_MICROSOFT_ENTRA_CLIENT_ID=placeholder
          NEXT_PUBLIC_MICROSOFT_ENTRA_TENANT_ID=placeholder
          EOF
              ;;
            website)
              cat > web/apps/website/.env.local << 'EOF'
          NEXT_PUBLIC_BASE_URL=https://kloudlite.io
          EOF
              ;;
          esac

      - name: Cache Next.js build
        if: steps.app.outputs.build_type == 'web'
        uses: actions/cache@v4
        with:
          path: |
            web/apps/${{ inputs.app }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ inputs.app }}-${{ hashFiles('web/bun.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ inputs.app }}-${{ hashFiles('web/bun.lock') }}-

      - name: Build web app
        if: steps.app.outputs.build_type == 'web'
        working-directory: web
        run: ${{ steps.app.outputs.build_cmd }}
        env:
          NODE_ENV: production

      # ── Docker build+push ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: inputs.app != 'workspace-comprehensive'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.app.outputs.docker_context }}
          file: ${{ steps.app.outputs.dockerfile }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app }}
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build and push workspace-comprehensive image
        if: inputs.app == 'workspace-comprehensive'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.app.outputs.docker_context }}
          file: ${{ steps.app.outputs.dockerfile }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app }}
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}/workspace-base:${{ inputs.tag }}
            VERSION=${{ inputs.tag }}
            BUILDKIT_INLINE_CACHE=1

      - name: Build summary
        if: always()
        run: |
          echo "### Docker Build: ${{ inputs.app }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **App** | \`${{ inputs.app }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tag** | \`${{ inputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ github.repository }}/${{ steps.app.outputs.image_suffix }}:${{ inputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
