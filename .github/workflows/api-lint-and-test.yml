name: API Lint and Test

on:
  push:
    branches:
      - master
      - development
    paths:
      - 'api/**'
      - '.github/workflows/api-lint-and-test.yml'
  pull_request:
    branches:
      - master
      - development
    paths:
      - 'api/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-vet:
    name: Go Vet
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: api/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Detect changed packages
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="HEAD^"
          fi

          # Get changed Go files
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT $BASE_REF HEAD | grep '\.go$' | grep '^api/' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No Go files changed, skipping go vet"
            echo "packages=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract unique package paths
          PACKAGES=$(echo "$CHANGED_FILES" | xargs -I {} dirname {} | sort -u | sed 's|^api/|./|' || true)

          if [ -z "$PACKAGES" ]; then
            echo "packages=" >> $GITHUB_OUTPUT
          else
            echo "Changed packages:"
            echo "$PACKAGES"
            # Convert to space-separated list
            PACKAGES_LIST=$(echo "$PACKAGES" | tr '\n' ' ')
            echo "packages=$PACKAGES_LIST" >> $GITHUB_OUTPUT
          fi

      - name: Run go vet on changed packages
        if: steps.changed.outputs.packages != ''
        run: |
          PACKAGES="${{ steps.changed.outputs.packages }}"
          if [ -n "$PACKAGES" ]; then
            echo "Running go vet on: $PACKAGES"
            go vet $PACKAGES
          fi

  go-fmt:
    name: Go Format Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: api/go.sum

      - name: Detect changed Go files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="HEAD^"
          fi

          # Get changed Go files relative to api directory
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT $BASE_REF HEAD | grep '\.go$' | grep '^api/' | sed 's|^api/||' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No Go files changed, skipping go fmt"
            echo "files=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed Go files:"
          echo "$CHANGED_FILES"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run go fmt check on changed files
        if: steps.changed.outputs.files != ''
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -n "$FILES" ]; then
            echo "Checking formatting for:"
            echo "$FILES"

            UNFORMATTED=$(echo "$FILES" | xargs gofmt -s -l || true)

            if [ -n "$UNFORMATTED" ]; then
              echo "The following files need formatting:"
              echo "$UNFORMATTED"
              exit 1
            fi

            echo "✓ All changed files are properly formatted"
          fi

  test:
    name: Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - ./cmd/server/...
          - ./cmd/kl/...
          - ./cmd/workmachine-node-manager/...
          - ./cmd/tunnel-server/...
          - ./cmd/wm-ingress-controller/...
          - ./cmd/code-analyzer/...
          - ./internal/controllers/...
          - ./internal/handlers/...
          - ./internal/middleware/...
          - ./internal/repository/...
          - ./internal/services/...
          - ./internal/webhooks/...
          - ./pkg/...

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: api/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -coverprofile=coverage-${{ strategy.job-index }}.out -timeout=2m ${{ matrix.package }}
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: ./api/coverage-${{ strategy.job-index }}.out
          flags: api-${{ strategy.job-index }}
        continue-on-error: true

  race-test:
    name: Race Detection
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: api/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run race detector on critical packages
        run: go test -race -timeout=5m ./internal/controllers/... ./internal/services/...
        continue-on-error: true
