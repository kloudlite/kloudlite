name: Build, Push and Deploy Web

on:
  push:
    branches:
      - master
      - development
    paths:
      - 'web/**'
      - '.github/workflows/build-and-push-web.yml'
  pull_request:
    branches:
      - master
      - development
    paths:
      - 'web/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # Build all apps using matrix strategy
  build-and-push:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        app: [console, dashboard, website]
        include:
          - app: console
            base_url_secret: REGISTER_BASE_URL
            base_url_default: 'https://console.kloudlite.io'
            api_url_secret: API_URL
            api_url_default: 'https://api.kloudlite.io'
          - app: dashboard
            base_url_secret: REGISTER_BASE_URL
            base_url_default: 'https://register.kloudlite.io'
          - app: website
            base_url_secret: ''
            base_url_default: 'https://kloudlite.io'

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            web/apps/*/node_modules
            web/packages/*/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v3-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v3-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create environment file for console
        if: matrix.app == 'console'
        run: |
          cat > apps/console/.env.local << EOF
          # Base URL
          NEXT_PUBLIC_BASE_URL=${{ secrets.REGISTER_BASE_URL || 'https://console.kloudlite.io' }}

          # API URL
          NEXT_PUBLIC_API_URL=${{ secrets.API_URL || 'https://api.kloudlite.io' }}

          # OAuth Configuration (GitHub)
          GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}

          # OAuth Configuration (Google)
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

          # OAuth Configuration (Microsoft Entra)
          MICROSOFT_ENTRA_CLIENT_ID=${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}
          MICROSOFT_ENTRA_CLIENT_SECRET=${{ secrets.MICROSOFT_ENTRA_CLIENT_SECRET }}
          MICROSOFT_ENTRA_TENANT_ID=${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}

          # NextAuth Configuration
          AUTH_SECRET=${{ secrets.AUTH_SECRET || 'build-time-secret-will-be-overridden-at-runtime' }}
          NEXTAUTH_URL=${{ secrets.REGISTER_BASE_URL || 'https://console.kloudlite.io' }}

          # Supabase Configuration
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Cloudflare Configuration
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_DNS_DOMAIN=${{ secrets.CLOUDFLARE_DNS_DOMAIN || 'khost.dev' }}
          CLOUDFLARE_ORIGIN_CA_KEY=${{ secrets.CLOUDFLARE_ORIGIN_CA_KEY }}

          # Installation Domain
          NEXT_PUBLIC_INSTALLATION_DOMAIN=${{ secrets.CLOUDFLARE_DNS_DOMAIN || 'khost.dev' }}
          EOF

      - name: Create environment file for dashboard
        if: matrix.app == 'dashboard'
        run: |
          cat > apps/dashboard/.env.local << EOF
          # Base URL
          NEXT_PUBLIC_BASE_URL=${{ secrets.REGISTER_BASE_URL || 'https://register.kloudlite.io' }}

          # OAuth Configuration (GitHub)
          NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
          AUTH_GITHUB_ID=${{ secrets.GITHUB_CLIENT_ID }}
          AUTH_GITHUB_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}

          # OAuth Configuration (Google)
          NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

          # OAuth Configuration (Microsoft Entra)
          NEXT_PUBLIC_MICROSOFT_ENTRA_CLIENT_ID=${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}
          NEXT_PUBLIC_MICROSOFT_ENTRA_TENANT_ID=${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}
          AUTH_MICROSOFT_ENTRA_ID=${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}
          AUTH_MICROSOFT_ENTRA_SECRET=${{ secrets.MICROSOFT_ENTRA_CLIENT_SECRET }}
          AUTH_MICROSOFT_ENTRA_TENANT_ID=${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}

          # NextAuth Configuration
          AUTH_SECRET=${{ secrets.AUTH_SECRET || 'build-time-secret-will-be-overridden-at-runtime' }}
          NEXTAUTH_URL=${{ secrets.REGISTER_BASE_URL || 'https://register.kloudlite.io' }}

          # Supabase Configuration
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Cloudflare Configuration
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_DNS_DOMAIN=${{ secrets.CLOUDFLARE_DNS_DOMAIN || 'khost.dev' }}
          CLOUDFLARE_ORIGIN_CA_KEY=${{ secrets.CLOUDFLARE_ORIGIN_CA_KEY }}
          EOF

      - name: Create environment file for website
        if: matrix.app == 'website'
        run: |
          cat > apps/website/.env.local << EOF
          # Base URL
          NEXT_PUBLIC_BASE_URL=https://kloudlite.io

          # NextAuth Configuration
          AUTH_SECRET=${{ secrets.AUTH_SECRET || 'build-time-secret-will-be-overridden-at-runtime' }}
          NEXTAUTH_URL=https://kloudlite.io
          EOF

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            web/apps/${{ matrix.app }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ matrix.app }}-${{ hashFiles('web/bun.lock') }}-${{ hashFiles(format('web/apps/{0}/**/*.js', matrix.app), format('web/apps/{0}/**/*.jsx', matrix.app), format('web/apps/{0}/**/*.ts', matrix.app), format('web/apps/{0}/**/*.tsx', matrix.app)) }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ matrix.app }}-${{ hashFiles('web/bun.lock') }}-

      - name: Build app
        run: bun run --filter ${{ matrix.app }} build
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web-${{ matrix.app }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web/apps/${{ matrix.app }}
          file: ./web/apps/${{ matrix.app }}/Dockerfile.runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }},ignore-error=true

      - name: Build summary
        run: |
          echo "### ${{ matrix.app }} Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runtime**: Bun" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Lint Check
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            web/apps/*/node_modules
            web/packages/*/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v3-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v3-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint:all
        continue-on-error: true

  # Deploy Website to Azure
  deploy-website:
    name: Deploy Website to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    permissions:
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA:0:7}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/web-website:${IMAGE_TAG}"

          echo "Deploying Website image: $IMAGE"

          az containerapp update \
            --name ca-kloudlite-website \
            --resource-group rg-kloudlite-registration \
            --image $IMAGE \
            --query "properties.provisioningState" -o tsv

      - name: Deployment Summary
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA:0:7}"

          echo "### Azure Deployment Summary (Website)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Azure Container Apps (Central India)" >> $GITHUB_STEP_SUMMARY
          echo "- **Container App**: ca-kloudlite-website" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- **Public URL**: https://kloudlite.io" >> $GITHUB_STEP_SUMMARY

  # Deploy Console to Azure (registration app)
  deploy-console:
    name: Deploy Console to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    permissions:
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA:0:7}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/web-console:${IMAGE_TAG}"

          echo "Deploying Console image: $IMAGE"

          az containerapp update \
            --name ca-kloudlite-registration \
            --resource-group rg-kloudlite-registration \
            --image $IMAGE \
            --query "properties.provisioningState" -o tsv

      - name: Deployment Summary
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA:0:7}"

          echo "### Azure Deployment Summary (Console)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Azure Container Apps (Central India)" >> $GITHUB_STEP_SUMMARY
          echo "- **Container App**: ca-kloudlite-registration" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- **Public URL**: https://console.kloudlite.io" >> $GITHUB_STEP_SUMMARY
