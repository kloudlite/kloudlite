name: Build and Push Web Docker Images

on:
  push:
    branches:
      - master
      - development
    paths:
      - 'web/**'
      - '.github/workflows/build-and-push-web.yml'
  pull_request:
    branches:
      - master
      - development
    paths:
      - 'web/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.mode }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        mode: [registration, dashboard, website]

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ matrix.mode }}-${{ hashFiles('web/pnpm-lock.yaml') }}-${{ hashFiles('web/**/*.ts', 'web/**/*.tsx', 'web/**/*.js', 'web/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ matrix.mode }}-${{ hashFiles('web/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-${{ matrix.mode }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create environment file
        run: |
          cat > .env.local << EOF
          # App Mode
          NEXT_PUBLIC_APP_MODE=${{ matrix.mode }}
          APP_MODE=${{ matrix.mode }}

          # Base URL
          NEXT_PUBLIC_BASE_URL=${{ secrets.REGISTER_BASE_URL || 'https://register.kloudlite.io' }}

          # OAuth Configuration (GitHub)
          NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
          AUTH_GITHUB_ID=${{ secrets.GITHUB_CLIENT_ID }}
          AUTH_GITHUB_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}

          # OAuth Configuration (Google)
          NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

          # OAuth Configuration (Microsoft Entra)
          NEXT_PUBLIC_MICROSOFT_ENTRA_CLIENT_ID=${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}
          NEXT_PUBLIC_MICROSOFT_ENTRA_TENANT_ID=${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}
          AUTH_MICROSOFT_ENTRA_ID=${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}
          AUTH_MICROSOFT_ENTRA_SECRET=${{ secrets.MICROSOFT_ENTRA_CLIENT_SECRET }}
          AUTH_MICROSOFT_ENTRA_TENANT_ID=${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}

          # NextAuth Configuration
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.REGISTER_BASE_URL || 'https://register.kloudlite.io' }}

          # Supabase Configuration
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Cloudflare Configuration
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_DNS_DOMAIN=${{ secrets.CLOUDFLARE_DNS_DOMAIN || 'khost.dev' }}
          EOF

      - name: Build Next.js application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Verify standalone output
        run: |
          if [ ! -d ".next/standalone" ]; then
            echo "Error: .next/standalone directory not found"
            echo "Make sure next.config.ts has output: 'standalone'"
            exit 1
          fi
          echo "Standalone build size:"
          du -sh .next/standalone
          echo "Static files size:"
          du -sh .next/static

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web/${{ matrix.mode }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.mode }}
          cache-to: type=gha,mode=max,scope=${{ matrix.mode }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_MODE=${{ matrix.mode }}

      - name: Build summary
        run: |
          echo "### Build Summary - ${{ matrix.mode }} mode" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: ${{ matrix.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version**: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint
        continue-on-error: true

      - name: Run Prettier check
        run: pnpm run format:check
        continue-on-error: true
