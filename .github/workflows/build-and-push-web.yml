name: Build, Push and Deploy Web

on:
  push:
    branches:
      - master
      - development
    paths:
      - 'web/**'
      - '.github/workflows/build-and-push-web.yml'
  pull_request:
    branches:
      - master
      - development
    paths:
      - 'web/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  # Build Console App
  build-console:
    name: Build Console
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            web/apps/console/node_modules
            web/packages/*/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create environment file
        run: |
          cat > apps/console/.env.local << EOF
          # Base URL
          NEXT_PUBLIC_BASE_URL=${{ secrets.REGISTER_BASE_URL || 'https://console.kloudlite.io' }}

          # API URL
          NEXT_PUBLIC_API_URL=${{ secrets.API_URL || 'https://api.kloudlite.io' }}

          # NextAuth Configuration
          AUTH_SECRET=${{ secrets.AUTH_SECRET || 'build-time-secret-will-be-overridden-at-runtime' }}
          NEXTAUTH_URL=${{ secrets.REGISTER_BASE_URL || 'https://console.kloudlite.io' }}
          EOF

      - name: Cache Next.js build (console)
        uses: actions/cache@v4
        with:
          path: |
            web/apps/console/.next/cache
          key: ${{ runner.os }}-nextjs-console-${{ hashFiles('web/pnpm-lock.yaml') }}-${{ hashFiles('web/apps/console/**/*.js', 'web/apps/console/**/*.jsx', 'web/apps/console/**/*.ts', 'web/apps/console/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-console-${{ hashFiles('web/pnpm-lock.yaml') }}-

      - name: Build Console app
        run: pnpm --filter console build
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web-console
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Console image
        uses: docker/build-push-action@v5
        with:
          context: ./web/apps/console
          file: ./web/apps/console/Dockerfile.runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=console
          cache-to: type=gha,mode=max,scope=console

      - name: Build summary
        run: |
          echo "### Console Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: Console" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version**: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Build Dashboard App
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            web/apps/dashboard/node_modules
            web/packages/*/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create environment file
        run: |
          cat > apps/dashboard/.env.local << EOF
          # Base URL
          NEXT_PUBLIC_BASE_URL=${{ secrets.REGISTER_BASE_URL || 'https://register.kloudlite.io' }}

          # OAuth Configuration (GitHub)
          NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
          AUTH_GITHUB_ID=${{ secrets.GITHUB_CLIENT_ID }}
          AUTH_GITHUB_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}

          # OAuth Configuration (Google)
          NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

          # OAuth Configuration (Microsoft Entra)
          NEXT_PUBLIC_MICROSOFT_ENTRA_CLIENT_ID=${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}
          NEXT_PUBLIC_MICROSOFT_ENTRA_TENANT_ID=${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}
          AUTH_MICROSOFT_ENTRA_ID=${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}
          AUTH_MICROSOFT_ENTRA_SECRET=${{ secrets.MICROSOFT_ENTRA_CLIENT_SECRET }}
          AUTH_MICROSOFT_ENTRA_TENANT_ID=${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}

          # NextAuth Configuration
          AUTH_SECRET=${{ secrets.AUTH_SECRET || 'build-time-secret-will-be-overridden-at-runtime' }}
          NEXTAUTH_URL=${{ secrets.REGISTER_BASE_URL || 'https://register.kloudlite.io' }}

          # Supabase Configuration
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Cloudflare Configuration
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_DNS_DOMAIN=${{ secrets.CLOUDFLARE_DNS_DOMAIN || 'khost.dev' }}
          CLOUDFLARE_ORIGIN_CA_KEY=${{ secrets.CLOUDFLARE_ORIGIN_CA_KEY }}
          EOF

      - name: Cache Next.js build (dashboard)
        uses: actions/cache@v4
        with:
          path: |
            web/apps/dashboard/.next/cache
          key: ${{ runner.os }}-nextjs-dashboard-${{ hashFiles('web/pnpm-lock.yaml') }}-${{ hashFiles('web/apps/dashboard/**/*.js', 'web/apps/dashboard/**/*.jsx', 'web/apps/dashboard/**/*.ts', 'web/apps/dashboard/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-dashboard-${{ hashFiles('web/pnpm-lock.yaml') }}-

      - name: Build Dashboard app
        run: pnpm --filter dashboard build
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web-dashboard
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./web/apps/dashboard
          file: ./web/apps/dashboard/Dockerfile.runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

      - name: Build summary
        run: |
          echo "### Dashboard Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version**: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Build Website App
  build-website:
    name: Build Website
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            web/apps/website/node_modules
            web/packages/*/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create environment file
        run: |
          cat > apps/website/.env.local << EOF
          # Base URL
          NEXT_PUBLIC_BASE_URL=https://kloudlite.io

          # NextAuth Configuration
          AUTH_SECRET=${{ secrets.AUTH_SECRET || 'build-time-secret-will-be-overridden-at-runtime' }}
          NEXTAUTH_URL=https://kloudlite.io
          EOF

      - name: Cache Next.js build (website)
        uses: actions/cache@v4
        with:
          path: |
            web/apps/website/.next/cache
          key: ${{ runner.os }}-nextjs-website-${{ hashFiles('web/pnpm-lock.yaml') }}-${{ hashFiles('web/apps/website/**/*.js', 'web/apps/website/**/*.jsx', 'web/apps/website/**/*.ts', 'web/apps/website/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-website-${{ hashFiles('web/pnpm-lock.yaml') }}-

      - name: Build Website app
        run: pnpm --filter website build
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web-website
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Website image
        uses: docker/build-push-action@v5
        with:
          context: ./web/apps/website
          file: ./web/apps/website/Dockerfile.runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=website
          cache-to: type=gha,mode=max,scope=website

      - name: Build summary
        run: |
          echo "### Website Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: Website" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version**: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Lint Check
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint:all
        continue-on-error: true

  # Deploy Website to Azure
  deploy-website:
    name: Deploy Website to Azure
    runs-on: ubuntu-latest
    needs: build-website
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    permissions:
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA:0:7}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/web-website:${IMAGE_TAG}"

          echo "Deploying Website image: $IMAGE"

          az containerapp update \
            --name ca-kloudlite-website \
            --resource-group rg-kloudlite-registration \
            --image $IMAGE \
            --query "properties.provisioningState" -o tsv

      - name: Deployment Summary
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA:0:7}"

          echo "### Azure Deployment Summary (Website)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Azure Container Apps (Central India)" >> $GITHUB_STEP_SUMMARY
          echo "- **Container App**: ca-kloudlite-website" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- **Public URL**: https://kloudlite.io" >> $GITHUB_STEP_SUMMARY

  # Deploy Console to Azure
  deploy-console:
    name: Deploy Console to Azure
    runs-on: ubuntu-latest
    needs: build-console
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    permissions:
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA:0:7}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/web-console:${IMAGE_TAG}"

          echo "Deploying Console image: $IMAGE"

          az containerapp update \
            --name ca-kloudlite-console \
            --resource-group rg-kloudlite-registration \
            --image $IMAGE \
            --query "properties.provisioningState" -o tsv

      - name: Deployment Summary
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA:0:7}"

          echo "### Azure Deployment Summary (Console)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Azure Container Apps (Central India)" >> $GITHUB_STEP_SUMMARY
          echo "- **Container App**: ca-kloudlite-console" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- **Public URL**: https://console.kloudlite.io" >> $GITHUB_STEP_SUMMARY
