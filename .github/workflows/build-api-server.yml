name: Build and Push API Server

on:
  push:
    branches:
      - master
      - development
    paths:
      - 'api/cmd/server/**'
      - 'api/Dockerfile'
      - 'api/go.mod'
      - 'api/go.sum'
      - '.github/workflows/build-api-server.yml'
  pull_request:
    branches:
      - master
      - development
    paths:
      - 'api/cmd/server/**'
      - 'api/Dockerfile'
      - 'api/go.mod'
      - 'api/go.sum'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api-server

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: api/go.sum

      - name: Build Go binary
        run: |
          cd api
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ./bin/api-server ./cmd/server
          ls -lh ./bin/api-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Component**: API Server" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: Distroless static binary (no Nix)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Deploy to K3s Cluster
        if: github.ref == 'refs/heads/development' && github.event_name == 'push'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart API Server StatefulSet
        if: github.ref == 'refs/heads/development' && github.event_name == 'push'
        env:
          RESOURCE_GROUP: kl-f615f505-00a6-40b9-b462-400e48c7d224-rg
          VM_NAME: kl-f615f505-00a6-40b9-b462-400e48c7d224-vm
          NAMESPACE: kloudlite
        run: |
          echo "🔄 Restarting API Server in K3s cluster..."

          az vm run-command invoke \
            --name "$VM_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --command-id RunShellScript \
            --scripts "
              export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
              NAMESPACE='$NAMESPACE'

              echo '🔄 Restarting api-server statefulset...'
              sudo kubectl rollout restart statefulset/api-server -n \"\$NAMESPACE\"

              echo '⏳ Waiting for api-server rollout...'
              sudo kubectl rollout status statefulset/api-server -n \"\$NAMESPACE\" --timeout=5m

              echo '✓ API Server restarted successfully'
              echo ''
              echo 'Current statefulset status:'
              sudo kubectl get statefulset api-server -n \"\$NAMESPACE\"
            " \
            --query 'value[0].message' \
            --output tsv

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**K3s Deployment:** ✓ API Server restarted in kloudlite namespace" >> $GITHUB_STEP_SUMMARY
