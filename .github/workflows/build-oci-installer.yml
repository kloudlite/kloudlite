name: Build and Push OCI Installer

on:
  push:
    branches:
      - master
      - development
    tags:
      - 'oci-installer-v*'
    paths:
      - 'api/cmd/kli/oci-installer/**'
      - 'api/cmd/kli/internal/oci/**'
      - 'api/cmd/kli/internal/console/**'
      - 'api/cmd/kli/internal/k8s/**'
      - 'api/go.mod'
      - 'api/go.sum'
      - '.github/workflows/build-oci-installer.yml'
  pull_request:
    branches:
      - master
      - development
    paths:
      - 'api/cmd/kli/oci-installer/**'
      - 'api/cmd/kli/internal/oci/**'
      - 'api/cmd/kli/internal/console/**'
      - 'api/cmd/kli/internal/k8s/**'
      - 'api/go.mod'
      - 'api/go.sum'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/oci-installer

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: api/go.sum

      - name: Build Go binary
        run: |
          cd api
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ./bin/oci-installer ./cmd/kli/oci-installer
          ls -lh ./bin/oci-installer

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=match,pattern=^oci-installer-v(.*),group=1
            type=sha
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/cmd/kli/oci-installer/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Component**: OCI Installer" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: Alpine with OCI installer binary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to ACA Job
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine image tag
        id: tag
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          echo "image-tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Update ACA Job image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/oci-installer:${{ steps.tag.outputs.image-tag }}"
          echo "Deploying OCI Installer..."
          echo "Image: $IMAGE"

          az containerapp job update \
            --name job-oci-installer \
            --resource-group rg-kloudlite \
            --image "$IMAGE" \
            --output none

          echo "✓ ACA Job image updated"

      - name: Deployment summary
        run: |
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **ACA Job**: job-oci-installer" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: rg-kloudlite" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${{ steps.tag.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
