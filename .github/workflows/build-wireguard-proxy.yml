name: Build and Push WireGuard Proxy

# NOTE: First run will fail with "permission_denied: write_package"
# because GITHUB_TOKEN cannot create new packages in ghcr.io.
# Solution: Repository admin must manually push first image to create the package,
# or configure a PAT with write:packages scope as GHCR_TOKEN secret.

on:
  push:
    branches:
      - master
      - development
    paths:
      - 'api/IMAGES/wireguard/**'
      - '.github/workflows/build-wireguard-proxy.yml'
  pull_request:
    branches:
      - master
      - development
    paths:
      - 'api/IMAGES/wireguard/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/wireguard-server

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api/IMAGES/wireguard
          file: ./api/IMAGES/wireguard/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Component**: WireGuard TLS Proxy" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture**: Single Go binary with integrated ProxyGuard library" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Features**:" >> $GITHUB_STEP_SUMMARY
          echo "- TLS 1.3 termination" >> $GITHUB_STEP_SUMMARY
          echo "- WebSocket to UDP conversion" >> $GITHUB_STEP_SUMMARY
          echo "- WireGuard VPN tunneling" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  go-vet:
    name: Go Vet
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api/IMAGES/wireguard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: api/IMAGES/wireguard/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

  go-fmt:
    name: Go Format Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api/IMAGES/wireguard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: api/IMAGES/wireguard/go.sum

      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files need formatting:"
            gofmt -s -l .
            exit 1
          fi

  test:
    name: Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api/IMAGES/wireguard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: api/IMAGES/wireguard/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -coverprofile=coverage.out -timeout=2m ./...
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: ./api/IMAGES/wireguard/coverage.out
          flags: wireguard-proxy
        continue-on-error: true

  build-binary:
    name: Build Binary
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api/IMAGES/wireguard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: api/IMAGES/wireguard/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o wireguard-tls-proxy -ldflags="-s -w" .
          ls -lh wireguard-tls-proxy
          ./wireguard-tls-proxy --version
