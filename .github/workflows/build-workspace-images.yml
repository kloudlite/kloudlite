name: Build and Push Workspace Images

on:
  push:
    branches:
      - master
      - development
    paths:
      - 'api/workspace-images/**'
      - '.github/workflows/build-workspace-images.yml'
  pull_request:
    branches:
      - master
      - development
    paths:
      - 'api/workspace-images/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-base:
    name: Build Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/workspace-base
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./api/workspace-images/base
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=workspace-base
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/workspace-base:buildcache
          cache-to: |
            type=gha,mode=max,scope=workspace-base
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/workspace-base:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build summary
        run: |
          echo "### Base Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Component**: Workspace Base Image" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  build-comprehensive:
    name: Build Comprehensive Image
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/workspace-comprehensive
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push comprehensive image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/workspace-images/comprehensive/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=workspace-comprehensive
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/workspace-comprehensive:buildcache
          cache-to: |
            type=gha,mode=max,scope=workspace-comprehensive
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/workspace-comprehensive:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}/workspace-base:${{ github.ref == 'refs/heads/master' && 'latest' || 'dev' }}
            VERSION=${{ github.ref_name }}-${{ github.sha }}
            BUILDKIT_INLINE_CACHE=1

      - name: Build summary
        run: |
          echo "### Comprehensive Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Component**: Workspace Comprehensive Image" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Includes:**" >> $GITHUB_STEP_SUMMARY
          echo "- SSH server" >> $GITHUB_STEP_SUMMARY
          echo "- VS Code Server" >> $GITHUB_STEP_SUMMARY
          echo "- ttyd (web terminal)" >> $GITHUB_STEP_SUMMARY
          echo "- Multiple shells (bash, zsh, fish)" >> $GITHUB_STEP_SUMMARY
          echo "- Starship prompt" >> $GITHUB_STEP_SUMMARY
          echo "- Nerd Fonts" >> $GITHUB_STEP_SUMMARY
