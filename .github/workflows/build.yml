name: Build
run-name: "Build ${{ inputs.version }}${{ inputs.is_nightly && ' (nightly)' || '' }} [${{ inputs.platform-controller && ' platform-controller' || '' }}${{ inputs.tunnel-server && ' tunnel-server' || '' }}${{ inputs.workmachine-node-manager && ' node-manager' || '' }}${{ inputs.wm-ingress-controller && ' wm-ingress' || '' }}${{ inputs.oci-installer && ' oci-installer' || '' }}${{ inputs.k3s-backup && ' k3s-backup' || '' }}${{ inputs.code-analyzer && ' code-analyzer' || '' }}${{ inputs.workspace-base && ' ws-base' || '' }}${{ inputs.workspace-comprehensive && ' ws-comprehensive' || '' }}${{ inputs.console && ' console' || '' }}${{ inputs.dashboard && ' dashboard' || '' }}${{ inputs.website && ' website' || '' }} ]"

on:
  workflow_dispatch:
    inputs:
      platform-controller:
        description: 'Platform Controller'
        type: boolean
        default: false
      tunnel-server:
        description: 'Tunnel Server'
        type: boolean
        default: false
      workmachine-node-manager:
        description: 'WorkMachine Node Manager'
        type: boolean
        default: false
      wm-ingress-controller:
        description: 'WM Ingress Controller'
        type: boolean
        default: false
      oci-installer:
        description: 'OCI Installer'
        type: boolean
        default: false
      k3s-backup:
        description: 'K3s Backup'
        type: boolean
        default: false
      code-analyzer:
        description: 'Code Analyzer'
        type: boolean
        default: false
      workspace-base:
        description: 'Workspace Base'
        type: boolean
        default: false
      workspace-comprehensive:
        description: 'Workspace Comprehensive'
        type: boolean
        default: false
      console:
        description: 'Console'
        type: boolean
        default: false
      dashboard:
        description: 'Dashboard'
        type: boolean
        default: false
      website:
        description: 'Website'
        type: boolean
        default: false
      version:
        description: 'Version tag (e.g. v1.2.0)'
        required: true
        type: string
      is_nightly:
        description: 'Nightly build'
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ── Job 1: Build dynamic matrix from selected checkboxes ───────────
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_apps: ${{ steps.set-matrix.outputs.has_apps }}
    steps:
      - name: Validate version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "::error::version input is required"
            exit 1
          fi

      - name: Build matrix from selected apps
        id: set-matrix
        run: |
          APPS="[]"

          if [ "${{ inputs.platform-controller }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["platform-controller"]'); fi
          if [ "${{ inputs.tunnel-server }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["tunnel-server"]'); fi
          if [ "${{ inputs.workmachine-node-manager }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["workmachine-node-manager"]'); fi
          if [ "${{ inputs.wm-ingress-controller }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["wm-ingress-controller"]'); fi
          if [ "${{ inputs.oci-installer }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["oci-installer"]'); fi
          if [ "${{ inputs.k3s-backup }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["k3s-backup"]'); fi
          if [ "${{ inputs.code-analyzer }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["code-analyzer"]'); fi
          if [ "${{ inputs.workspace-base }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["workspace-base"]'); fi
          if [ "${{ inputs.workspace-comprehensive }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["workspace-comprehensive"]'); fi
          if [ "${{ inputs.console }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["console"]'); fi
          if [ "${{ inputs.dashboard }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["dashboard"]'); fi
          if [ "${{ inputs.website }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["website"]'); fi

          if [ "$APPS" = "[]" ]; then
            echo "::error::No apps selected"
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_apps=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"app\":$APPS}" >> "$GITHUB_OUTPUT"
          echo "Selected apps: $APPS"

  # ── Job 2: Build each selected app in parallel ────────────────────
  build:
    name: Build ${{ matrix.app }}
    needs: prepare
    if: needs.prepare.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    # No environment needed — secrets are injected at deploy time, not build time

    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false

    concurrency:
      group: build-${{ matrix.app }}
      cancel-in-progress: true

    steps:
      # ── Compute effective tag ─────────────────────────────────────────
      - name: Resolve tag
        id: tag
        run: |
          VERSION="${{ inputs.version }}"
          if [ "${{ inputs.is_nightly }}" = "true" ]; then
            TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
            SHORT_SHA="${GITHUB_SHA:0:7}"
            TAG="${VERSION}-nightly.${TIMESTAMP}.${SHORT_SHA}"
            DEPLOY_TAG="${VERSION}-nightly"
          else
            TAG="${VERSION}"
            DEPLOY_TAG="${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "deploy_tag=${DEPLOY_TAG}" >> "$GITHUB_OUTPUT"
          echo "Effective tag: ${TAG}"

      # ── Resolve per-app build metadata ────────────────────────────────
      - name: Resolve app config
        id: app
        run: |
          APP="${{ matrix.app }}"

          case "${APP}" in
            platform-controller)
              BUILD_TYPE="go"
              BUILD_CMD="CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ./bin/api-server ./cmd/server"
              DOCKERFILE="./api/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="platform-controller"
              ;;
            tunnel-server)
              BUILD_TYPE="go"
              BUILD_CMD='CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ./bin/tunnel-server ./cmd/tunnel-server'
              DOCKERFILE="./api/cmd/tunnel-server/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="tunnel-server"
              ;;
            workmachine-node-manager)
              BUILD_TYPE="go"
              BUILD_CMD="CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ./bin/workmachine-node-manager ./cmd/workmachine-node-manager"
              DOCKERFILE="./api/Dockerfile.workmachine-node-manager"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="workmachine-node-manager"
              ;;
            wm-ingress-controller)
              BUILD_TYPE="go"
              BUILD_CMD='CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ./bin/wm-ingress ./cmd/wm-ingress-controller'
              DOCKERFILE="./api/cmd/wm-ingress-controller/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="wm-ingress-controller"
              ;;
            oci-installer)
              BUILD_TYPE="go"
              BUILD_CMD='CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ./bin/oci-installer ./cmd/kli/oci-installer'
              DOCKERFILE="./api/cmd/kli/oci-installer/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="oci-installer"
              ;;
            code-analyzer)
              BUILD_TYPE="go"
              BUILD_CMD='CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ./bin/code-analyzer ./cmd/code-analyzer'
              DOCKERFILE="./api/cmd/code-analyzer/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="code-analyzer"
              ;;
            k3s-backup)
              BUILD_TYPE="docker-only"
              BUILD_CMD=""
              DOCKERFILE="./api/Dockerfile.k3s-backup"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="k3s-backup"
              ;;
            workspace-base)
              BUILD_TYPE="docker-only"
              BUILD_CMD=""
              DOCKERFILE="./api/workspace-images/base/Dockerfile"
              DOCKER_CONTEXT="./api/workspace-images/base"
              IMAGE_SUFFIX="workspace-base"
              ;;
            workspace-comprehensive)
              BUILD_TYPE="workspace-comprehensive"
              BUILD_CMD='CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o bin/kl-linux cmd/kl/main.go'
              DOCKERFILE="./api/workspace-images/comprehensive/Dockerfile"
              DOCKER_CONTEXT="./api"
              IMAGE_SUFFIX="workspace-comprehensive"
              ;;
            console)
              BUILD_TYPE="web"
              BUILD_CMD="bun run --filter console build"
              DOCKERFILE="./web/apps/console/Dockerfile.runtime"
              DOCKER_CONTEXT="./web/apps/console"
              IMAGE_SUFFIX="console"
              ;;
            dashboard)
              BUILD_TYPE="web"
              BUILD_CMD="bun run --filter dashboard build"
              DOCKERFILE="./web/apps/dashboard/Dockerfile.runtime"
              DOCKER_CONTEXT="./web/apps/dashboard"
              IMAGE_SUFFIX="dashboard"
              ;;
            website)
              BUILD_TYPE="web"
              BUILD_CMD="bun run --filter website build"
              DOCKERFILE="./web/apps/website/Dockerfile.runtime"
              DOCKER_CONTEXT="./web/apps/website"
              IMAGE_SUFFIX="website"
              ;;
            *)
              echo "::error::Unknown app: ${APP}"
              exit 1
              ;;
          esac

          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "build_cmd=${BUILD_CMD}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "docker_context=${DOCKER_CONTEXT}" >> "$GITHUB_OUTPUT"
          echo "image_suffix=${IMAGE_SUFFIX}" >> "$GITHUB_OUTPUT"

          echo "Build type: ${BUILD_TYPE}"
          echo "Image: ${REGISTRY}/${{ github.repository }}/${IMAGE_SUFFIX}:${{ steps.tag.outputs.tag }}"

      - name: Prepare docker tags
        id: docker_tags
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ github.repository }}/${{ steps.app.outputs.image_suffix }}"
          TAGS="${IMAGE_BASE}:${{ steps.tag.outputs.tag }}"

          if [ "${{ inputs.is_nightly }}" = "true" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_BASE}:${{ steps.tag.outputs.deploy_tag }}"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Go setup (go, workspace-comprehensive) ───────────────────────
      - name: Set up Go
        if: steps.app.outputs.build_type == 'go' || steps.app.outputs.build_type == 'workspace-comprehensive'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: api/go.sum

      - name: Build Go binary
        if: steps.app.outputs.build_type == 'go'
        run: |
          cd api
          mkdir -p bin
          ${{ steps.app.outputs.build_cmd }}
          echo "Binary built:"
          ls -lh ./bin/

      - name: Build kl binary
        if: steps.app.outputs.build_type == 'workspace-comprehensive'
        run: |
          cd api
          mkdir -p bin
          ${{ steps.app.outputs.build_cmd }}
          ls -lh bin/kl-linux

      # ── Bun setup (web apps) ─────────────────────────────────────────
      - name: Setup Bun
        if: steps.app.outputs.build_type == 'web'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        if: steps.app.outputs.build_type == 'web'
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            web/apps/*/node_modules
            web/packages/*/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v3-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v3-

      - name: Install web dependencies
        if: steps.app.outputs.build_type == 'web'
        working-directory: web
        run: bun install

      # ── Web app build-time env (NEXT_PUBLIC_* only — runtime secrets injected at deploy) ──
      - name: Create build-time env file
        if: steps.app.outputs.build_type == 'web'
        run: |
          APP="${{ matrix.app }}"
          case "$APP" in
            console)
              cat > web/apps/console/.env.local << 'EOF'
          NEXT_PUBLIC_BASE_URL=https://console.kloudlite.io
          NEXT_PUBLIC_CONSOLE_URL=https://console.kloudlite.io
          NEXT_PUBLIC_INSTALLATION_DOMAIN=khost.dev
          NEXT_PUBLIC_TURNSTILE_SITE_KEY=0x4AAAAAACVzkPXwxkSHKMwt
          NEXT_PUBLIC_SUPABASE_URL=https://vsrhxnpsxpqlyyetvrhy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder
          EOF
              ;;
            dashboard)
              cat > web/apps/dashboard/.env.local << 'EOF'
          NEXT_PUBLIC_BASE_URL=https://dashboard.kloudlite.io
          NEXT_PUBLIC_SUPABASE_URL=https://vsrhxnpsxpqlyyetvrhy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder
          NEXT_PUBLIC_GITHUB_CLIENT_ID=placeholder
          NEXT_PUBLIC_GOOGLE_CLIENT_ID=placeholder
          NEXT_PUBLIC_MICROSOFT_ENTRA_CLIENT_ID=placeholder
          NEXT_PUBLIC_MICROSOFT_ENTRA_TENANT_ID=placeholder
          EOF
              ;;
            website)
              cat > web/apps/website/.env.local << 'EOF'
          NEXT_PUBLIC_BASE_URL=https://kloudlite.io
          EOF
              ;;
          esac

      - name: Cache Next.js build
        if: steps.app.outputs.build_type == 'web'
        uses: actions/cache@v4
        with:
          path: |
            web/apps/${{ matrix.app }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ matrix.app }}-${{ hashFiles('web/bun.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ matrix.app }}-${{ hashFiles('web/bun.lock') }}-

      - name: Build web app
        if: steps.app.outputs.build_type == 'web'
        working-directory: web
        run: ${{ steps.app.outputs.build_cmd }}
        env:
          NODE_ENV: production

      # ── Docker build+push ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: matrix.app != 'workspace-comprehensive'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.app.outputs.docker_context }}
          file: ${{ steps.app.outputs.dockerfile }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build and push workspace-comprehensive image
        if: matrix.app == 'workspace-comprehensive'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.app.outputs.docker_context }}
          file: ${{ steps.app.outputs.dockerfile }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}/workspace-base:${{ steps.tag.outputs.tag }}
            VERSION=${{ steps.tag.outputs.tag }}
            BUILDKIT_INLINE_CACHE=1

      # ── Build summary ────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          APP="${{ matrix.app }}"
          TAG="${{ steps.tag.outputs.tag }}"
          BUILD_TYPE="${{ steps.app.outputs.build_type }}"
          IMAGE_SUFFIX="${{ steps.app.outputs.image_suffix }}"

          echo "### Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **App** | \`${APP}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tag** | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build type** | \`${BUILD_TYPE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Nightly** | \`${{ inputs.is_nightly }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA:0:7}\` |" >> "$GITHUB_STEP_SUMMARY"

          IMAGE_URL="${{ env.REGISTRY }}/${{ github.repository }}/${IMAGE_SUFFIX}:${TAG}"
          echo "| **Image** | \`${IMAGE_URL}\` |" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ inputs.is_nightly }}" = "true" ]; then
            NIGHTLY_IMAGE_URL="${{ env.REGISTRY }}/${{ github.repository }}/${IMAGE_SUFFIX}:${{ steps.tag.outputs.deploy_tag }}"
            echo "| **Nightly alias** | \`${NIGHTLY_IMAGE_URL}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
