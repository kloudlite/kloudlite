name: Deploy to AKS
run-name: "Deploy ${{ inputs.version }}${{ inputs.is_nightly && ' (nightly)' || '' }} → ${{ inputs.environment }} [${{ inputs.console && ' console' || '' }}${{ inputs.website && ' website' || '' }}${{ inputs.oci-installer && ' oci-installer' || '' }} ]"

on:
  workflow_dispatch:
    inputs:
      console:
        description: 'Console'
        type: boolean
        default: true
      website:
        description: 'Website'
        type: boolean
        default: true
      oci-installer:
        description: 'OCI Installer'
        type: boolean
        default: true
      version:
        description: 'Image tag to deploy (e.g. v1.2.0)'
        required: true
        type: string
      is_nightly:
        description: 'Deploy nightly alias tag (<version>-nightly)'
        type: boolean
        default: false
      environment:
        description: 'Target environment (maps to K8s namespace)'
        required: true
        type: choice
        options:
          - production
          - staging
          - development

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "::error::version input is required"
            exit 1
          fi

      - name: Resolve image tag
        id: tag
        run: |
          VERSION="${{ inputs.version }}"
          if [ "${{ inputs.is_nightly }}" = "true" ]; then
            case "$VERSION" in
              *-nightly|*-nightly.*) IMAGE_TAG="$VERSION" ;;
              *) IMAGE_TAG="${VERSION}-nightly" ;;
            esac
          else
            IMAGE_TAG="$VERSION"
          fi
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${IMAGE_TAG}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubeconfig
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Create namespace if needed
        run: kubectl create namespace ${{ inputs.environment }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure NGINX Ingress Controller
        run: |
          if helm status ingress-nginx --namespace ingress-nginx > /dev/null 2>&1; then
            echo "Ingress controller already installed"
          else
            echo "Installing NGINX Ingress Controller"
            helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
            helm repo update
            helm install ingress-nginx ingress-nginx/ingress-nginx \
              --namespace ingress-nginx \
              --create-namespace \
              --set controller.replicaCount=3 \
              --set controller.service.type=LoadBalancer \
              --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path"=/healthz \
              --set controller.admissionWebhooks.enabled=true \
              --wait \
              --timeout 5m
          fi

      - name: Deploy via Helm
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.image_tag }}"
          ENV="${{ inputs.environment }}"
          CHART_DIR=".github/k8s/kloudlite-apps"

          # Only override image tags for selected apps; others keep existing tags
          SET_ARGS=""
          if [ "${{ inputs.console }}" = "true" ]; then
            SET_ARGS="${SET_ARGS} --set console.enabled=true --set console.image.tag=${IMAGE_TAG}"
          fi
          if [ "${{ inputs.website }}" = "true" ]; then
            SET_ARGS="${SET_ARGS} --set website.enabled=true --set website.image.tag=${IMAGE_TAG}"
          fi
          if [ "${{ inputs.oci-installer }}" = "true" ]; then
            SET_ARGS="${SET_ARGS} --set ociInstaller.enabled=true --set ociInstaller.image.tag=${IMAGE_TAG}"
          fi

          # First install: use values files to bootstrap all config
          # Subsequent upgrades: reuse existing values, only override selected app tags
          if helm status kloudlite-apps --namespace "$ENV" > /dev/null 2>&1; then
            echo "Existing release found — upgrading with --reuse-values"
            helm upgrade kloudlite-apps "${CHART_DIR}" \
              --namespace "$ENV" \
              --reuse-values \
              ${SET_ARGS} \
              --wait \
              --timeout 5m
          else
            echo "No existing release — installing with full values files"
            helm install kloudlite-apps "${CHART_DIR}" \
              --namespace "$ENV" \
              --values "${CHART_DIR}/values.yaml" \
              --values "${CHART_DIR}/values-${ENV}.yaml" \
              --set global.imageTag="${IMAGE_TAG}" \
              --wait \
              --timeout 5m
          fi

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ inputs.environment }} -l "app.kubernetes.io/part-of=kloudlite"
          echo ""
          echo "=== Services ==="
          kubectl get svc -n ${{ inputs.environment }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ inputs.environment }}

      - name: Deploy summary
        if: always()
        run: |
          ENV="${{ inputs.environment }}"
          TAG="${{ steps.tag.outputs.image_tag }}"

          echo "### AKS Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | \`${ENV}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image Tag** | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Console** | \`${{ inputs.console }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Website** | \`${{ inputs.website }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **OCI Installer** | \`${{ inputs.oci-installer }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Nightly** | \`${{ inputs.is_nightly }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Cluster** | \`${{ secrets.AKS_CLUSTER_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Timestamp** | \`$(date -u '+%Y-%m-%d %H:%M:%S UTC')\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
