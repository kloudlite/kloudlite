name: Deploy Web to Production

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Application to deploy'
        required: true
        type: choice
        options:
          - console
          - website
          - dashboard
          - all
      image-tag:
        description: 'Image tag to deploy (e.g., sha-abc123, latest, dev)'
        required: false
        type: string
        default: 'dev'
      sync-env-vars:
        description: 'Sync environment variables before deployment'
        required: false
        type: boolean
        default: true
  workflow_run:
    workflows: ["Build, Push and Deploy Web"]
    types: [completed]
    branches: [development]

concurrency:
  group: deploy-web-production-${{ github.event.inputs.app || 'auto' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  RESOURCE_GROUP: rg-kloudlite

jobs:
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      deploy-console: ${{ steps.apps.outputs.deploy-console }}
      deploy-website: ${{ steps.apps.outputs.deploy-website }}
      deploy-dashboard: ${{ steps.apps.outputs.deploy-dashboard }}
      sync-env-vars: ${{ steps.apps.outputs.sync-env-vars }}
      image-tag: ${{ steps.tag.outputs.image-tag }}

    steps:
      - name: Determine apps to deploy
        id: apps
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP="${{ github.event.inputs.app }}"

            if [ "$APP" = "all" ] || [ "$APP" = "console" ]; then
              echo "deploy-console=true" >> $GITHUB_OUTPUT
            else
              echo "deploy-console=false" >> $GITHUB_OUTPUT
            fi

            if [ "$APP" = "all" ] || [ "$APP" = "website" ]; then
              echo "deploy-website=true" >> $GITHUB_OUTPUT
            else
              echo "deploy-website=false" >> $GITHUB_OUTPUT
            fi

            if [ "$APP" = "all" ] || [ "$APP" = "dashboard" ]; then
              echo "deploy-dashboard=true" >> $GITHUB_OUTPUT
            else
              echo "deploy-dashboard=false" >> $GITHUB_OUTPUT
            fi

            echo "sync-env-vars=${{ github.event.inputs.sync-env-vars }}" >> $GITHUB_OUTPUT
          else
            # Auto-deploy all apps after successful build
            echo "deploy-console=true" >> $GITHUB_OUTPUT
            echo "deploy-website=true" >> $GITHUB_OUTPUT
            echo "deploy-dashboard=false" >> $GITHUB_OUTPUT
            echo "sync-env-vars=true" >> $GITHUB_OUTPUT  # Always sync on auto-deploy
          fi

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image-tag=${{ github.event.inputs.image-tag }}" >> $GITHUB_OUTPUT
          else
            # Use short SHA from the triggering workflow
            SHORT_SHA="${{ github.event.workflow_run.head_sha }}"
            SHORT_SHA="${SHORT_SHA:0:7}"
            echo "image-tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

  # Sync environment variables before deployment
  sync-console-env:
    name: Sync Console Environment Variables
    needs: prepare
    if: needs.prepare.outputs.deploy-console == 'true' && needs.prepare.outputs.sync-env-vars == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync environment variables
        run: |
          echo "Syncing environment variables for Console..."

          az containerapp update \
            --name ca-kloudlite-registration \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              "NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://console.kloudlite.io' }}" \
              "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.kloudlite.io' }}" \
              "GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}" \
              "GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}" \
              "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              "MICROSOFT_ENTRA_CLIENT_ID=${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}" \
              "MICROSOFT_ENTRA_CLIENT_SECRET=${{ secrets.MICROSOFT_ENTRA_CLIENT_SECRET }}" \
              "MICROSOFT_ENTRA_TENANT_ID=${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}" \
              "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
              "NEXTAUTH_URL=${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://console.kloudlite.io' }}" \
              "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
              "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
              "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              "CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
              "CLOUDFLARE_DNS_DOMAIN=${{ secrets.CLOUDFLARE_DNS_DOMAIN || 'khost.dev' }}" \
              "CLOUDFLARE_ORIGIN_CA_KEY=${{ secrets.CLOUDFLARE_ORIGIN_CA_KEY }}" \
              "NEXT_PUBLIC_INSTALLATION_DOMAIN=${{ secrets.CLOUDFLARE_DNS_DOMAIN || 'khost.dev' }}" \
              "AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              "AZURE_RESOURCE_GROUP=${{ secrets.AZURE_RESOURCE_GROUP || 'rg-kloudlite' }}" \
              "OCI_INSTALLER_JOB_NAME=${{ secrets.OCI_INSTALLER_JOB_NAME || 'job-oci-installer' }}" \
            --output none

          echo "✓ Environment variables synced (22 variables)"

  sync-website-env:
    name: Sync Website Environment Variables
    needs: prepare
    if: needs.prepare.outputs.deploy-website == 'true' && needs.prepare.outputs.sync-env-vars == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync environment variables
        run: |
          echo "Syncing environment variables for Website..."

          az containerapp update \
            --name ca-kloudlite-website \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              "NEXT_PUBLIC_BASE_URL=https://kloudlite.io" \
              "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
              "NEXTAUTH_URL=https://kloudlite.io" \
            --output none

          echo "✓ Environment variables synced (3 variables)"

  sync-dashboard-env:
    name: Sync Dashboard Environment Variables
    needs: prepare
    if: needs.prepare.outputs.deploy-dashboard == 'true' && needs.prepare.outputs.sync-env-vars == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync environment variables
        run: |
          echo "Syncing environment variables for Dashboard..."

          az containerapp update \
            --name ca-kloudlite-dashboard \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              "NEXT_PUBLIC_BASE_URL=https://dashboard.kloudlite.io" \
              "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
              "NEXTAUTH_URL=https://dashboard.kloudlite.io" \
            --output none

          echo "✓ Environment variables synced (3 variables)"

  # Deploy applications (only updates image)
  deploy-console:
    name: Deploy Console
    needs: [prepare, sync-console-env]
    if: |
      always() &&
      needs.prepare.outputs.deploy-console == 'true' &&
      (needs.sync-console-env.result == 'success' || needs.sync-console-env.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Azure Container App
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/web-console:${{ needs.prepare.outputs.image-tag }}"

          echo "Deploying Console..."
          echo "Image: $IMAGE"
          echo "Note: Using existing environment variables (not updating)"

          # Only update the image, environment variables already set
          az containerapp update \
            --name ca-kloudlite-registration \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "$IMAGE" \
            --output none

          echo "✓ Image deployment completed"

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary: Console" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✓ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| **Container App** | ca-kloudlite-registration |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource Group** | ${{ env.RESOURCE_GROUP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | ${{ needs.prepare.outputs.image-tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Public URL** | https://console.kloudlite.io |" >> $GITHUB_STEP_SUMMARY
          echo "| **Env Vars Synced** | ${{ needs.prepare.outputs.sync-env-vars == 'true' && 'Yes' || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  deploy-website:
    name: Deploy Website
    needs: [prepare, sync-website-env]
    if: |
      always() &&
      needs.prepare.outputs.deploy-website == 'true' &&
      (needs.sync-website-env.result == 'success' || needs.sync-website-env.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Azure Container App
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/web-website:${{ needs.prepare.outputs.image-tag }}"

          echo "Deploying Website..."
          echo "Image: $IMAGE"
          echo "Note: Using existing environment variables (not updating)"

          # Only update the image, environment variables already set
          az containerapp update \
            --name ca-kloudlite-website \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "$IMAGE" \
            --output none

          echo "✓ Image deployment completed"

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary: Website" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✓ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| **Container App** | ca-kloudlite-website |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource Group** | ${{ env.RESOURCE_GROUP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | ${{ needs.prepare.outputs.image-tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Public URL** | https://kloudlite.io |" >> $GITHUB_STEP_SUMMARY
          echo "| **Env Vars Synced** | ${{ needs.prepare.outputs.sync-env-vars == 'true' && 'Yes' || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  deploy-dashboard:
    name: Deploy Dashboard to K3s
    needs: [prepare]
    if: needs.prepare.outputs.deploy-dashboard == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Dashboard to K3s and Restart Frontend
        env:
          RESOURCE_GROUP: kl-f615f505-00a6-40b9-b462-400e48c7d224-rg
          VM_NAME: kl-f615f505-00a6-40b9-b462-400e48c7d224-vm
          NAMESPACE: kloudlite
          IMAGE_TAG: ${{ needs.prepare.outputs.image-tag }}
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/web-dashboard:${IMAGE_TAG}"

          echo "================================================"
          echo "Deploying Dashboard to K3s Cluster"
          echo "================================================"
          echo "Image: $IMAGE"
          echo "VM: $VM_NAME"
          echo "Namespace: $NAMESPACE"
          echo "================================================"
          echo ""

          # Execute deployment commands on VM via Azure Run Command
          echo "🚀 Updating frontend deployment with new dashboard image on VM..."

          az vm run-command invoke \
            --name "$VM_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --command-id RunShellScript \
            --scripts "
              export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
              IMAGE='$IMAGE'
              NAMESPACE='$NAMESPACE'

              echo '🚀 Updating frontend deployment with dashboard image...'
              sudo kubectl set image deployment/frontend frontend=\"\$IMAGE\" -n \"\$NAMESPACE\"

              echo '⏳ Waiting for frontend rollout...'
              sudo kubectl rollout status deployment/frontend -n \"\$NAMESPACE\" --timeout=5m

              echo '✓ Frontend deployment updated successfully'
              echo ''

              echo '================================================'
              echo '✅ Deployment Complete'
              echo '================================================'
              echo ''
              echo 'Current deployment status:'
              sudo kubectl get deployment frontend -n \"\$NAMESPACE\"
              echo ''
              echo 'Recent pods:'
              sudo kubectl get pods -n \"\$NAMESPACE\" -l app=frontend --sort-by=.metadata.creationTimestamp | tail -5
            " \
            --query 'value[0].message' \
            --output tsv

          echo ""
          echo "✅ Frontend deployment updated with dashboard image successfully!"

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary: Dashboard to K3s Frontend" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✓ Deployed to K3s |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platform** | K3s Cluster on Azure VM |" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | kloudlite |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployment** | frontend |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | web-dashboard:${{ needs.prepare.outputs.image-tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend** | ✓ Updated with dashboard image |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [prepare, deploy-console, deploy-website, deploy-dashboard]
    if: always()

    steps:
      - name: Generate deployment report
        run: |
          echo "# Production Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`${{ needs.prepare.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Env Vars Synced:** ${{ needs.prepare.outputs.sync-env-vars }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Console status
          if [ "${{ needs.prepare.outputs.deploy-console }}" = "true" ]; then
            if [ "${{ needs.deploy-console.result }}" = "success" ]; then
              echo "- ✅ **Console**: Deployed successfully to https://console.kloudlite.io" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ **Console**: Deployment failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- ⊘ **Console**: Skipped" >> $GITHUB_STEP_SUMMARY
          fi

          # Website status
          if [ "${{ needs.prepare.outputs.deploy-website }}" = "true" ]; then
            if [ "${{ needs.deploy-website.result }}" = "success" ]; then
              echo "- ✅ **Website**: Deployed successfully to https://kloudlite.io" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ **Website**: Deployment failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- ⊘ **Website**: Skipped" >> $GITHUB_STEP_SUMMARY
          fi

          # Dashboard status
          if [ "${{ needs.prepare.outputs.deploy-dashboard }}" = "true" ]; then
            if [ "${{ needs.deploy-dashboard.result }}" = "success" ]; then
              echo "- ✅ **Dashboard**: Deployed successfully to https://dashboard.kloudlite.io" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ **Dashboard**: Deployment failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- ⊘ **Dashboard**: Skipped" >> $GITHUB_STEP_SUMMARY
          fi
