name: Deploy
run-name: "Deploy ${{ inputs.version }} → ${{ inputs.environment }}${{ inputs.is_nightly && ' (nightly)' || '' }} [${{ inputs.platform-controller && ' platform-controller' || '' }}${{ inputs.tunnel-server && ' tunnel-server' || '' }}${{ inputs.workmachine-node-manager && ' node-manager' || '' }}${{ inputs.wm-ingress-controller && ' wm-ingress' || '' }}${{ inputs.oci-installer && ' oci-installer' || '' }}${{ inputs.k3s-backup && ' k3s-backup' || '' }}${{ inputs.code-analyzer && ' code-analyzer' || '' }}${{ inputs.workspace-base && ' ws-base' || '' }}${{ inputs.workspace-comprehensive && ' ws-comprehensive' || '' }}${{ inputs.web-console && ' web-console' || '' }}${{ inputs.web-dashboard && ' web-dashboard' || '' }}${{ inputs.web-website && ' web-website' || '' }} ]"

on:
  workflow_dispatch:
    inputs:
      platform-controller:
        description: 'Platform Controller'
        type: boolean
        default: false
      tunnel-server:
        description: 'Tunnel Server'
        type: boolean
        default: false
      workmachine-node-manager:
        description: 'WorkMachine Node Manager'
        type: boolean
        default: false
      wm-ingress-controller:
        description: 'WM Ingress Controller'
        type: boolean
        default: false
      oci-installer:
        description: 'OCI Installer'
        type: boolean
        default: false
      k3s-backup:
        description: 'K3s Backup'
        type: boolean
        default: false
      code-analyzer:
        description: 'Code Analyzer'
        type: boolean
        default: false
      workspace-base:
        description: 'Workspace Base'
        type: boolean
        default: false
      workspace-comprehensive:
        description: 'Workspace Comprehensive'
        type: boolean
        default: false
      web-console:
        description: 'Web Console'
        type: boolean
        default: false
      web-dashboard:
        description: 'Web Dashboard'
        type: boolean
        default: false
      web-website:
        description: 'Web Website'
        type: boolean
        default: false
      version:
        description: 'Exact image tag to deploy (e.g. v1.2.0)'
        required: true
        type: string
      is_nightly:
        description: 'Nightly build (informational only)'
        type: boolean
        default: false
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Build deploy matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_apps: ${{ steps.set-matrix.outputs.has_apps }}
    steps:
      - name: Build matrix from selected apps
        id: set-matrix
        run: |
          APPS="[]"
          if [ "${{ inputs.platform-controller }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["platform-controller"]'); fi
          if [ "${{ inputs.tunnel-server }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["tunnel-server"]'); fi
          if [ "${{ inputs.workmachine-node-manager }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["workmachine-node-manager"]'); fi
          if [ "${{ inputs.wm-ingress-controller }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["wm-ingress-controller"]'); fi
          if [ "${{ inputs.oci-installer }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["oci-installer"]'); fi
          if [ "${{ inputs.k3s-backup }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["k3s-backup"]'); fi
          if [ "${{ inputs.code-analyzer }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["code-analyzer"]'); fi
          if [ "${{ inputs.workspace-base }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["workspace-base"]'); fi
          if [ "${{ inputs.workspace-comprehensive }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["workspace-comprehensive"]'); fi
          if [ "${{ inputs.web-console }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["web-console"]'); fi
          if [ "${{ inputs.web-dashboard }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["web-dashboard"]'); fi
          if [ "${{ inputs.web-website }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["web-website"]'); fi

          if [ "$APPS" = "[]" ]; then
            echo "::error::No apps selected"
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_apps=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"app\":$APPS}" >> "$GITHUB_OUTPUT"
          echo "Selected apps: $APPS"

  deploy:
    name: Deploy ${{ matrix.app }} to ${{ inputs.environment }}
    needs: prepare
    if: needs.prepare.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false

    steps:
      # ── Input validation ──────────────────────────────────────────────
      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "::error::version input is required"
            exit 1
          fi

      # ── Resolve image reference ───────────────────────────────────────
      - name: Resolve image tag
        id: image
        run: |
          IMAGE_TAG="${{ inputs.version }}"
          APP="${{ matrix.app }}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/${APP}:${IMAGE_TAG}"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Image to deploy: ${FULL_IMAGE}"

      # ── Deploy: OCI installer (Azure Container Apps) ──────────────────
      - name: Azure Login
        if: matrix.app == 'oci-installer'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy oci-installer to ACA Job
        if: matrix.app == 'oci-installer'
        run: |
          IMAGE="${{ steps.image.outputs.full_image }}"
          echo "Deploying OCI Installer..."
          echo "Image: ${IMAGE}"

          az containerapp job update \
            --name job-oci-installer \
            --resource-group rg-kloudlite \
            --image "${IMAGE}" \
            --output none

          echo "ACA Job image updated successfully"

      # ── Deploy: All other apps (placeholder) ──────────────────────────
      - name: Deploy handler
        if: matrix.app != 'oci-installer'
        run: |
          APP="${{ matrix.app }}"
          ENV="${{ inputs.environment }}"
          IMAGE="${{ steps.image.outputs.full_image }}"

          echo "Deploy handler for ${APP} to ${ENV}: image ${IMAGE} ready. Manual deployment steps required."

      # ── Deploy summary ────────────────────────────────────────────────
      - name: Deploy summary
        if: always()
        run: |
          APP="${{ matrix.app }}"
          ENV="${{ inputs.environment }}"
          TAG="${{ steps.image.outputs.tag }}"
          IMAGE="${{ steps.image.outputs.full_image }}"
          NIGHTLY="${{ inputs.is_nightly }}"

          echo "### Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **App** | \`${APP}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | \`${ENV}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image Tag** | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Nightly** | \`${NIGHTLY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${IMAGE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Timestamp** | \`$(date -u '+%Y-%m-%d %H:%M:%S UTC')\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
