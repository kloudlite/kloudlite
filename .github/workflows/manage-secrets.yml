name: Manage Production Secrets

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - setup-all
          - update-oauth
          - update-supabase
          - update-cloudflare
          - rotate-auth-secret
          - verify-secrets

permissions:
  contents: read

jobs:
  manage:
    name: ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Verify GitHub CLI available
        run: |
          echo "✓ GitHub CLI is available in GitHub Actions runners"
          echo "✓ Secrets are managed through GitHub UI or gh CLI"
          echo ""
          echo "This workflow validates that secrets are configured correctly."

      - name: Validate required secrets (Console)
        if: |
          github.event.inputs.action == 'setup-all' ||
          github.event.inputs.action == 'verify-secrets'
        run: |
          echo "## Console Application Secrets Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check URLs
          if [ -n "${{ secrets.NEXT_PUBLIC_BASE_URL }}" ]; then
            echo "- ✅ NEXT_PUBLIC_BASE_URL: Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ NEXT_PUBLIC_BASE_URL: Missing (will use default)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "${{ secrets.NEXT_PUBLIC_API_URL }}" ]; then
            echo "- ✅ NEXT_PUBLIC_API_URL: Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ NEXT_PUBLIC_API_URL: Missing (will use default)" >> $GITHUB_STEP_SUMMARY
          fi

          # Check Auth
          if [ -n "${{ secrets.AUTH_SECRET }}" ]; then
            echo "- ✅ AUTH_SECRET: Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ AUTH_SECRET: **MISSING - REQUIRED**" >> $GITHUB_STEP_SUMMARY
          fi

          # Check GitHub OAuth
          if [ -n "${{ secrets.GITHUB_CLIENT_ID }}" ] && [ -n "${{ secrets.GITHUB_CLIENT_SECRET }}" ]; then
            echo "- ✅ GitHub OAuth: Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ GitHub OAuth: **MISSING - REQUIRED**" >> $GITHUB_STEP_SUMMARY
          fi

          # Check Google OAuth
          if [ -n "${{ secrets.GOOGLE_CLIENT_ID }}" ] && [ -n "${{ secrets.GOOGLE_CLIENT_SECRET }}" ]; then
            echo "- ✅ Google OAuth: Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Google OAuth: **MISSING - REQUIRED**" >> $GITHUB_STEP_SUMMARY
          fi

          # Check Microsoft Entra
          if [ -n "${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}" ] && [ -n "${{ secrets.MICROSOFT_ENTRA_CLIENT_SECRET }}" ] && [ -n "${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}" ]; then
            echo "- ✅ Microsoft Entra OAuth: Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Microsoft Entra OAuth: **MISSING - REQUIRED**" >> $GITHUB_STEP_SUMMARY
          fi

          # Check Supabase
          if [ -n "${{ secrets.SUPABASE_URL }}" ] && [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ] && [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "- ✅ Supabase: Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Supabase: **MISSING - REQUIRED**" >> $GITHUB_STEP_SUMMARY
          fi

          # Check Cloudflare
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ] && [ -n "${{ secrets.CLOUDFLARE_ORIGIN_CA_KEY }}" ]; then
            echo "- ✅ Cloudflare: Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Cloudflare: **MISSING - REQUIRED**" >> $GITHUB_STEP_SUMMARY
          fi

          # Check Azure
          if [ -n "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "- ✅ Azure Credentials: Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Azure Credentials: **MISSING - REQUIRED**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: OAuth Configuration Guide
        if: github.event.inputs.action == 'update-oauth'
        run: |
          echo "## OAuth Configuration Guide" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub OAuth" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to: https://github.com/settings/developers" >> $GITHUB_STEP_SUMMARY
          echo "2. Create new OAuth App" >> $GITHUB_STEP_SUMMARY
          echo "3. Callback URL: \`https://console.kloudlite.io/api/auth/callback/github\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Set secrets:" >> $GITHUB_STEP_SUMMARY
          echo "   - \`GITHUB_CLIENT_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "   - \`GITHUB_CLIENT_SECRET\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Google OAuth" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to: https://console.cloud.google.com/apis/credentials" >> $GITHUB_STEP_SUMMARY
          echo "2. Create OAuth 2.0 Client ID" >> $GITHUB_STEP_SUMMARY
          echo "3. Redirect URI: \`https://console.kloudlite.io/api/auth/callback/google\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Set secrets:" >> $GITHUB_STEP_SUMMARY
          echo "   - \`GOOGLE_CLIENT_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "   - \`GOOGLE_CLIENT_SECRET\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Microsoft Entra (Azure AD)" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to: https://portal.azure.com/#blade/Microsoft_AAD_RegisteredApps" >> $GITHUB_STEP_SUMMARY
          echo "2. Create new app registration" >> $GITHUB_STEP_SUMMARY
          echo "3. Redirect URI: \`https://console.kloudlite.io/api/auth/callback/azure-ad\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Set secrets:" >> $GITHUB_STEP_SUMMARY
          echo "   - \`MICROSOFT_ENTRA_CLIENT_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "   - \`MICROSOFT_ENTRA_CLIENT_SECRET\`" >> $GITHUB_STEP_SUMMARY
          echo "   - \`MICROSOFT_ENTRA_TENANT_ID\`" >> $GITHUB_STEP_SUMMARY

      - name: Supabase Configuration Guide
        if: github.event.inputs.action == 'update-supabase'
        run: |
          echo "## Supabase Configuration Guide" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to your Supabase project settings" >> $GITHUB_STEP_SUMMARY
          echo "2. Navigate to: Project Settings → API" >> $GITHUB_STEP_SUMMARY
          echo "3. Copy the following values:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Required Secrets" >> $GITHUB_STEP_SUMMARY
          echo "- \`SUPABASE_URL\`: Project URL (e.g., https://xxxxx.supabase.co)" >> $GITHUB_STEP_SUMMARY
          echo "- \`SUPABASE_ANON_KEY\`: Project API keys → anon public" >> $GITHUB_STEP_SUMMARY
          echo "- \`SUPABASE_SERVICE_ROLE_KEY\`: Project API keys → service_role (secret!)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**⚠️ Warning**: The service role key has admin access. Keep it secure!" >> $GITHUB_STEP_SUMMARY

      - name: Cloudflare Configuration Guide
        if: github.event.inputs.action == 'update-cloudflare'
        run: |
          echo "## Cloudflare Configuration Guide" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### API Token" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to: https://dash.cloudflare.com/profile/api-tokens" >> $GITHUB_STEP_SUMMARY
          echo "2. Create Token → Use Edit zone DNS template" >> $GITHUB_STEP_SUMMARY
          echo "3. Set secret: \`CLOUDFLARE_API_TOKEN\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Zone ID" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to your domain overview in Cloudflare" >> $GITHUB_STEP_SUMMARY
          echo "2. Copy Zone ID from the right sidebar" >> $GITHUB_STEP_SUMMARY
          echo "3. Set secret: \`CLOUDFLARE_ZONE_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### DNS Domain" >> $GITHUB_STEP_SUMMARY
          echo "- Set secret: \`CLOUDFLARE_DNS_DOMAIN\` (e.g., khost.dev)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Origin CA Key" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to: https://dash.cloudflare.com/profile/api-tokens" >> $GITHUB_STEP_SUMMARY
          echo "2. Origin CA Key section" >> $GITHUB_STEP_SUMMARY
          echo "3. Set secret: \`CLOUDFLARE_ORIGIN_CA_KEY\`" >> $GITHUB_STEP_SUMMARY

      - name: Generate new AUTH_SECRET
        if: github.event.inputs.action == 'rotate-auth-secret'
        run: |
          echo "## AUTH_SECRET Rotation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Important**: You must manually update the secret in GitHub." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### New AUTH_SECRET" >> $GITHUB_STEP_SUMMARY
          echo "Generate a new secret with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "openssl rand -base64 32" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Update Process" >> $GITHUB_STEP_SUMMARY
          echo "1. Generate new secret using command above" >> $GITHUB_STEP_SUMMARY
          echo "2. Go to: https://github.com/${{ github.repository }}/settings/secrets/actions" >> $GITHUB_STEP_SUMMARY
          echo "3. Update \`AUTH_SECRET\` in the production environment" >> $GITHUB_STEP_SUMMARY
          echo "4. Trigger deployment to apply new secret" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: Rotating AUTH_SECRET will invalidate all existing user sessions." >> $GITHUB_STEP_SUMMARY

      - name: Setup Instructions
        if: github.event.inputs.action == 'setup-all'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Setup Instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Using GitHub UI" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to: https://github.com/${{ github.repository }}/settings/environments" >> $GITHUB_STEP_SUMMARY
          echo "2. Click on 'production' environment" >> $GITHUB_STEP_SUMMARY
          echo "3. Add each required secret listed above" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Using GitHub CLI" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Set a secret" >> $GITHUB_STEP_SUMMARY
          echo "echo 'secret-value' | gh secret set SECRET_NAME --env production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# List all secrets" >> $GITHUB_STEP_SUMMARY
          echo "gh secret list --env production" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Setup Commands" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Generate AUTH_SECRET" >> $GITHUB_STEP_SUMMARY
          echo "openssl rand -base64 32 | gh secret set AUTH_SECRET --env production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Set other secrets" >> $GITHUB_STEP_SUMMARY
          echo "echo 'your-value' | gh secret set GITHUB_CLIENT_ID --env production" >> $GITHUB_STEP_SUMMARY
          echo "echo 'your-value' | gh secret set GITHUB_CLIENT_SECRET --env production" >> $GITHUB_STEP_SUMMARY
          echo "# ... repeat for all secrets" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
