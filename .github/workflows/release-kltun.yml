name: Release kltun

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Base version (e.g. 1.2.0, without v prefix)'
        type: string
        required: true
      make_nightly:
        description: 'Publish nightly variant'
        type: boolean
        required: true
        default: false
      make_latest:
        description: 'Move kltun/latest floating tag (stable releases only)'
        type: boolean
        required: true
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build kltun binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            output: kltun-linux-amd64
          - goos: linux
            goarch: arm64
            output: kltun-linux-arm64

          # macOS
          - goos: darwin
            goarch: amd64
            output: kltun-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: kltun-darwin-arm64

          # Windows
          - goos: windows
            goarch: amd64
            output: kltun-windows-amd64.exe
          - goos: windows
            goarch: arm64
            output: kltun-windows-arm64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'api/go.mod'
          cache-dependency-path: 'api/go.sum'

      - name: Download wintun for Windows builds
        if: matrix.goos == 'windows'
        run: |
          # Download wintun DLLs for embedding
          curl -LO https://www.wintun.net/builds/wintun-0.14.1.zip
          unzip wintun-0.14.1.zip
          mkdir -p api/cmd/kltun/pkg/wintun/dll
          cp wintun/bin/amd64/wintun.dll api/cmd/kltun/pkg/wintun/dll/wintun_amd64.dll
          cp wintun/bin/arm64/wintun.dll api/cmd/kltun/pkg/wintun/dll/wintun_arm64.dll
          ls -la api/cmd/kltun/pkg/wintun/dll/

      - name: Compute version and tag
        id: version
        run: |
          BASE_VERSION="${{ inputs.version }}"

          if [ "${{ inputs.make_nightly }}" = "true" ]; then
            TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
            VERSION="${BASE_VERSION}-nightly.${TIMESTAMP}"
            TAG="kltun/v${VERSION}"
          else
            VERSION="${BASE_VERSION}"
            TAG="kltun/v${VERSION}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} (tag: ${TAG})"

      - name: Build binary
        working-directory: ./api
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v \
            -ldflags="-s -w -X github.com/kloudlite/kloudlite/api/cmd/kltun/cmd.Version=${{ steps.version.outputs.version }}" \
            -o ../dist/${{ matrix.output }} \
            ./cmd/kltun

      - name: Generate checksum
        working-directory: ./dist
        run: |
          sha256sum ${{ matrix.output }} > ${{ matrix.output }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: |
            dist/${{ matrix.output }}
            dist/${{ matrix.output }}.sha256
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute version and tag
        id: version
        run: |
          BASE_VERSION="${{ inputs.version }}"

          if [ "${{ inputs.make_nightly }}" = "true" ]; then
            TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
            VERSION="${BASE_VERSION}-nightly.${TIMESTAMP}"
            TAG="kltun/v${VERSION}"
          else
            VERSION="${BASE_VERSION}"
            TAG="kltun/v${VERSION}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find dist-artifacts -type f -exec cp {} release-assets/ \;
          ls -lah release-assets/

      - name: Generate release notes
        id: release_notes
        run: |
          cat > release-notes.md << 'EOF'
          # kltun ${{ steps.version.outputs.version }}

          ## Installation

          ### Linux (AMD64)
          ```bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${{ steps.version.outputs.tag }}/kltun-linux-amd64
          chmod +x kltun-linux-amd64
          sudo mv kltun-linux-amd64 /usr/local/bin/kltun
          ```

          ### Linux (ARM64)
          ```bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${{ steps.version.outputs.tag }}/kltun-linux-arm64
          chmod +x kltun-linux-arm64
          sudo mv kltun-linux-arm64 /usr/local/bin/kltun
          ```

          ### macOS (Intel)
          ```bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${{ steps.version.outputs.tag }}/kltun-darwin-amd64
          chmod +x kltun-darwin-amd64
          sudo mv kltun-darwin-amd64 /usr/local/bin/kltun
          ```

          ### macOS (Apple Silicon)
          ```bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${{ steps.version.outputs.tag }}/kltun-darwin-arm64
          chmod +x kltun-darwin-arm64
          sudo mv kltun-darwin-arm64 /usr/local/bin/kltun
          ```

          ### Windows (AMD64)
          Download [kltun-windows-amd64.exe](https://github.com/kloudlite/kloudlite/releases/download/${{ steps.version.outputs.tag }}/kltun-windows-amd64.exe) and add to your PATH.

          ### Windows (ARM64)
          Download [kltun-windows-arm64.exe](https://github.com/kloudlite/kloudlite/releases/download/${{ steps.version.outputs.tag }}/kltun-windows-arm64.exe) and add to your PATH.

          ## Verify Checksums

          After downloading, verify the integrity of the binary:

          ```bash
          # Download checksum file
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${{ steps.version.outputs.tag }}/kltun-linux-amd64.sha256

          # Verify (Linux/macOS)
          sha256sum -c kltun-linux-amd64.sha256

          # Verify (macOS alternative)
          shasum -a 256 -c kltun-darwin-arm64.sha256
          ```

          ## What's Included

          - kltun VPN tunnel CLI with WireGuard support
          - Cross-platform daemon for background VPN management (macOS/Linux/Windows)
          - Automatic privilege escalation when needed
          - CA certificate management
          - /etc/hosts management with isolated kl.hosts
          - Configuration persistence for easy reconnection

          ## Usage

          ```bash
          # Connect to Kloudlite VPN (first time with credentials)
          kltun connect --token YOUR_TOKEN --server https://subdomain.khost.dev

          # Connect using saved credentials
          kltun connect

          # Disconnect from VPN
          kltun quit

          # Check daemon status
          kltun status
          ```

          ## Features

          - **Background Connection**: VPN runs in the background via daemon, CLI returns immediately
          - **Persistent Config**: Token and server are saved for future connections
          - **Clean Disconnect**: Removes hosts but keeps CA cert for faster reconnection
          - **Automatic Daemon Management**: CLI ensures daemon is installed and running
          - **Privilege Escalation**: Automatically prompts for sudo when needed

          For full documentation, see [api/cmd/kltun/README.md](https://github.com/kloudlite/kloudlite/blob/${{ steps.version.outputs.tag }}/api/cmd/kltun/README.md)
          EOF

      - name: Create or move floating tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ steps.version.outputs.tag }}"

          # Create the immutable release tag
          git tag "${TAG}"
          git push origin "${TAG}"

          if [ "${{ inputs.make_nightly }}" = "true" ]; then
            # Always move kltun/nightly floating tag for nightly releases
            git tag -f "kltun/nightly"
            git push origin "kltun/nightly" --force
          else
            # Stable release: optionally move kltun/latest floating tag
            if [ "${{ inputs.make_latest }}" = "true" ]; then
              git tag -f "kltun/latest"
              git push origin "kltun/latest" --force
            fi
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: kltun v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ inputs.make_nightly }}
          make_latest: ${{ inputs.make_nightly == false && inputs.make_latest }}
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
