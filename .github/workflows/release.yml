name: Release

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Binary to release'
        type: choice
        required: true
        options:
          - kli
          - kltun
      version:
        description: 'Base version (e.g. 1.2.0, without v prefix)'
        type: string
        required: true
      make_nightly:
        description: 'Publish nightly variant'
        type: boolean
        required: true
        default: false
      make_latest:
        description: 'Move app/latest floating tag (stable releases only)'
        type: boolean
        required: true
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ inputs.app }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ inputs.app }} binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

          # macOS
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

          # Windows
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'api/go.mod'
          cache-dependency-path: 'api/go.sum'

      - name: Download wintun for Windows builds
        if: inputs.app == 'kltun' && matrix.goos == 'windows'
        run: |
          # Download wintun DLLs for embedding
          curl -LO https://www.wintun.net/builds/wintun-0.14.1.zip
          unzip wintun-0.14.1.zip
          mkdir -p api/cmd/kltun/pkg/wintun/dll
          cp wintun/bin/amd64/wintun.dll api/cmd/kltun/pkg/wintun/dll/wintun_amd64.dll
          cp wintun/bin/arm64/wintun.dll api/cmd/kltun/pkg/wintun/dll/wintun_arm64.dll
          ls -la api/cmd/kltun/pkg/wintun/dll/

      - name: Compute version and tag
        id: version
        run: |
          BASE_VERSION="${{ inputs.version }}"

          if [ "${{ inputs.make_nightly }}" = "true" ]; then
            TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
            VERSION="${BASE_VERSION}-nightly.${TIMESTAMP}"
            TAG="${{ inputs.app }}/v${VERSION}"
          else
            VERSION="${BASE_VERSION}"
            TAG="${{ inputs.app }}/v${VERSION}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} (tag: ${TAG})"

      - name: Build binary
        working-directory: ./api
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v \
            -ldflags="-s -w -X github.com/kloudlite/kloudlite/api/cmd/${{ inputs.app }}/cmd.Version=${{ steps.version.outputs.version }}" \
            -o ../dist/${{ inputs.app }}-${{ matrix.suffix }} \
            ./cmd/${{ inputs.app }}

      - name: Generate checksum
        working-directory: ./dist
        run: |
          sha256sum ${{ inputs.app }}-${{ matrix.suffix }} > ${{ inputs.app }}-${{ matrix.suffix }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app }}-${{ matrix.suffix }}
          path: |
            dist/${{ inputs.app }}-${{ matrix.suffix }}
            dist/${{ inputs.app }}-${{ matrix.suffix }}.sha256
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute version and tag
        id: version
        run: |
          BASE_VERSION="${{ inputs.version }}"

          if [ "${{ inputs.make_nightly }}" = "true" ]; then
            TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
            VERSION="${BASE_VERSION}-nightly.${TIMESTAMP}"
            TAG="${{ inputs.app }}/v${VERSION}"
          else
            VERSION="${BASE_VERSION}"
            TAG="${{ inputs.app }}/v${VERSION}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find dist-artifacts -type f -exec cp {} release-assets/ \;
          ls -lah release-assets/

      - name: Generate release notes
        id: release_notes
        env:
          APP: ${{ inputs.app }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > release-notes.md << EOF
          # ${APP} ${VERSION}

          ## Installation

          ### Linux (AMD64)
          \`\`\`bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-linux-amd64
          chmod +x ${APP}-linux-amd64
          sudo mv ${APP}-linux-amd64 /usr/local/bin/${APP}
          \`\`\`

          ### Linux (ARM64)
          \`\`\`bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-linux-arm64
          chmod +x ${APP}-linux-arm64
          sudo mv ${APP}-linux-arm64 /usr/local/bin/${APP}
          \`\`\`

          ### macOS (Intel)
          \`\`\`bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-darwin-amd64
          chmod +x ${APP}-darwin-amd64
          sudo mv ${APP}-darwin-amd64 /usr/local/bin/${APP}
          \`\`\`

          ### macOS (Apple Silicon)
          \`\`\`bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-darwin-arm64
          chmod +x ${APP}-darwin-arm64
          sudo mv ${APP}-darwin-arm64 /usr/local/bin/${APP}
          \`\`\`

          ### Windows (AMD64)
          Download [${APP}-windows-amd64.exe](https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-windows-amd64.exe) and add to your PATH.

          ### Windows (ARM64)
          Download [${APP}-windows-arm64.exe](https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-windows-arm64.exe) and add to your PATH.

          ## Verify Checksums

          After downloading, verify the integrity of the binary:

          \`\`\`bash
          # Download checksum file
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-linux-amd64.sha256

          # Verify (Linux/macOS)
          sha256sum -c ${APP}-linux-amd64.sha256

          # Verify (macOS alternative)
          shasum -a 256 -c ${APP}-darwin-arm64.sha256
          \`\`\`

          For full documentation, see [api/cmd/${APP}/README.md](https://github.com/kloudlite/kloudlite/blob/${TAG}/api/cmd/${APP}/README.md)
          EOF

      - name: Create or move floating tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ steps.version.outputs.tag }}"

          # Create the immutable release tag
          git tag "${TAG}"
          git push origin "${TAG}"

          if [ "${{ inputs.make_nightly }}" = "true" ]; then
            # Always move floating nightly tag for nightly releases
            git tag -f "${{ inputs.app }}/nightly"
            git push origin "${{ inputs.app }}/nightly" --force
          else
            # Stable release: optionally move floating latest tag
            if [ "${{ inputs.make_latest }}" = "true" ]; then
              git tag -f "${{ inputs.app }}/latest"
              git push origin "${{ inputs.app }}/latest" --force
            fi
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ inputs.app }} v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ inputs.make_nightly }}
          make_latest: ${{ inputs.make_nightly == false && inputs.make_latest }}
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
