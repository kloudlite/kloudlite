name: Release
run-name: "Release ${{ inputs.version }}${{ inputs.make_nightly && ' (nightly)' || '' }} [${{ inputs.kli && 'kli, ' || '' }}${{ inputs.kltun && 'kltun, ' || '' }}]"

on:
  workflow_dispatch:
    inputs:
      kli:
        description: 'kli'
        type: boolean
        default: false
      kltun:
        description: 'kltun'
        type: boolean
        default: false
      version:
        description: 'Base version (e.g. 1.2.0, without v prefix)'
        type: string
        required: true
      make_nightly:
        description: 'Publish nightly variant'
        type: boolean
        required: true
        default: false
      make_latest:
        description: 'Move app/latest floating tag (stable releases only)'
        type: boolean
        required: true
        default: false

permissions:
  contents: write

jobs:
  # ── Prepare dynamic matrix ─────────────────────────────────────────
  prepare:
    name: Prepare release matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_apps: ${{ steps.set-matrix.outputs.has_apps }}
    steps:
      - name: Validate version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "::error::version input is required"
            exit 1
          fi

      - name: Build matrix from selected apps
        id: set-matrix
        run: |
          APPS="[]"
          if [ "${{ inputs.kli }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["kli"]'); fi
          if [ "${{ inputs.kltun }}" = "true" ]; then APPS=$(echo "$APPS" | jq -c '. + ["kltun"]'); fi

          if [ "$APPS" = "[]" ]; then
            echo "::error::No binaries selected"
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_apps=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"app\":$APPS}" >> "$GITHUB_OUTPUT"
          echo "Selected binaries: $APPS"

  # ── Build binaries (per app × per OS/arch) ─────────────────────────
  build:
    name: Build ${{ matrix.app }} (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: prepare
    if: needs.prepare.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.prepare.outputs.matrix).app }}
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Set output name
        id: meta
        run: |
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            SUFFIX="${SUFFIX}.exe"
          fi
          echo "suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "output=${{ matrix.app }}-${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'api/go.mod'
          cache-dependency-path: 'api/go.sum'

      - name: Download wintun for Windows builds
        if: matrix.app == 'kltun' && matrix.goos == 'windows'
        run: |
          curl -LO https://www.wintun.net/builds/wintun-0.14.1.zip
          unzip wintun-0.14.1.zip
          mkdir -p api/cmd/kltun/pkg/wintun/dll
          cp wintun/bin/amd64/wintun.dll api/cmd/kltun/pkg/wintun/dll/wintun_amd64.dll
          cp wintun/bin/arm64/wintun.dll api/cmd/kltun/pkg/wintun/dll/wintun_arm64.dll

      - name: Compute version
        id: version
        run: |
          BASE_VERSION="${{ inputs.version }}"
          if [ "${{ inputs.make_nightly }}" = "true" ]; then
            TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
            VERSION="${BASE_VERSION}-nightly.${TIMESTAMP}"
          else
            VERSION="${BASE_VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build binary
        working-directory: ./api
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -v \
            -ldflags="-s -w -X github.com/kloudlite/kloudlite/api/cmd/${{ matrix.app }}/cmd.Version=${{ steps.version.outputs.version }}" \
            -o ../dist/${{ steps.meta.outputs.output }} \
            ./cmd/${{ matrix.app }}

      - name: Generate checksum
        working-directory: ./dist
        run: sha256sum ${{ steps.meta.outputs.output }} > ${{ steps.meta.outputs.output }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.output }}
          path: |
            dist/${{ steps.meta.outputs.output }}
            dist/${{ steps.meta.outputs.output }}.sha256
          retention-days: 1

  # ── Create GitHub Release (per app) ────────────────────────────────
  release:
    name: Release ${{ matrix.app }}
    needs: [prepare, build]
    if: needs.prepare.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.prepare.outputs.matrix).app }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute version and tag
        id: version
        run: |
          BASE_VERSION="${{ inputs.version }}"
          if [ "${{ inputs.make_nightly }}" = "true" ]; then
            TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
            VERSION="${BASE_VERSION}-nightly.${TIMESTAMP}"
          else
            VERSION="${BASE_VERSION}"
          fi
          TAG="${{ matrix.app }}/v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Download artifacts for ${{ matrix.app }}
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.app }}-*
          path: dist-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find dist-artifacts -type f -exec cp {} release-assets/ \;
          ls -lah release-assets/

      - name: Generate release notes
        env:
          APP: ${{ matrix.app }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > release-notes.md << EOF
          # ${APP} ${VERSION}

          ## Installation

          ### Linux (AMD64)
          \`\`\`bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-linux-amd64
          chmod +x ${APP}-linux-amd64
          sudo mv ${APP}-linux-amd64 /usr/local/bin/${APP}
          \`\`\`

          ### Linux (ARM64)
          \`\`\`bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-linux-arm64
          chmod +x ${APP}-linux-arm64
          sudo mv ${APP}-linux-arm64 /usr/local/bin/${APP}
          \`\`\`

          ### macOS (Intel)
          \`\`\`bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-darwin-amd64
          chmod +x ${APP}-darwin-amd64
          sudo mv ${APP}-darwin-amd64 /usr/local/bin/${APP}
          \`\`\`

          ### macOS (Apple Silicon)
          \`\`\`bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-darwin-arm64
          chmod +x ${APP}-darwin-arm64
          sudo mv ${APP}-darwin-arm64 /usr/local/bin/${APP}
          \`\`\`

          ### Windows (AMD64)
          Download [${APP}-windows-amd64.exe](https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-windows-amd64.exe) and add to your PATH.

          ### Windows (ARM64)
          Download [${APP}-windows-arm64.exe](https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-windows-arm64.exe) and add to your PATH.

          ## Verify Checksums

          \`\`\`bash
          curl -LO https://github.com/kloudlite/kloudlite/releases/download/${TAG}/${APP}-linux-amd64.sha256
          sha256sum -c ${APP}-linux-amd64.sha256
          \`\`\`

          For full documentation, see [api/cmd/${APP}/README.md](https://github.com/kloudlite/kloudlite/blob/${TAG}/api/cmd/${APP}/README.md)
          EOF

      - name: Create or move floating tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ steps.version.outputs.tag }}"

          git tag "${TAG}"
          git push origin "${TAG}"

          if [ "${{ inputs.make_nightly }}" = "true" ]; then
            git tag -f "${{ matrix.app }}/nightly"
            git push origin "${{ matrix.app }}/nightly" --force
          else
            if [ "${{ inputs.make_latest }}" = "true" ]; then
              git tag -f "${{ matrix.app }}/latest"
              git push origin "${{ matrix.app }}/latest" --force
            fi
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ matrix.app }} v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ inputs.make_nightly }}
          make_latest: ${{ inputs.make_nightly == false && inputs.make_latest }}
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
