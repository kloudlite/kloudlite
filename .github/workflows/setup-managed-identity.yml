name: Setup Managed Identity

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - setup
          - verify

env:
  RESOURCE_GROUP: rg-kloudlite
  CONTAINER_APP: ca-kloudlite-registration
  JOB_NAME: job-oci-installer

jobs:
  setup-identity:
    name: Setup Managed Identity & Role Assignment
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'setup'
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable system-assigned managed identity
        id: identity
        run: |
          echo "Enabling system-assigned managed identity on ${{ env.CONTAINER_APP }}..."

          RESULT=$(az containerapp identity assign \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --system-assigned \
            -o json)

          PRINCIPAL_ID=$(echo "$RESULT" | jq -r '.principalId')
          echo "principal-id=$PRINCIPAL_ID" >> $GITHUB_OUTPUT
          echo "Principal ID: $PRINCIPAL_ID"

      - name: Get subscription ID and job resource ID
        id: resources
        run: |
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          echo "subscription-id=$SUBSCRIPTION_ID" >> $GITHUB_OUTPUT

          JOB_ID=$(az containerapp job show \
            --name ${{ env.JOB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query id -o tsv)
          echo "job-id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Job Resource ID: $JOB_ID"

      - name: Assign Contributor role on ACA job
        run: |
          echo "Assigning Contributor role to managed identity on ${{ env.JOB_NAME }}..."

          az role assignment create \
            --assignee-object-id ${{ steps.identity.outputs.principal-id }} \
            --assignee-principal-type ServicePrincipal \
            --role "Contributor" \
            --scope "${{ steps.resources.outputs.job-id }}"

          echo "Role assignment complete"

      - name: Summary
        run: |
          echo "## Managed Identity Setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Container App** | ${{ env.CONTAINER_APP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Principal ID** | ${{ steps.identity.outputs.principal-id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Role** | Contributor |" >> $GITHUB_STEP_SUMMARY
          echo "| **Scope** | ${{ env.JOB_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | Configured |" >> $GITHUB_STEP_SUMMARY

  verify-identity:
    name: Verify Managed Identity
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'verify'
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check identity status
        run: |
          echo "## Managed Identity Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          IDENTITY=$(az containerapp show \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "identity" -o json)

          TYPE=$(echo "$IDENTITY" | jq -r '.type')
          PRINCIPAL=$(echo "$IDENTITY" | jq -r '.principalId // "N/A"')

          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Identity Type** | $TYPE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Principal ID** | $PRINCIPAL |" >> $GITHUB_STEP_SUMMARY

          if [ "$TYPE" = "None" ] || [ "$TYPE" = "null" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**No managed identity configured.** Run this workflow with 'setup' action." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Role Assignments" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          az role assignment list \
            --assignee "$PRINCIPAL" \
            --query "[].{Role:roleDefinitionName, Scope:scope}" \
            -o table >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No role assignments found" >> $GITHUB_STEP_SUMMARY
