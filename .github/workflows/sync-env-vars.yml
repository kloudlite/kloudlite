name: Sync Environment Variables to Azure

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Application to sync'
        required: true
        type: choice
        options:
          - console
          - website
          - dashboard
          - all

concurrency:
  group: sync-env-vars-${{ github.event.inputs.app }}
  cancel-in-progress: false

env:
  RESOURCE_GROUP: rg-kloudlite

jobs:
  sync-console:
    name: Sync Console Environment Variables
    runs-on: ubuntu-latest
    if: github.event.inputs.app == 'console' || github.event.inputs.app == 'all'
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync environment variables to Azure Container App
        run: |
          echo "Syncing environment variables for Console..."

          # Build environment variables array
          az containerapp update \
            --name ca-kloudlite-registration \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              "NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://console.kloudlite.io' }}" \
              "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.kloudlite.io' }}" \
              "GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}" \
              "GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}" \
              "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              "MICROSOFT_ENTRA_CLIENT_ID=${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}" \
              "MICROSOFT_ENTRA_CLIENT_SECRET=${{ secrets.MICROSOFT_ENTRA_CLIENT_SECRET }}" \
              "MICROSOFT_ENTRA_TENANT_ID=${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}" \
              "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
              "NEXTAUTH_URL=${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://console.kloudlite.io' }}" \
              "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
              "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
              "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              "CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
              "CLOUDFLARE_DNS_DOMAIN=${{ secrets.CLOUDFLARE_DNS_DOMAIN || 'khost.dev' }}" \
              "CLOUDFLARE_ORIGIN_CA_KEY=${{ secrets.CLOUDFLARE_ORIGIN_CA_KEY }}" \
              "NEXT_PUBLIC_INSTALLATION_DOMAIN=${{ secrets.CLOUDFLARE_DNS_DOMAIN || 'khost.dev' }}" \
              "KLOUDLITE_OCI_TENANCY=${{ secrets.KLOUDLITE_OCI_TENANCY }}" \
              "KLOUDLITE_OCI_USER=${{ secrets.KLOUDLITE_OCI_USER }}" \
              "KLOUDLITE_OCI_REGION=${{ secrets.KLOUDLITE_OCI_REGION }}" \
              "KLOUDLITE_OCI_COMPARTMENT=${{ secrets.KLOUDLITE_OCI_COMPARTMENT }}" \
              "KLOUDLITE_OCI_FINGERPRINT=${{ secrets.KLOUDLITE_OCI_FINGERPRINT }}" \
              "KLOUDLITE_OCI_PRIVATE_KEY=${{ secrets.KLOUDLITE_OCI_PRIVATE_KEY }}" \
              "OCI_INSTALLER_JOB_NAME=${{ secrets.OCI_INSTALLER_JOB_NAME || 'job-oci-installer' }}" \
              "AZURE_RESOURCE_GROUP=${{ secrets.AZURE_RESOURCE_GROUP || 'rg-kloudlite' }}" \
              "AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" \
              "SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL || 'support@kloudlite.io' }}" \
              "SENDGRID_FROM_NAME=${{ secrets.SENDGRID_FROM_NAME || 'Kloudlite' }}" \
              "TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}" \
              "NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}" \
              "NEXT_PUBLIC_CONSOLE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://console.kloudlite.io' }}" \
              "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
              "SUPABASE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              "NEXTAUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
              "ANTHROPIC_AUTH_TOKEN=${{ secrets.ANTHROPIC_AUTH_TOKEN }}" \
              "ANTHROPIC_BASE_URL=${{ secrets.ANTHROPIC_BASE_URL }}" \
              "MICROSOFT_CLIENT_ID=${{ secrets.MICROSOFT_ENTRA_CLIENT_ID }}" \
              "MICROSOFT_CLIENT_SECRET=${{ secrets.MICROSOFT_ENTRA_CLIENT_SECRET }}" \
              "MICROSOFT_TENANT_ID=${{ secrets.MICROSOFT_ENTRA_TENANT_ID }}" \
            --output none

          echo "✓ Environment variables synced successfully"

      - name: Deployment Summary
        run: |
          echo "## Environment Variables Sync: Console" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Container App** | ca-kloudlite-registration |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource Group** | ${{ env.RESOURCE_GROUP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Variables Synced** | 38 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✓ Synced |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: Container app will restart to apply new environment variables." >> $GITHUB_STEP_SUMMARY

  sync-website:
    name: Sync Website Environment Variables
    runs-on: ubuntu-latest
    if: github.event.inputs.app == 'website' || github.event.inputs.app == 'all'
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync environment variables to Azure Container App
        run: |
          echo "Syncing environment variables for Website..."

          az containerapp update \
            --name ca-kloudlite-website \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              "NEXT_PUBLIC_BASE_URL=https://kloudlite.io" \
              "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
              "NEXTAUTH_URL=https://kloudlite.io" \
            --output none

          echo "✓ Environment variables synced successfully"

      - name: Deployment Summary
        run: |
          echo "## Environment Variables Sync: Website" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Container App** | ca-kloudlite-website |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource Group** | ${{ env.RESOURCE_GROUP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Variables Synced** | 3 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✓ Synced |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: Container app will restart to apply new environment variables." >> $GITHUB_STEP_SUMMARY

  sync-dashboard:
    name: Sync Dashboard Environment Variables
    runs-on: ubuntu-latest
    if: github.event.inputs.app == 'dashboard' || github.event.inputs.app == 'all'
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync environment variables to Azure Container App
        run: |
          echo "Syncing environment variables for Dashboard..."

          az containerapp update \
            --name ca-kloudlite-dashboard \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              "NEXT_PUBLIC_BASE_URL=https://dashboard.kloudlite.io" \
              "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
              "NEXTAUTH_URL=https://dashboard.kloudlite.io" \
            --output none

          echo "✓ Environment variables synced successfully"

      - name: Deployment Summary
        run: |
          echo "## Environment Variables Sync: Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Container App** | ca-kloudlite-dashboard |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource Group** | ${{ env.RESOURCE_GROUP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Variables Synced** | 3 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✓ Synced |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: Container app will restart to apply new environment variables." >> $GITHUB_STEP_SUMMARY
