name: Upload Cloud Templates to S3

on:
  push:
    branches:
      - development
      - main
    paths:
      - 'deploy/cloudformation/**'
      - 'deploy/arm-templates/**'
      - '.github/workflows/upload-cloudformation.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload:
    name: Upload to S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create S3 bucket if not exists
        run: |
          BUCKET_NAME="kloudlite-cloudformation-templates"
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Creating bucket $BUCKET_NAME..."
            aws s3api create-bucket --bucket "$BUCKET_NAME" --region us-east-1
            aws s3api put-public-access-block --bucket "$BUCKET_NAME" --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"
            aws s3api put-bucket-policy --bucket "$BUCKET_NAME" --policy '{
              "Version": "2012-10-17",
              "Statement": [{
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::'"$BUCKET_NAME"'/*"
              }]
            }'
          fi

          # Configure CORS for Azure Portal access
          echo "Configuring CORS..."
          aws s3api put-bucket-cors --bucket "$BUCKET_NAME" --cors-configuration '{
            "CORSRules": [{
              "AllowedHeaders": ["*"],
              "AllowedMethods": ["GET", "HEAD"],
              "AllowedOrigins": ["https://portal.azure.com", "https://*.portal.azure.com", "https://console.aws.amazon.com", "https://*.console.aws.amazon.com"],
              "ExposeHeaders": ["ETag"],
              "MaxAgeSeconds": 3600
            }]
          }'

      - name: Upload cloud templates
        run: |
          # Upload AWS CloudFormation templates
          aws s3 sync deploy/cloudformation/ s3://kloudlite-cloudformation-templates/aws/ \
            --content-type "application/x-yaml"

          # Upload Azure ARM templates
          aws s3 sync deploy/arm-templates/ s3://kloudlite-cloudformation-templates/azure/ \
            --content-type "application/json"

          echo "Uploaded files:"
          aws s3 ls s3://kloudlite-cloudformation-templates/ --recursive

      - name: Output template URLs
        run: |
          echo "## Cloud Template URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### AWS CloudFormation" >> $GITHUB_STEP_SUMMARY
          echo "- Template: https://kloudlite-cloudformation-templates.s3.amazonaws.com/aws/aws-oneclick.yaml" >> $GITHUB_STEP_SUMMARY
          echo "- Launch: https://console.aws.amazon.com/cloudformation/home#/stacks/create/review?templateURL=https://kloudlite-cloudformation-templates.s3.amazonaws.com/aws/aws-oneclick.yaml&stackName=kloudlite" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Azure ARM Template" >> $GITHUB_STEP_SUMMARY
          echo "- Template: https://kloudlite-cloudformation-templates.s3.amazonaws.com/azure/azure-oneclick.json" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: https://portal.azure.com/#create/Microsoft.Template/uri/https%3A%2F%2Fkloudlite-cloudformation-templates.s3.amazonaws.com%2Fazure%2Fazure-oneclick.json" >> $GITHUB_STEP_SUMMARY
