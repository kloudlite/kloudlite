version: 3

tasks:
  build:server:
    env:
      CGO_ENABLED: 0
    cmds:
      - go build -ldflags='-s -w' -o bin/api-server ./cmd/server/

  manifests:
    cmds:
      # generate CRDs from type definitions
      - controller-gen rbac:roleName=manager-role crd webhook paths="./..." output:crd:artifacts:config=./manifests

      # generate deep copy go files
      - controller-gen object paths="./..."
      # - controller-gen rbac:roleName=manager-role crd webhook paths="./..." output:stdout

  consolidate-crds:
    desc: Consolidate all CRD manifests into single file for kli
    cmds:
      - cat manifests/*.yaml > cmd/kli/internal/manifests/crds.yaml
      - echo "Consolidated CRDs into cmd/kli/internal/manifests/crds.yaml"
