apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-server
  namespace: kloudlite
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: api-server
rules:
  # Admin access to all resources
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  # Non-resource URLs (for health checks, metrics, etc.)
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: api-server
subjects:
  - kind: ServiceAccount
    name: api-server
    namespace: kloudlite
roleRef:
  kind: ClusterRole
  name: api-server
  apiGroup: rbac.authorization.k8s.io
