apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-server
  namespace: kloudlite
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: api-server
rules:
  # Core resources
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - services
      - secrets
      - configmaps
      - namespaces
      - nodes
      - persistentvolumeclaims
      - events
      - serviceaccounts
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups:
    - rbac.authorization.k8s.io
    resources:
    - roles
    - rolebindings
    - clusterroles
    - clusterrolebindings
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Deployments and StatefulSets
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # CronJobs and Jobs
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Workspaces CRDs
  - apiGroups: ["workspaces.kloudlite.io"]
    resources:
      - workspaces
      - packagerequests
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]

  - apiGroups: ["workspaces.kloudlite.io"]
    resources:
      - workspaces/status
      - packagerequests/status
    verbs: ["get", "update", "patch"]

  # Environments CRDs
  - apiGroups: ["environments.kloudlite.io"]
    resources:
      - environments
      - compositions
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]

  - apiGroups: ["environments.kloudlite.io"]
    resources:
      - environments/status
      - compositions/status
    verbs: ["get", "update", "patch"]

  # Machines CRDs
  - apiGroups: ["machines.kloudlite.io"]
    resources:
      - workmachines
      - machinetypes
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]

  - apiGroups: ["machines.kloudlite.io"]
    resources:
      - workmachines/status
      - machinetypes/status
    verbs: ["get", "update", "patch"]

  # Service Intercepts CRDs
  - apiGroups: ["intercepts.kloudlite.io"]
    resources:
      - serviceintercepts
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]

  - apiGroups: ["intercepts.kloudlite.io"]
    resources:
      - serviceintercepts/status
    verbs: ["get", "update", "patch"]

  # Packages CRDs
  - apiGroups: ["packages.kloudlite.io"]
    resources:
      - packagerequests
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]

  - apiGroups: ["packages.kloudlite.io"]
    resources:
      - packagerequests/status
    verbs: ["get", "update", "patch"]

  # Auth CRDs
  - apiGroups: ["auth.kloudlite.io"]
    resources:
      - connectiontokens
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]

  - apiGroups: ["auth.kloudlite.io"]
    resources:
      - connectiontokens/status
    verbs: ["get", "update", "patch"]

  # Platform CRDs
  - apiGroups: ["platform.kloudlite.io"]
    resources:
      - users
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]

  - apiGroups: ["platform.kloudlite.io"]
    resources:
      - users/status
    verbs: ["get", "update", "patch"]

  # Domain Request CRDs
  - apiGroups: ["domains.kloudlite.io"]
    resources:
      - domainrequests
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]

  - apiGroups: ["domains.kloudlite.io"]
    resources:
      - domainrequests/status
    verbs: ["get", "update", "patch"]

  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: api-server
subjects:
  - kind: ServiceAccount
    name: api-server
    namespace: kloudlite
roleRef:
  kind: ClusterRole
  name: api-server
  apiGroup: rbac.authorization.k8s.io
