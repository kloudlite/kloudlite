apiVersion: v1
kind: Namespace
metadata:
  name: kloudlite
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: kloudlite
spec:
  selector:
    app: api-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  clusterIP: None  # Headless service for StatefulSet
---
apiVersion: v1
kind: Service
metadata:
  name: api-server-lb
  namespace: kloudlite
spec:
  type: LoadBalancer
  selector:
    app: api-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: api-server
  namespace: kloudlite
spec:
  serviceName: api-server
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      serviceAccountName: api-server
      containers:
        - name: api-server
          image: ghcr.io/kloudlite/kloudlite/api-server:development
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
