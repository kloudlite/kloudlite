apiVersion: v1
kind: Namespace
metadata:
  name: kloudlite
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: kloudlite
spec:
  type: ClusterIP
  selector:
    app: api-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: https
      port: 443
      targetPort: 8443
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: api-server
  namespace: kloudlite
spec:
  serviceName: api-server
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      serviceAccountName: api-server
      containers:
        - name: api-server
          image: ghcr.io/kloudlite/kloudlite/api-server:development
          command: ["/usr/local/bin/api-server"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          envFrom:
            - configMapRef:
                name: api-server-config
            - secretRef:
                name: api-server-secret
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_MANAGER_IMAGE
              value: "ghcr.io/kloudlite/kloudlite/api-server:development"
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: webhook-certs
          secret:
            secretName: webhook-server-cert
