                format: date-time
                type: string
              lastIPRegistrationTime:
                description: LastIPRegistrationTime is when the IP was last registered
                format: date-time
                type: string
              message:
                description: Message provides additional information about the current
                  state
                type: string
              originCertificateSecretName:
                description: |-
                  OriginCertificateSecretName is the name of the Kubernetes Secret containing the installation's origin certificate
                  This certificate is shared across all DomainRequests for the same installation
                type: string
              state:
                default: Pending
                description: State represents the current state of the DomainRequest
                enum:
                - Pending
                - CertificateDownloading
                - CertificateGenerated
                - CertificateReady
                - HAProxyCreating
                - HAProxyReady
                - IPRegistering
                - Ready
                - Failed
                type: string
              subdomain:
                description: Subdomain is the subdomain assigned to this registration
                type: string
            required:
            - state
            type: object
