      name: Type
      type: string
    - jsonPath: .status.domain
      name: Domain
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          DomainRequest represents a request to register an IP address with console.kloudlite.io
          and fetch TLS certificates for the domain
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DomainRequestSpec defines the desired state of DomainRequest
            properties:
              certificateParentScopeIdentifier:
                description: |-
                  CertificateParentScopeIdentifier is the parent scope identifier
                  (e.g., workmachine name for workspace certificates)
                type: string
              certificateScope:
                default: installation
                description: CertificateScope defines the scope for certificate generation
                enum:
                - installation
                - workmachine
                - workspace
                type: string
              certificateScopeIdentifier:
                description: |-
                  CertificateScopeIdentifier is the identifier for the certificate scope
                  (e.g., workmachine name or workspace name)
                type: string
              domainRoutes:
                description: DomainRoutes defines domain-based routing rules for HAProxy
                items:
                  description: DomainRoute defines a domain-based routing rule
                  properties:
                    domain:
                      description: Domain is the domain name to match (e.g., "example.khost.dev")
                      type: string
                    serviceName:
                      description: ServiceName is the name of the backend service
                        for this domain
                      type: string
                    serviceNamespace:
                      description: ServiceNamespace is the namespace of the backend
                        service
                      type: string
                    servicePort:
                      description: ServicePort is the port of the backend service
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                  required:
                  - domain
                  - serviceName
                  - serviceNamespace
                  - servicePort
                  type: object
                type: array
              ingressBackend:
                description: IngressBackend defines the backend service to route traffic
                  to
                properties:
                  serviceName:
                    description: ServiceName is the name of the backend service
                    type: string
                  serviceNamespace:
                    description: ServiceNamespace is the namespace of the backend
                      service
                    type: string
                  servicePort:
                    description: ServicePort is the port of the backend service
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                required:
