apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: domainrequests.domains.kloudlite.io
spec:
  group: domains.kloudlite.io
  names:
    kind: DomainRequest
    listKind: DomainRequestList
    plural: domainrequests
    singular: domainrequest
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.ipAddress
      name: IP Address
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.domain
      name: Domain
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          DomainRequest represents a request to register an IP address with console.kloudlite.io
          and fetch TLS certificates for the domain
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DomainRequestSpec defines the desired state of DomainRequest
            properties:
              certificateParentScopeIdentifier:
                description: |-
                  CertificateParentScopeIdentifier is the parent scope identifier
                  (e.g., workmachine name for workspace certificates)
                type: string
              certificateScope:
                default: installation
                description: CertificateScope defines the scope for certificate generation
                enum:
                - installation
                - workmachine
                - workspace
                type: string
              certificateScopeIdentifier:
                description: |-
                  CertificateScopeIdentifier is the identifier for the certificate scope
                  (e.g., workmachine name or workspace name)
                type: string
              domainRoutes:
                description: DomainRoutes defines domain-based routing rules for HAProxy
                items:
                  description: DomainRoute defines a domain-based routing rule
                  properties:
                    domain:
                      description: Domain is the domain name to match (e.g., "example.khost.dev")
                      type: string
                    serviceName:
                      description: ServiceName is the name of the backend service
                        for this domain
                      type: string
                    serviceNamespace:
                      description: ServiceNamespace is the namespace of the backend
                        service
                      type: string
                    servicePort:
                      description: ServicePort is the port of the backend service
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                  required:
                  - domain
                  - serviceName
                  - serviceNamespace
                  - servicePort
                  type: object
                type: array
              ingressBackend:
                description: IngressBackend defines the backend service to route traffic
                  to
                properties:
                  serviceName:
                    description: ServiceName is the name of the backend service
                    type: string
                  serviceNamespace:
                    description: ServiceNamespace is the namespace of the backend
                      service
                    type: string
                  servicePort:
                    description: ServicePort is the port of the backend service
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                required:
                - serviceName
                - serviceNamespace
                - servicePort
                type: object
              ipAddress:
                description: |-
                  IPAddress is the IP address to register
                  If not provided, will be auto-detected from the LoadBalancer service
                type: string
              loadBalancerServiceName:
                description: |-
                  LoadBalancerServiceName is the name of the LoadBalancer service to watch for IP
                  Used for auto-detecting the IP address
                type: string
              loadBalancerServiceNamespace:
                description: LoadBalancerServiceNamespace is the namespace of the
                  LoadBalancer service
                type: string
              nodeName:
                description: |-
                  NodeName is the name of the node where HAProxy pod should be scheduled
                  The node should have the public IP address
                type: string
              originCertificateHostnames:
                description: |-
                  OriginCertificateHostnames specifies the hostnames to include in the origin certificate
                  If not provided, defaults to ["subdomain.domain", "*.subdomain.domain"]
                  Note: Cloudflare only allows ONE wildcard per hostname at the beginning
                  Valid: ["example.com", "*.example.com"]
                  Invalid: ["*.*.example.com", "test.*.example.com"]
                items:
                  type: string
                type: array
              sshBackend:
                description: |-
                  SSHBackend defines the SSH backend service for port 22 traffic
                  If configured, HAProxy will route SSH protocol traffic to this backend
                properties:
                  serviceName:
                    description: ServiceName is the name of the backend service
                    type: string
                  serviceNamespace:
                    description: ServiceNamespace is the namespace of the backend
                      service
                    type: string
                  servicePort:
                    description: ServicePort is the port of the backend service
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                required:
                - serviceName
                - serviceNamespace
                - servicePort
                type: object
              workloadNamespace:
                default: kloudlite-ingress
                description: |-
                  WorkloadNamespace is the namespace where DomainRequest workloads (HAProxy pod, configmap, secret) run
                  All DomainRequests share a common workload namespace for centralized ingress management
                minLength: 1
                type: string
            required:
            - certificateScope
            - nodeName
            - workloadNamespace
            type: object
          status:
            description: DomainRequestStatus defines the observed state of DomainRequest
            properties:
              dnsRecordIds:
                description: DNSRecordIDs contains the Cloudflare DNS record IDs created
                items:
                  type: string
                type: array
              domain:
                description: Domain is the registered domain name
                type: string
              haProxyPodName:
                description: HAProxyPodName is the name of the HAProxy pod created
                  for this domain
                type: string
              haProxyReady:
                description: HAProxyReady indicates if the HAProxy pod is ready and
                  serving traffic
                type: boolean
              lastIPRegistrationTime:
                description: LastIPRegistrationTime is when the IP was last registered
                format: date-time
                type: string
              lastReconciledRoutesHash:
                description: |-
                  LastReconciledRoutesHash stores a hash of the last reconciled DomainRoutes
                  Used to detect when routes have changed and need DNS record updates
                type: string
              lastReconciledRoutesHashUpdated:
                description: LastReconciledRoutesHashUpdated is a timestamp to track
                  hash updates
                format: date-time
                type: string
              message:
                description: Message provides additional information about the current
                  state
                type: string
              originCertificateSecretName:
                description: |-
                  OriginCertificateSecretName is the name of the Kubernetes Secret containing the installation's origin certificate
                  This certificate is shared across all DomainRequests for the same installation
                type: string
              state:
                default: Pending
                description: State represents the current state of the DomainRequest
                enum:
                - Pending
                - CertificateDownloading
                - CertificateGenerated
                - CertificateReady
                - HAProxyCreating
                - HAProxyReady
                - IPRegistering
                - Ready
                - Failed
                type: string
              subdomain:
                description: Subdomain is the subdomain assigned to this registration
                type: string
            required:
            - state
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
