---
apiVersion: v1
kind: ConfigMap
metadata:
  name: image-registry-readonly-proxy
  namespace: kloudlite
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      upstream registry {
        server localhost:5000;
      }
      server {
        listen 5001;

        # Only allow read operations (GET, HEAD)
        location / {
          limit_except GET HEAD {
            deny all;
          }
          proxy_pass http://registry;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # Large layer support
          client_max_body_size 0;
          proxy_read_timeout 900;
        }

        # Health check
        location /health {
          return 200 'OK';
          add_header Content-Type text/plain;
        }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: image-registry-config
  namespace: kloudlite
data:
  config.yml: |
    version: 0.1
    log:
      fields:
        service: registry
    storage:
      s3:
        # Authentication: Uses IAM role attached to the AWS node (auto-detected from EC2 metadata)
        # Region: Auto-detected from EC2 instance metadata
        # Required IAM permissions: s3:ListBucket, s3:GetObject, s3:PutObject, s3:DeleteObject
        region: ${REGION}
        bucket: ${BUCKET_NAME}
        encrypt: false
        secure: true
        v4auth: true
        rootdirectory: /image-registry
      delete:
        enabled: true
      cache:
        blobdescriptor: inmemory
    http:
      addr: :5000
      host: https://${REGISTRY_HOST}
      headers:
        X-Content-Type-Options: [nosniff]
    health:
      storagedriver:
        enabled: true
        interval: 10s
        threshold: 3
    # Authentication is handled by wm-ingress-controller at the ingress layer
    # Registry runs without auth - only accessible via ingress which validates requests
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-registry
  namespace: kloudlite
  labels: &labels
    app: image-registry
spec:
  replicas: 1
  selector:
    matchLabels: *labels
  template:
    metadata:
      labels: *labels
    spec:
      containers:
      - name: image-registry
        image: registry:3
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        env:
        - name: OTEL_TRACES_EXPORTER
          value: "none"
        volumeMounts:
        - name: registry-config
          mountPath: /etc/distribution/config.yml
          subPath: config.yml
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      # Nginx sidecar for read-only access via NodePort (for Kubernetes pulls)
      - name: readonly-proxy
        image: nginx:1.25-alpine
        ports:
        - containerPort: 5001
          name: readonly
          protocol: TCP
        volumeMounts:
        - name: readonly-proxy-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: registry-config
        configMap:
          name: image-registry-config
      - name: readonly-proxy-config
        configMap:
          name: image-registry-readonly-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: image-registry
  namespace: kloudlite
  labels:
    app: image-registry
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: image-registry
---
# NodePort service for read-only access from K3s nodes (for Kubernetes image pulls)
# K3s registries.yaml should mirror cr.{subdomain} to localhost:30500
apiVersion: v1
kind: Service
metadata:
  name: image-registry-readonly
  namespace: kloudlite
  labels:
    app: image-registry
spec:
  type: NodePort
  ports:
  - port: 5001
    targetPort: 5001
    nodePort: 30500
    protocol: TCP
    name: readonly
  selector:
    app: image-registry
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: image-registry
  namespace: kloudlite
  labels:
    app: image-registry
  annotations:
    # Allow large image uploads (10GB)
    nginx.ingress.kubernetes.io/proxy-body-size: "10240m"
spec:
  rules:
  - host: ${REGISTRY_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: image-registry
            port:
              number: 5000
