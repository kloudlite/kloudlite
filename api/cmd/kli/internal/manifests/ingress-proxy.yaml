apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-proxy-config
  namespace: kloudlite
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }

    http {
        access_log /dev/stdout combined;

        # Temp paths for non-root
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path /tmp/proxy_temp;
        fastcgi_temp_path /tmp/fastcgi_temp;
        uwsgi_temp_path /tmp/uwsgi_temp;
        scgi_temp_path /tmp/scgi_temp;

        # Runtime DNS resolution (allows nginx to start even if upstream is not ready)
        resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;
        resolver_timeout 5s;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffer_size 4k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;

        # WebSocket support
        map $http_upgrade $connection_upgrade {
            default upgrade;
            '' close;
        }

        # HTTP server - all traffic arrives via Cloudflare (TLS terminated at edge)
        server {
            listen 80;
            server_name _;

            # Health check endpoint
            location /health {
                return 200 'OK';
                add_header Content-Type text/plain;
            }

            # Waiting page when backend is unavailable
            error_page 502 503 504 @waiting;
            location @waiting {
                default_type text/html;
                return 503 '<!DOCTYPE html>
                <html>
                <head>
                    <title>Starting up...</title>
                    <meta http-equiv="refresh" content="5">
                    <style>
                        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
                        .container { text-align: center; }
                        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #333; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
                        @keyframes spin { to { transform: rotate(360deg); } }
                    </style>
                </head>
                <body>
                    <div class="container">
                        <div class="spinner"></div>
                        <h2>Starting up...</h2>
                        <p>The service is initializing. This page will refresh automatically.</p>
                    </div>
                </body>
                </html>';
            }

            # Forward all traffic to frontend
            # Cloudflare handles HTTPS redirect at the edge
            location / {
                set $frontend_upstream frontend.kloudlite.svc.cluster.local;
                proxy_pass http://$frontend_upstream:80;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
            }
        }

    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ingress-proxy
  namespace: kloudlite
  labels:
    app: ingress-proxy
spec:
  selector:
    matchLabels:
      app: ingress-proxy
  template:
    metadata:
      labels:
        app: ingress-proxy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 80
              hostPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsUser: 0
            runAsGroup: 0
      volumes:
        - name: config
          configMap:
            name: ingress-proxy-config
        - name: tmp
          emptyDir: {}
