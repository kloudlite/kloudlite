# Validating Webhook Configurations
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kloudlite-validating-webhook
webhooks:
  # User validation
  - name: users.kloudlite.io
    clientConfig:
      service:
        name: api-server
        namespace: kloudlite
        path: /webhooks/validate/users
        port: 443
      caBundle: ""  # Will be populated during installation
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["platform.kloudlite.io"]
        apiVersions: ["v1alpha1"]
        resources: ["users"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail

  # Environment validation
  - name: environments.kloudlite.io
    clientConfig:
      service:
        name: api-server
        namespace: kloudlite
        path: /webhooks/validate/environments
        port: 443
      caBundle: ""
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["environments.kloudlite.io"]
        apiVersions: ["v1"]
        resources: ["environments"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail

  # MachineType validation
  - name: machinetypes.kloudlite.io
    clientConfig:
      service:
        name: api-server
        namespace: kloudlite
        path: /webhooks/validate/machinetypes
        port: 443
      caBundle: ""
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["machines.kloudlite.io"]
        apiVersions: ["v1"]
        resources: ["machinetypes"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail

  # WorkMachine validation
  - name: workmachines.kloudlite.io
    clientConfig:
      service:
        name: api-server
        namespace: kloudlite
        path: /webhooks/validate/workmachines
        port: 443
      caBundle: ""
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["machines.kloudlite.io"]
        apiVersions: ["v1"]
        resources: ["workmachines"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail

  # Workspace validation
  - name: workspaces.kloudlite.io
    clientConfig:
      service:
        name: api-server
        namespace: kloudlite
        path: /webhooks/validate/workspaces
        port: 443
      caBundle: ""
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["workspaces.kloudlite.io"]
        apiVersions: ["v1"]
        resources: ["workspaces"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail

  # Composition validation
  - name: compositions.kloudlite.io
    clientConfig:
      service:
        name: api-server
        namespace: kloudlite
        path: /webhooks/validate/compositions
        port: 443
      caBundle: ""
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["compositions.kloudlite.io"]
        apiVersions: ["v1"]
        resources: ["compositions"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail

  # ConfigMap validation (for environment variables)
  - name: configmaps.kloudlite.io
    clientConfig:
      service:
        name: api-server
        namespace: kloudlite
        path: /webhooks/validate/configmaps
        port: 443
      caBundle: ""
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["configmaps"]
    namespaceSelector:
      matchExpressions:
        - key: kloudlite.io/managed
          operator: In
          values: ["true"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore  # Don't fail on configmap validation errors

  # Secret validation (for environment variables)
  - name: secrets.kloudlite.io
    clientConfig:
      service:
        name: api-server
        namespace: kloudlite
        path: /webhooks/validate/secrets
        port: 443
      caBundle: ""
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["secrets"]
    namespaceSelector:
      matchExpressions:
        - key: kloudlite.io/managed
          operator: In
          values: ["true"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore  # Don't fail on secret validation errors

  # ServiceIntercept validation
  - name: serviceintercepts.kloudlite.io
    clientConfig:
      service:
        name: api-server
        namespace: kloudlite
        path: /webhooks/validate/serviceintercepts
        port: 443
      caBundle: ""
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["intercepts.kloudlite.io"]
        apiVersions: ["v1"]
        resources: ["serviceintercepts"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail

  # DomainRequest validation
  - name: domainrequests.kloudlite.io
    clientConfig:
      service:
        name: api-server
        namespace: kloudlite
        path: /validate-domains-kloudlite-io-v1-domainrequest
        port: 443
      caBundle: ""
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["domains.kloudlite.io"]
        apiVersions: ["v1"]
        resources: ["domainrequests"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail

---
