---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /webhooks/validate/domainrequests
  failurePolicy: Fail
  name: domainrequests.kloudlite.io
  rules:
  - apiGroups:
    - domains.kloudlite.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - domainrequests
  sideEffects: None
