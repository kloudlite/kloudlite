---
apiVersion: machines.kloudlite.io/v1
kind: MachineType
metadata:
  name: g4dn-xlarge
spec:
  displayName: "GPU Starter (g4dn.xlarge)"
  description: "For ML/AI testing and light GPU workloads - NVIDIA T4 GPU with basic compute"
  category: gpu
  resources:
    cpu: "4"
    memory: "16Gi"
    gpu: "1"
  active: true
  isDefault: false
  priority: 50
  nodeSelector:
    nvidia.com/gpu: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
