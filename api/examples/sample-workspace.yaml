apiVersion: workspaces.kloudlite.io/v1
kind: Workspace
metadata:
  name: test-workspace
  namespace: default
spec:
  displayName: "Test Development Workspace"
  description: "A test workspace for development"
  owner: "test@kloudlite.io"
  storageSize: "10Gi"
  # storageClassName: "fast-ssd"  # Optional: specify storage class
  workspacePath: "/workspace"
  vscodeVersion: "latest"
  status: "active"

  # Packages to install in the workspace (using Nix)
  packages:
    # Latest from unstable (no channel/commit specified)
    - name: vim

    # From a specific stable release channel
    - name: nodejs_22
      channel: "nixos-24.05"

    # From a specific nixpkgs commit for exact version control
    # Use https://lazamar.co.uk/nix-versions/ to find commit hashes for specific versions
    - name: nodejs_20
      nixpkgsCommit: "abc123def456"  # Replace with actual commit hash

    # Using git from unstable
    - name: git

  resourceQuota:
    cpu: "1"
    memory: "2Gi"
  settings:
    autoStop: true
    idleTimeout: 30
    environmentVariables:
      NODE_ENV: "development"
      DEBUG: "true"
