#!/usr/bin/env bash
set -x

# Log to both console and file
exec > >(tee /var/log/user-data.log)
exec 2>&1

function log() {
  echo "[$(date -Iseconds)] $*"
}

# # --- Install and start SSM Agent for remote access ---
# log "Setting up AWS SSM Agent..."
#
# # Ubuntu 24.04 comes with snap-based SSM agent, but we'll use the deb package for better compatibility
# snap remove amazon-ssm-agent || true
#
# # Install SSM agent via snap (recommended for Ubuntu 24.04)
# snap install amazon-ssm-agent --classic || true
#
# # Start and enable SSM agent
# systemctl enable snap.amazon-ssm-agent.amazon-ssm-agent.service || true
# systemctl start snap.amazon-ssm-agent.amazon-ssm-agent.service || true

# log "SSM Agent installation completed"

# --- System tuning ---
log "Disabling swap and preparing system..."

swapoff -a || true
sed -i '/ swap / s/^/#/' /etc/fstab || true

# --- GPU Detection and Setup ---
# This function is idempotent and safe to run on every boot
# It detects GPU hardware and configures the container runtime accordingly
function setup_gpu_runtime() {
  log "=== Starting GPU Detection and Setup (idempotent) ==="

  # Check if lspci is available
  if ! command -v lspci &> /dev/null; then
    log "Installing pciutils for GPU detection..."
    apt-get update -qq
    apt-get install -y pciutils curl gpg
  fi

  # Check if NVIDIA GPU is present
  log "Checking for NVIDIA GPU hardware..."
  if ! lspci | grep -i nvidia > /dev/null 2>&1; then
    log "No NVIDIA GPU detected"

    # Disable NVIDIA runtime if it was previously configured
    if [ -f /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl ]; then
      log "Removing NVIDIA runtime configuration (no GPU present)"
      rm -f /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl

      # Restart K3s if it's running to apply config changes
      if systemctl is-active --quiet k3s-agent; then
        log "Restarting K3s agent to apply runtime changes..."
        systemctl restart k3s-agent || true
      fi
    fi

    return 0
  fi

  log "✓ NVIDIA GPU detected!"
  lspci | grep -i nvidia

  # Check if nvidia-smi is working (drivers installed and loaded)
  log "Checking NVIDIA drivers status..."
  if nvidia-smi > /dev/null 2>&1; then
    log "✓ NVIDIA drivers already installed and working"
    nvidia-smi --query-gpu=driver_version,name --format=csv,noheader
  else
    log "NVIDIA drivers not working, checking installation status..."

    # Check if drivers are installed but modules not loaded
    if dpkg -l | grep -q "cuda-toolkit\|nvidia-driver"; then
      log "Drivers installed but modules not loaded, attempting to load..."

      # Try loading kernel modules
      if modprobe nvidia 2>/dev/null && \
         modprobe nvidia-uvm 2>/dev/null && \
         modprobe nvidia-modeset 2>/dev/null; then
        log "✓ Kernel modules loaded successfully"
      else
        log "ERROR: Failed to load kernel modules, reboot required"
        log "Rebooting system in 60 seconds to load NVIDIA drivers..."
        shutdown -r +1 "Rebooting to load NVIDIA drivers"
        return 0
      fi
    else
      # Drivers not installed, install them using NVIDIA CUDA toolkit
      log "Installing NVIDIA CUDA toolkit and drivers..."

      # Install prerequisites
      apt-get update
      DEBIAN_FRONTEND=noninteractive apt-get install -y wget software-properties-common gnupg2

      # Detect distribution for CUDA repo
      distribution=$(. /etc/os-release; echo $ID$VERSION_ID | sed 's/\.//g')
      log "Detected distribution: $distribution"

      # Register NVIDIA CUDA repository if not already registered
      if [ ! -f /etc/apt/sources.list.d/cuda-${distribution}-x86_64.list ]; then
        log "Registering NVIDIA CUDA repository..."
        wget -q https://developer.download.nvidia.com/compute/cuda/repos/${distribution}/x86_64/cuda-keyring_1.1-1_all.deb
        dpkg -i cuda-keyring_1.1-1_all.deb
        rm -f cuda-keyring_1.1-1_all.deb
        apt-get update
      fi

      # Install CUDA toolkit (includes drivers)
      log "Installing CUDA toolkit..."
      DEBIAN_FRONTEND=noninteractive apt-get install -y cuda-toolkit

      # Install driver (try open source first, fallback to proprietary)
      log "Installing NVIDIA driver..."
      DEBIAN_FRONTEND=noninteractive apt-get install -y nvidia-open || \
      DEBIAN_FRONTEND=noninteractive apt-get install -y nvidia-driver

      # Install optional components
      DEBIAN_FRONTEND=noninteractive apt-get install -y nvidia-gds 2>/dev/null || true
      DEBIAN_FRONTEND=noninteractive apt-get install -y nvidia-fabricmanager 2>/dev/null || true

      # Enable services
      systemctl enable nvidia-fabricmanager 2>/dev/null || true
      systemctl enable nvidia-persistenced 2>/dev/null || true

      log "✓ NVIDIA drivers installed"

      # Try loading kernel modules (may require reboot)
      if modprobe nvidia 2>/dev/null && \
         modprobe nvidia-uvm 2>/dev/null && \
         modprobe nvidia-modeset 2>/dev/null; then
        log "✓ Kernel modules loaded successfully"
      else
        log "Failed to load kernel modules, reboot required"
        log "Rebooting system in 60 seconds to load NVIDIA drivers..."
        shutdown -r +1 "Rebooting to load NVIDIA drivers"
        return 0
      fi
    fi
  fi

  # At this point, nvidia-smi should be working
  if ! nvidia-smi > /dev/null 2>&1; then
    log "ERROR: NVIDIA drivers not working after installation"
    return 1
  fi

  # Check if NVIDIA Container Toolkit is installed
  log "Checking for NVIDIA Container Toolkit..."
  if ! command -v nvidia-container-cli &> /dev/null; then
    log "Installing NVIDIA Container Toolkit..."

    distribution=$(. /etc/os-release;echo $ID$VERSION_ID)
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    curl -s -L https://nvidia.github.io/libnvidia-container/$distribution/libnvidia-container.list | \
      sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
      tee /etc/apt/sources.list.d/nvidia-container-toolkit.list

    apt-get update
    DEBIAN_FRONTEND=noninteractive apt-get install -y nvidia-container-toolkit

    log "✓ NVIDIA Container Toolkit installed"
  else
    log "✓ NVIDIA Container Toolkit already installed"
  fi

  nvidia-container-cli --version

  # Configure containerd for NVIDIA runtime
  log "Configuring K3s containerd for NVIDIA runtime..."
  mkdir -p /var/lib/rancher/k3s/agent/etc/containerd
  cat > /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl << 'EOF'
[plugins."io.containerd.grpc.v1.cri".containerd]
  default_runtime_name = "nvidia"

[plugins."io.containerd.grpc.v1.cri".containerd.runtimes.nvidia]
  runtime_type = "io.containerd.runc.v2"

[plugins."io.containerd.grpc.v1.cri".containerd.runtimes.nvidia.options]
  BinaryName = "/usr/bin/nvidia-container-runtime"
EOF

  log "✓ Containerd configured for NVIDIA runtime"
  log "=== GPU Setup Complete ==="
}

# Run GPU setup before K3s installation
setup_gpu_runtime

log "Starting K3s agent setup..."

export K3S_VERSION={{.K3sVersion}}
export K3S_URL="{{.K3sURL}}"
export K3S_TOKEN="{{.K3sAgentToken}}"

export MACHINE_NAME="{{.MachineName}}"
export MACHINE_OWNER="{{.MachineOwner}}"

export INSTALL_K3S_EXEC="agent \
  --node-name=${MACHINE_NAME} \
  --node-label=kloudlite.io/workmachine=${MACHINE_NAME} \
  --node-label=kloudlite.io/owner=${MACHINE_OWNER} \
  --node-taint=kloudlite.io/workmachine=${MACHINE_NAME}:NoSchedule \
  --kubelet-arg=system-reserved=cpu=100m,memory=256Mi \
  --kubelet-arg=kube-reserved=cpu=100m,memory=256Mi \
  --kubelet-arg=eviction-hard=memory.available<200Mi,nodefs.available<5% \
  --kubelet-arg=eviction-soft=memory.available<300Mi,nodefs.available<10% \
  --kubelet-arg=eviction-soft-grace-period=memory.available=1m,nodefs.available=2m \
  --kubelet-arg=cgroup-driver=systemd \
  --kubelet-arg=fail-swap-on=false"

curl -sfL https://get.k3s.io | sh -

log "k3s agent ($MACHINE_NAME) installed, node will join cluster soon ..."
