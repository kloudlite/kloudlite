                properties:
                  configMapsRestored:
                    description: ConfigMapsRestored is the number of configmaps restored
                    format: int32
                    type: integer
                  secretsRestored:
                    description: SecretsRestored is the number of secrets restored
                    format: int32
                    type: integer
