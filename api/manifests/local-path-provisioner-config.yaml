apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config
  namespace: kube-system
data:
  config.json: |
    {
      "nodePathMap": [
        {
          "node": "DEFAULT_PATH_FOR_NON_LISTED_NODES",
          "paths": ["/var/lib/kloudlite/storage/environments"]
        }
      ]
    }
  setup: |
    #!/bin/bash
    set -eu

    # VOL_DIR format with pathPattern: /var/lib/kloudlite/storage/environments/{namespace}/{claim-name}/{pv-name}
    # Extract namespace (first directory after base path)
    NAMESPACE=$(echo "$VOL_DIR" | sed "s|/var/lib/kloudlite/storage/environments/||" | cut -d'/' -f1)
    BASE_DIR="/var/lib/kloudlite/storage/environments"
    NS_SUBVOL="${BASE_DIR}/${NAMESPACE}"

    # Create namespace btrfs subvolume if it doesn't exist (for snapshots)
    if [ ! -d "$NS_SUBVOL" ]; then
      echo "Creating btrfs subvolume for namespace: $NAMESPACE"
      btrfs subvolume create "$NS_SUBVOL" || mkdir -p "$NS_SUBVOL"
    fi

    # Create the PVC directory (pathPattern provides the full nested path)
    mkdir -m 0777 -p "$VOL_DIR"
    echo "PVC storage ready at $VOL_DIR"
  teardown: |
    #!/bin/bash
    set -eu
    rm -rf "$VOL_DIR"
  helperPod.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: helper-pod
    spec:
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: helper-pod
          image: rancher/mirrored-library-busybox:1.36.1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
