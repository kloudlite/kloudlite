---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workmachines.machines.kloudlite.io
spec:
  group: machines.kloudlite.io
  names:
    kind: WorkMachine
    listKind: WorkMachineList
    plural: workmachines
    singular: workmachine
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.ownedBy
      name: Owner
      type: string
    - jsonPath: .spec.machineType
      name: Machine Type
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.startedAt
      name: Started At
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: WorkMachine represents a user's personal development machine
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkMachineSpec defines the desired state of WorkMachine
            properties:
              allowedCIDR:
                default: 0.0.0.0/0
                type: string
              autoShutdown:
                description: |-
                  AutoShutdown configures automatic instance shutdown when idle
                  Only applicable for cloud providers (AWS, GCP, Azure)
                properties:
                  checkIntervalMinutes:
                    default: 5
                    description: CheckIntervalMinutes is how often to check workspace
                      activity
                    format: int32
                    maximum: 60
                    minimum: 1
                    type: integer
                  enabled:
                    default: true
                    description: Enabled determines if auto-shutdown is active
                    type: boolean
                  idleThresholdMinutes:
                    default: 30
                    description: |-
                      IdleThresholdMinutes is how long to wait after all workspaces are suspended
                      before shutting down the WorkMachine EC2 instance
                    format: int32
                    maximum: 1440
                    minimum: 5
                    type: integer
                required:
                - checkIntervalMinutes
                - enabled
                - idleThresholdMinutes
                type: object
              aws:
                description: AWSProvider contains AWS-specific configuration
                properties:
                  deleteVolumePostTermination:
                    type: boolean
                  domainName:
                    description: |-
                      DomainName is the base domain for WorkMachine DNS records
                      (e.g., "workmachines.example.com" → "<machine-name>.workmachines.example.com")
                    type: string
                  iamRole:
                    description: IAMRole is the IAM role name to attach to the instance
                    type: string
                  machineType:
                    description: MachineType is the EC2 instance type (e.g., m5.large,
                      t3.medium)
                    type: string
                  volumeSize:
                    default: 50
                    description: VolumeSize is the size of the root EBS volume in
                      GB
                    format: int32
                    maximum: 1000
                    minimum: 20
                    type: integer
                  volumeType:
                    default: gp3
                    description: VolumeType is the EBS volume type (gp3, gp2, io1,
                      io2)
                    enum:
                    - gp3
                    - gp2
                    - io1
                    - io2
                    type: string
                required:
                - domainName
                - machineType
                - volumeSize
                - volumeType
                type: object
              displayName:
                description: DisplayName is the human-readable name for the work machine
                maxLength: 100
                minLength: 1
                type: string
              machineType:
                description: MachineType references the MachineType to use for this
                  machine
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                type: object
              ownedBy:
                description: OwnedBy is the username/email of the user who owns this
                  machine
                type: string
              sshPublicKeys:
                description: SSHPublicKeys for SSH access to the VM
                items:
                  type: string
                type: array
              state:
                default: stopped
                description: State indicates whether the machine should be running
                  or stopped
                enum:
                - running
                - stopped
                - disabled
                type: string
              targetNamespace:
                description: |-
                  TargetNamespace is the namespace where the WorkMachine workloads will run
                  Defaults to wm-{username}
                type: string
            required:
            - displayName
            - machineType
            - ownedBy
            - state
            - targetNamespace
            type: object
          status:
            description: WorkMachineStatus defines the observed state of WorkMachine
            properties:
              accessURL:
                description: AccessURL for accessing the machine (IDE, SSH, etc.)
                type: string
              activeWorkspaceCount:
                description: ActiveWorkspaceCount is the number of active (non-suspended)
                  workspaces
                format: int32
                type: integer
              allocatedResources:
                description: Resources actually allocated to the machine
                properties:
                  cpu:
                    description: CPU cores (e.g., "2", "4", "8")
                    type: string
                  gpu:
                    description: GPU count (optional, e.g., "1", "2")
                    type: string
                  memory:
                    description: Memory in Gi (e.g., "4Gi", "8Gi", "16Gi")
                    type: string
                required:
                - cpu
                - memory
                type: object
              availabilityZone:
                description: AvailabilityZone is the availability zone within the
                  region
                type: string
              checkList:
                items:
                  properties:
                    description:
                      type: string
                    name:
                      type: string
                    title:
                      type: string
                  required:
                  - name
                  - title
                  type: object
                type: array
              checks:
                additionalProperties:
                  properties:
                    completedAt:
                      format: date-time
                      type: string
                    generation:
                      format: int64
                      type: integer
                    message:
                      type: string
                    startedAt:
                      format: date-time
                      type: string
                    state:
                      type: string
                  type: object
                type: object
              dnsHost:
                type: string
              isAutoStopped:
                description: IsAutoStopped when set means machine was auto-stopped
                  by kloudlite
                type: boolean
              isReady:
                type: boolean
              lastActivityAt:
                description: LastActivityAt timestamp of last user activity (for auto-stop)
                format: date-time
                type: string
              lastReadyGeneration:
                format: int64
                type: integer
              lastReconcileTime:
                format: date-time
                type: string
              lastWorkspaceActivity:
                description: |-
                  LastWorkspaceActivity is the last time any workspace was active on this WorkMachine
                  Used for auto-shutdown logic
                format: date-time
                type: string
              machineID:
                description: MachineID is the cloud provider's unique identifier for
                  the instance
                type: string
              message:
                description: Message provides additional information about the instance
                  state
                type: string
              privateIP:
                description: PrivateIP is the private IP address of the instance
                type: string
              publicIP:
                description: PublicIP is the public IP address of the instance (if
                  available)
                type: string
              region:
                description: Region is the cloud region where the instance is running
                type: string
              rootVolumeSize:
                description: |-
                  RootVolumeSize is size in GBs for the root volume.
                  It is used while processing request for increasing volume size
                format: int32
                type: integer
              sshPublicKey:
                description: |-
                  SSHPublicKey is the WorkMachine's public SSH key for all workspaces
                  This key is shared across all workspaces in the WorkMachine
                  Users can copy this key to add to other systems' authorized_keys
                  The corresponding private key is stored in a Secret
                type: string
              startedAt:
                description: StartedAt timestamp when the machine was last started
                format: date-time
                type: string
              state:
                description: State is the current state of the instance
                type: string
              stoppedAt:
                description: StoppedAt timestamp when the machine was last stopped
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
