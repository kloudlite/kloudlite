---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workmachines.machines.kloudlite.io
spec:
  group: machines.kloudlite.io
  names:
    kind: WorkMachine
    listKind: WorkMachineList
    plural: workmachines
    singular: workmachine
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.ownedBy
      name: Owner
      type: string
    - jsonPath: .spec.machineType
      name: Machine Type
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.startedAt
      name: Started At
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: WorkMachine represents a user's personal development machine
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkMachineSpec defines the desired state of WorkMachine
            properties:
              autoShutdown:
                description: |-
                  AutoShutdown configures automatic instance shutdown when idle
                  Only applicable for cloud providers (AWS, GCP, Azure)
                properties:
                  checkIntervalMinutes:
                    default: 5
                    description: CheckIntervalMinutes is how often to check workspace
                      activity
                    format: int32
                    maximum: 60
                    minimum: 1
                    type: integer
                  enabled:
                    default: true
                    description: Enabled determines if auto-shutdown is active
                    type: boolean
                  idleThresholdMinutes:
                    default: 30
                    description: |-
                      IdleThresholdMinutes is how long to wait after all workspaces are suspended
                      before shutting down the WorkMachine EC2 instance
                    format: int32
                    maximum: 1440
                    minimum: 5
                    type: integer
                required:
                - checkIntervalMinutes
                - enabled
                - idleThresholdMinutes
                type: object
              aws:
                description: AWSProvider contains AWS-specific configuration
                properties:
                  ami:
                    description: AMI is the Amazon Machine Image ID to use for the
                      instance
                    type: string
                  availabilityZone:
                    description: AvailabilityZone is the specific AZ within the region
                    type: string
                  domainName:
                    description: |-
                      DomainName is the base domain for WorkMachine DNS records
                      (e.g., "workmachines.example.com" → "<machine-name>.workmachines.example.com")
                    type: string
                  iamInstanceProfileRole:
                    description: IAMInstanceProfileRole is the IAM role name to attach
                      to the instance
                    type: string
                  instanceType:
                    description: InstanceType is the EC2 instance type (e.g., m5.large,
                      t3.medium)
                    type: string
                  k3sServerURL:
                    description: K3sServerURL is the URL of the K3s server to join
                    type: string
                  k3sTokenSecret:
                    description: K3sTokenSecret is the name of the Secret containing
                      the K3s join token
                    type: string
                  region:
                    description: Region is the AWS region where the instance will
                      be created
                    type: string
                  rootVolumeSize:
                    default: 50
                    description: RootVolumeSize is the size of the root EBS volume
                      in GB
                    maximum: 1000
                    minimum: 20
                    type: integer
                  rootVolumeType:
                    default: gp3
                    description: RootVolumeType is the EBS volume type (gp3, gp2,
                      io1, io2)
                    enum:
                    - gp3
                    - gp2
                    - io1
                    - io2
                    type: string
                  route53HostedZoneID:
                    description: Route53HostedZoneID is the ID of the Route53 hosted
                      zone for DNS records
                    type: string
                  securityGroupIDs:
                    description: |-
                      SecurityGroupIDs are additional security group IDs to attach
                      (WorkMachine controller will create a dedicated SG automatically)
                    items:
                      type: string
                    type: array
                  subnetID:
                    description: SubnetID is the ID of the subnet where the instance
                      will be created
                    type: string
                  vpcID:
                    description: VPCID is the ID of the VPC where the instance will
                      be created
                    type: string
                required:
                - ami
                - domainName
                - instanceType
                - k3sServerURL
                - k3sTokenSecret
                - region
                - rootVolumeSize
                - rootVolumeType
                - route53HostedZoneID
                - subnetID
                - vpcID
                type: object
              desiredState:
                default: stopped
                description: DesiredState indicates whether the machine should be
                  running or stopped
                enum:
                - running
                - stopped
                - disabled
                type: string
              displayName:
                description: DisplayName is the human-readable name for the work machine
                maxLength: 100
                minLength: 1
                type: string
              machineType:
                description: MachineType references the MachineType to use for this
                  machine
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                description: |-
                  NodeSelector constrains this WorkMachine and all its workspaces to specific nodes
                  All workspaces and environments created by this user will inherit this nodeSelector
                type: object
              ownedBy:
                description: OwnedBy is the username/email of the user who owns this
                  machine
                type: string
              provider:
                description: Provider specifies the cloud provider (aws, gcp, azure,
                  or empty for k8s deployment)
                type: string
              sshPublicKeys:
                description: SSHPublicKeys for SSH access to the VM
                items:
                  type: string
                type: array
              targetNamespace:
                description: |-
                  TargetNamespace is the namespace where the WorkMachine workloads will run
                  Defaults to wm-{username}
                type: string
            required:
            - desiredState
            - displayName
            - machineType
            - ownedBy
            - targetNamespace
            type: object
          status:
            description: WorkMachineStatus defines the observed state of WorkMachine
            properties:
              accessURL:
                description: AccessURL for accessing the machine (IDE, SSH, etc.)
                type: string
              activeWorkspaceCount:
                description: ActiveWorkspaceCount is the number of active (non-suspended)
                  workspaces
                format: int32
                type: integer
              allocatedResources:
                description: Resources actually allocated to the machine
                properties:
                  cpu:
                    description: CPU cores (e.g., "2", "4", "8")
                    type: string
                  gpu:
                    description: GPU count (optional, e.g., "1", "2")
                    type: string
                  memory:
                    description: Memory in Gi (e.g., "4Gi", "8Gi", "16Gi")
                    type: string
                required:
                - cpu
                - memory
                type: object
              availabilityZone:
                description: AvailabilityZone is the AWS AZ where the instance is
                  running
                type: string
              checkList:
                items:
                  properties:
                    description:
                      type: string
                    name:
                      type: string
                    title:
                      type: string
                  required:
                  - name
                  - title
                  type: object
                type: array
              checks:
                additionalProperties:
                  properties:
                    completedAt:
                      format: date-time
                      type: string
                    generation:
                      format: int64
                      type: integer
                    message:
                      type: string
                    startedAt:
                      format: date-time
                      type: string
                    state:
                      type: string
                  type: object
                type: object
              instanceID:
                description: InstanceID is the EC2 instance ID (only for AWS provider)
                type: string
              isReady:
                type: boolean
              k3sJoinStatus:
                description: K3sJoinStatus indicates whether the K3s agent successfully
                  joined the cluster
                type: string
              lastActivityAt:
                description: LastActivityAt timestamp of last user activity (for auto-stop)
                format: date-time
                type: string
              lastReadyGeneration:
                format: int64
                type: integer
              lastReconcileTime:
                format: date-time
                type: string
              lastWorkspaceActivity:
                description: |-
                  LastWorkspaceActivity is the last time any workspace was active on this WorkMachine
                  Used for auto-shutdown logic
                format: date-time
                type: string
              message:
                description: Message provides human-readable information about the
                  current state
                type: string
              nodeName:
                description: NodeName where the pod is running
                type: string
              podIP:
                description: PodIP is the IP address of the pod
                type: string
              podName:
                description: PodName is the name of the pod running this machine
                type: string
              privateIP:
                description: PrivateIP is the private IP address of the EC2 instance
                type: string
              publicIP:
                description: PublicIP is the public IP address of the EC2 instance
                type: string
              region:
                description: Region is the AWS region where the instance is running
                type: string
              route53RecordSet:
                description: Route53RecordSet is the DNS record for this WorkMachine
                type: string
              securityGroupID:
                description: SecurityGroupID is the ID of the dedicated security group
                  for this WorkMachine
                type: string
              sshPublicKey:
                description: |-
                  SSHPublicKey is the WorkMachine's public SSH key for all workspaces
                  This key is shared across all workspaces in the WorkMachine
                  Users can copy this key to add to other systems' authorized_keys
                  The corresponding private key is stored in a Secret
                type: string
              startedAt:
                description: StartedAt timestamp when the machine was last started
                format: date-time
                type: string
              state:
                description: State is the current state of the machine
                type: string
              stoppedAt:
                description: StoppedAt timestamp when the machine was last stopped
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
