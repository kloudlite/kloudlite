---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: snapshotartifacts.snapshots.kloudlite.io
spec:
  group: snapshots.kloudlite.io
  names:
    kind: SnapshotArtifacts
    listKind: SnapshotArtifactsList
    plural: snapshotartifacts
    singular: snapshotartifacts
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.snapshotName
      name: Snapshot
      type: string
    - jsonPath: .status.compositionCount
      name: Compositions
      type: integer
    - jsonPath: .status.configMapCount
      name: ConfigMaps
      type: integer
    - jsonPath: .status.secretCount
      name: Secrets
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          SnapshotArtifacts stores K8s resources (Compositions, ConfigMaps, Secrets)
          captured during environment snapshot creation. This is a separate resource
          to keep the Snapshot CR lightweight.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SnapshotArtifactsSpec defines the artifacts data
            properties:
              composeSpec:
                description: |-
                  ComposeSpec contains the Environment's inline compose spec (JSON, base64 encoded)
                  This captures spec.compose from the source Environment
                type: string
              configMaps:
                description: ConfigMaps contains serialized ConfigMap resources (YAML,
                  base64 encoded)
                type: string
              secrets:
                description: Secrets contains serialized Secret resources (YAML, base64
                  encoded)
                type: string
              snapshotName:
                description: SnapshotName is the name of the associated Snapshot
                type: string
            required:
            - snapshotName
            type: object
          status:
            description: SnapshotArtifactsStatus tracks counts of stored resources
            properties:
              configMapCount:
                description: ConfigMapCount is the number of configmaps stored
                format: int32
                type: integer
              secretCount:
                description: SecretCount is the number of secrets stored
                format: int32
                type: integer
            type: object
