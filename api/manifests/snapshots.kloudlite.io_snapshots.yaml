---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: snapshots.snapshots.kloudlite.io
spec:
  group: snapshots.kloudlite.io
  names:
    kind: Snapshot
    listKind: SnapshotList
    plural: snapshots
    singular: snapshot
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.refCount
      name: RefCount
      type: integer
    - jsonPath: .status.sizeHuman
      name: Size
      type: string
    - jsonPath: .spec.parentSnapshot
      name: Parent
      priority: 1
      type: string
    - jsonPath: .status.createdAt
      name: Created
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Snapshot represents a point-in-time snapshot of a btrfs subvolume
          This is a generic resource - it doesn't know about environments or workspaces
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SnapshotSpec defines the desired state of Snapshot
            properties:
              artifacts:
                description: |-
                  Artifacts define large metadata to store alongside the snapshot
                  Each artifact is stored as a layer in the OCI image
                items:
                  description: ArtifactSpec defines a metadata artifact to store with
                    the snapshot
                  properties:
                    data:
                      description: Data is the artifact content (base64 encoded for
                        binary safety)
                      type: string
                    name:
                      description: Name identifies this artifact (e.g., "k8s-resources",
                        "app-config")
                      type: string
                    type:
                      default: raw
                      description: Type hints at how to handle this artifact during
                        restore
                      enum:
                      - kubernetes-manifests
                      - json
                      - yaml
                      - sql
                      - raw
                      type: string
                  required:
                  - name
                  type: object
                type: array
              description:
                description: Description is a human-readable description of the snapshot
                type: string
              environmentRef:
                description: EnvironmentRef references the source environment (backward
                  compat)
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              includeMetadata:
                description: IncludeMetadata indicates whether to include K8s metadata
                type: boolean
              labels:
                additionalProperties:
                  type: string
                description: Labels are user-defined metadata (small, stored in CR)
                type: object
              nodeName:
                description: NodeName is the Kubernetes node where the btrfs subvolume
                  exists
                type: string
              ownedBy:
                description: OwnedBy is the username who owns this snapshot (backward
                  compat)
                type: string
              owner:
                description: |-
                  Owner identifies who owns this snapshot (e.g., username)
                  Used to organize snapshots in the registry: {prefix}/{owner}/{name}
                type: string
              parentSnapshot:
                description: ParentSnapshot is the parent snapshot name for incremental
                  storage
                type: string
              parentSnapshotRef:
                description: ParentSnapshotRef references the parent snapshot (backward
                  compat)
                properties:
                  name:
                    type: string
                  restoredAt:
                    format: date-time
                    type: string
                required:
                - name
                type: object
              registryRef:
                description: RegistryRef contains registry push configuration (backward
                  compat)
                properties:
                  repository:
                    type: string
                  tag:
                    type: string
                type: object
              repository:
                description: |-
                  Repository overrides the auto-generated repository path
                  If not set, uses: {prefix}/{owner}/snapshots
                type: string
              retentionPolicy:
                description: RetentionPolicy defines automatic deletion rules
                properties:
                  expiresAt:
                    description: ExpiresAt is when this snapshot should be automatically
                      deleted
                    format: date-time
                    type: string
                  keepForDays:
                    description: KeepForDays is the number of days to keep the snapshot
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              sourcePath:
                description: SourcePath is the btrfs subvolume path to snapshot
                type: string
              store:
                description: Store is the name of the SnapshotStore to use
                type: string
              workspaceRef:
                description: WorkspaceRef references the source workspace (backward
                  compat)
                properties:
                  name:
                    type: string
                  workmachineName:
                    type: string
                required:
                - name
                type: object
            type: object
          status:
            description: SnapshotStatus defines the observed state of Snapshot
            properties:
              artifacts:
                description: Artifacts lists the stored artifacts
                items:
                  description: ArtifactStatus tracks a stored artifact
                  properties:
                    name:
                      description: Name is the artifact identifier
                      type: string
                    sizeBytes:
                      description: SizeBytes is the artifact size
                      format: int64
                      type: integer
                    stored:
                      description: Stored indicates if artifact was successfully stored
                      type: boolean
                    type:
                      description: Type is the artifact type
                      type: string
                  required:
                  - name
                  - stored
                  - type
                  type: object
                type: array
              collectedMetadata:
                description: CollectedMetadata contains collected K8s metadata (backward
                  compat)
                properties:
                  compositions:
                    type: string
                  configMaps:
                    type: string
                  deployments:
                    type: string
                  pvcs:
                    type: string
                  secrets:
                    type: string
                  services:
                    type: string
                  statefulSets:
                    type: string
                type: object
              createdAt:
                description: CreatedAt is when the snapshot was successfully created
                format: date-time
                type: string
              lineage:
                description: Lineage is the ordered list of parent snapshots (root
                  first)
                items:
                  type: string
                type: array
              localPath:
                description: LocalPath is the local btrfs snapshot path (if still
                  exists)
                type: string
              message:
                description: Message provides human-readable status information
                type: string
              refCount:
                default: 0
                description: |-
                  RefCount is the number of SnapshotRefs pointing to this snapshot
                  Snapshot is garbage collected when refCount reaches 0
                format: int32
                type: integer
              registry:
                description: Registry contains OCI registry storage information
                properties:
                  compressedSize:
                    description: CompressedSize is the total compressed size in bytes
                    format: int64
                    type: integer
                  digest:
                    description: Digest is the image manifest digest (sha256:...)
                    type: string
                  imageRef:
                    description: ImageRef is the full image reference (registry/repo:tag)
                    type: string
                  parentImageRef:
                    description: |-
                      ParentImageRef is the parent snapshot's image reference
                      Used for incremental restore
                    type: string
                  pushedAt:
                    description: PushedAt is when the snapshot was pushed to registry
                    format: date-time
                    type: string
                required:
                - imageRef
                type: object
              registryStatus:
                description: RegistryStatus contains registry push status (backward
                  compat)
                properties:
                  compressedSize:
                    description: CompressedSize is the compressed size in bytes
                    format: int64
                    type: integer
                  digest:
                    description: Digest is the image manifest digest
                    type: string
                  imageRef:
                    description: ImageRef is the full image reference (registry/repo:tag)
                    type: string
                  layerDigests:
                    description: LayerDigests contains individual layer digests
                    items:
                      type: string
                    type: array
                  pushed:
                    description: Pushed indicates if the snapshot has been pushed
                      to registry
                    type: boolean
                  pushedAt:
                    description: PushedAt is when the snapshot was pushed
                    format: date-time
                    type: string
                  tag:
                    description: Tag is the image tag
                    type: string
                type: object
              resourceMetadata:
                description: ResourceMetadata contains resource information (backward
                  compat)
                properties:
                  compositionCount:
                    type: integer
                  configMapCount:
                    type: integer
                  deploymentCount:
                    type: integer
                  pvcCount:
                    type: integer
                  secretCount:
                    type: integer
                  serviceCount:
                    type: integer
                  statefulSetCount:
                    type: integer
                type: object
              sizeBytes:
                description: SizeBytes is the snapshot size in bytes
                format: int64
                type: integer
              sizeHuman:
                description: SizeHuman is the human-readable size (e.g., "1.5 GB")
                type: string
              snapshotPath:
                description: SnapshotPath is the local btrfs snapshot path (backward
                  compat, alias for LocalPath)
                type: string
              snapshotType:
                description: SnapshotType is the type of snapshot (backward compat)
                type: string
              state:
                default: Pending
                description: State is the current state of the snapshot
                type: string
              targetName:
                description: TargetName is the target resource name (backward compat)
                type: string
              workMachineName:
                description: WorkMachineName is the work machine name (backward compat)
                type: string
            required:
            - refCount
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
