---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kloudlite-domainrequest-validating-webhook
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    caBundle: 
    service:
      name: api-server
      namespace: kloudlite
      path: /validate-domains-kloudlite-io-v1-domainrequest
  failurePolicy: Fail
  name: vdomainrequest.kb.io
  rules:
  - apiGroups:
    - domains.kloudlite.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - domainrequests
  sideEffects: None
