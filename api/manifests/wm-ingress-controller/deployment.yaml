apiVersion: v1
kind: ServiceAccount
metadata:
  name: wm-ingress-controller
  namespace: ${NAMESPACE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wm-ingress-controller
  namespace: ${NAMESPACE}
  labels:
    app: wm-ingress-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wm-ingress-controller
  template:
    metadata:
      labels:
        app: wm-ingress-controller
    spec:
      serviceAccountName: wm-ingress-controller
      containers:
      - name: controller
        image: ${IMAGE}
        imagePullPolicy: IfNotPresent
        command:
        - /wm-ingress-controller
        args:
        - --namespace=${NAMESPACE}
        - --ingress-class=${INGRESS_CLASS}
        - --http-port=8000
        - --https-port=8443
        - --health-probe-bind-address=:8081
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: https
          containerPort: 8443
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wm-ingress
  namespace: ${NAMESPACE}
  labels:
    app: wm-ingress-controller
spec:
  type: ClusterIP
  selector:
    app: wm-ingress-controller
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8443
    protocol: TCP
