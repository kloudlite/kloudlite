---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wm-ingress-controller
rules:
# Ingress resources - read-only cluster-wide access
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - list
  - watch
# Services - read access for backend resolution
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - list
  - watch
# Secrets - read access for TLS certificates
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
# Events - for logging/debugging
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wm-ingress-controller-${NAMESPACE}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wm-ingress-controller
subjects:
- kind: ServiceAccount
  name: wm-ingress-controller
  namespace: ${NAMESPACE}
