    - kloudlite
    - packages
    kind: PackageRequest
    listKind: PackageRequestList
    plural: packagerequests
    singular: packagerequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.workspaceRef
