---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workspaces.workspaces.kloudlite.io
spec:
  group: workspaces.kloudlite.io
  names:
    categories:
    - kloudlite
    - workspaces
    kind: Workspace
    listKind: WorkspaceList
    plural: workspaces
    singular: workspace
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .spec.owner
      name: Owner
      type: string
    - jsonPath: .spec.workmachine
      name: WorkMachine
      type: string
    - jsonPath: .spec.status
      name: Status
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.connectedEnvironment.name
      name: Environment
      type: string
    - jsonPath: .status.activeConnections
      name: Connections
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Workspace is the Schema for the workspaces API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkspaceSpec defines the desired state of Workspace
            properties:
              copyFrom:
                description: |-
                  CopyFrom specifies the source workspace name to clone directory from
                  This field is automatically cleared after successful cloning
                type: string
              description:
                description: Description provides additional information about the
                  workspace
                maxLength: 500
                type: string
              displayName:
                description: DisplayName is the human-readable name for the workspace
                maxLength: 100
                minLength: 1
                type: string
              environmentConnection:
                description: |-
                  EnvironmentConnection defines the environment to connect to and associated intercepts
                  When set to nil, workspace is disconnected and all intercepts are removed
                properties:
                  environmentRef:
                    description: EnvironmentRef references the environment to connect
                      to
                    properties:
                      apiVersion:
                        description: API version of the referent.
                        type: string
                      fieldPath:
                        description: |-
                          If referring to a piece of an object instead of an entire object, this string
                          should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                          For example, if the object reference is to a container within a pod, this would take on a value like:
                          "spec.containers{name}" (where "name" refers to the name of the container that triggered
                          the event) or if no container name is specified "spec.containers[2]" (container with
                          index 2 in this pod). This syntax is chosen only to have some well-defined way of
                          referencing a part of an object.
                        type: string
                      kind:
                        description: |-
                          Kind of the referent.
                          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                        type: string
                      name:
                        description: |-
                          Name of the referent.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      namespace:
                        description: |-
                          Namespace of the referent.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                        type: string
                      resourceVersion:
                        description: |-
                          Specific resourceVersion to which this reference is made, if any.
                          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                        type: string
                      uid:
                        description: |-
                          UID of the referent.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  intercepts:
                    description: |-
                      Intercepts defines services to intercept in this environment
                      When environment is disconnected, all intercepts are automatically removed
                    items:
                      description: InterceptSpec defines a service to intercept when
                        connected to an environment
                      properties:
                        portMappings:
                          description: PortMappings defines how service ports map
                            to workspace ports
                          items:
                            description: PortMapping defines mapping between service
                              and workspace ports for intercepts
                            properties:
                              protocol:
                                default: TCP
                                description: Protocol is the protocol used (TCP/UDP)
                                enum:
                                - TCP
                                - UDP
                                - SCTP
                                type: string
                              servicePort:
                                description: ServicePort is the port exposed by the
                                  service
                                format: int32
                                maximum: 65535
                                minimum: 1
                                type: integer
                              workspacePort:
                                description: WorkspacePort is the port in the workspace
                                  pod
                                format: int32
                                maximum: 65535
                                minimum: 1
                                type: integer
                            required:
                            - servicePort
                            - workspacePort
                            type: object
                          minItems: 1
                          type: array
                        serviceName:
                          description: ServiceName in the connected environment to
                            intercept
                          minLength: 1
                          type: string
                      required:
                      - portMappings
                      - serviceName
                      type: object
                    type: array
                required:
                - environmentRef
                type: object
              gitRepository:
                description: |-
                  GitRepository defines a git repository to clone when workspace starts
                  The repository will be cloned into the workspace folder using SSH keys from the WorkMachine
                properties:
                  branch:
                    description: Branch to clone (optional, uses repository default
                      if not specified)
                    type: string
                  url:
                    description: URL of the git repository (supports https:// and
                      git@ formats)
                    minLength: 1
                    type: string
                required:
                - url
                type: object
              ownedBy:
                description: OwnedBy is the username of the workspace owner
                minLength: 1
                type: string
              packages:
                description: Packages list of Nix packages to install in the workspace
                items:
                  description: PackageSpec defines a Nix package to install
                  properties:
                    channel:
                      description: |-
                        Channel specifies the nixpkgs channel/release to use (e.g., "nixos-24.05", "nixos-23.11", "unstable")
                        Use this for stable, well-known package versions from official releases
                      type: string
                    name:
                      description: Name of the package (e.g., nodejs_22, vim, git)
                      minLength: 1
                      type: string
                    nixpkgsCommit:
                      description: |-
                        NixpkgsCommit specifies an exact nixpkgs commit hash for precise version control
                        Use this when you need a specific historical package version
                        Takes precedence over Channel if both are specified
                      type: string
                  required:
                  - name
                  type: object
                type: array
              resourceQuota:
                description: ResourceQuota defines resource limits for the workspace
                properties:
                  cpu:
                    description: CPU limit in cores (e.g., "2" or "1000m")
                    type: string
                  gpus:
                    description: GPUs number of GPUs allocated
                    format: int32
                    maximum: 8
                    minimum: 0
                    type: integer
                  memory:
                    description: Memory limit (e.g., "4Gi")
                    type: string
                  storage:
                    description: Storage limit (e.g., "100Gi")
                    type: string
                type: object
              settings:
                description: Settings contains workspace-specific settings
                properties:
                  autoStop:
                    description: AutoStop indicates if workspace should auto-stop
                      when idle
                    type: boolean
                  dotfilesRepo:
                    description: DotfilesRepo URL for dotfiles repository
                    type: string
                  environmentVariables:
                    additionalProperties:
                      type: string
                    description: EnvironmentVariables to set in the workspace
                    type: object
                  gitConfig:
                    description: GitConfig for workspace git settings
                    properties:
                      defaultBranch:
                        description: DefaultBranch name
                        type: string
                      userEmail:
                        description: UserEmail for git commits
                        type: string
                      userName:
                        description: UserName for git commits
                        type: string
                    type: object
                  idleTimeout:
                    description: IdleTimeout in minutes before auto-stopping
                    format: int32
                    maximum: 10080
                    minimum: 0
                    type: integer
                  maxRuntime:
                    description: MaxRuntime maximum runtime in minutes before forced
                      stop
                    format: int32
                    maximum: 43200
                    minimum: 0
                    type: integer
                  startupScript:
                    description: StartupScript to run when workspace starts
                    type: string
                  vscodeExtensions:
                    description: VSCodeExtensions list of VS Code extensions to install
                    items:
                      type: string
                    type: array
                type: object
              status:
                default: active
                description: Status indicates whether the workspace is active or suspended
                enum:
                - active
                - suspended
                - archived
                type: string
              tags:
                description: Tags for categorizing and filtering workspaces
                items:
                  type: string
                type: array
              vscodeVersion:
                default: latest
                description: VSCodeVersion specifies the version of VS Code server
                  to use
                type: string
              workmachine:
                description: |-
                  WorkmachineName references the WorkMachine this workspace belongs to
                  The workspace will run in the WorkMachine's targetNamespace
                minLength: 1
                type: string
            required:
            - displayName
            - ownedBy
            - workmachine
            type: object
          status:
            description: WorkspaceStatus defines the observed state of Workspace
            properties:
              accessUrl:
                description: AccessURL for accessing the workspace (deprecated, use
                  AccessURLs instead)
                type: string
              accessUrls:
                additionalProperties:
                  type: string
                description: |-
                  AccessURLs contains URLs for accessing different workspace services
                  Keys are service names (code-server, ttyd, jupyter, code-web)
                type: object
              activeConnections:
                description: ActiveConnections is the number of active network connections
                  in the workspace
                type: integer
              activeIntercepts:
                description: ActiveIntercepts tracks the status of active service
                  intercepts
                items:
                  description: InterceptStatus tracks the status of an active service
                    intercept
                  properties:
                    message:
                      description: Message provides additional information about the
                        intercept status
                      type: string
                    phase:
                      description: Phase of the intercept (Pending, Active, Failed,
                        etc.)
                      type: string
                    serviceName:
                      description: ServiceName being intercepted
                      type: string
                  required:
                  - serviceName
                  type: object
                type: array
              cloningStatus:
                description: CloningStatus tracks the progress of workspace directory
                  cloning
                properties:
                  completionTime:
                    description: CompletionTime when cloning completed (success or
                      failure)
                    format: date-time
                    type: string
                  copyJobStatus:
                    description: CopyJobStatus tracks the directory copy job status
                    properties:
                      completed:
                        description: Completed indicates if the copy completed successfully
                        type: boolean
                      completionTime:
                        description: CompletionTime when the copy job completed
                        format: date-time
                        type: string
                      failed:
                        description: Failed indicates if the copy failed
                        type: boolean
                      message:
                        description: Message provides additional information about
                          the copy status
                        type: string
                      receiverJobName:
                        description: ReceiverJobName is the name of the receiver job
                        type: string
                      senderJobName:
                        description: SenderJobName is the name of the sender job
                        type: string
                      senderPodIP:
                        description: SenderPodIP is the IP address of the sender pod
                        type: string
                      startTime:
                        description: StartTime when the copy job started
                        format: date-time
                        type: string
                      started:
                        description: Started indicates if the copy job has started
                        type: boolean
                    type: object
                  errorMessage:
                    description: ErrorMessage if cloning failed
                    type: string
                  message:
                    description: Message provides additional information about the
                      current cloning state
                    type: string
                  phase:
                    description: Phase represents the current phase of cloning
                    type: string
                  sourceFolderName:
                    description: SourceFolderName is the folder name of the source
                      workspace
                    type: string
                  sourceWorkmachineName:
                    description: SourceWorkmachineName is the WorkMachine where the
                      source workspace is located
                    type: string
                  sourceWorkspaceName:
                    description: SourceWorkspaceName is the name of the workspace
                      being cloned from
                    type: string
                  startTime:
                    description: StartTime when cloning started
                    format: date-time
                    type: string
                type: object
              conditions:
                description: Conditions represent the latest available observations
                  of workspace state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              connectedEnvironment:
                description: ConnectedEnvironment tracks the connected environment
                  details
                properties:
                  availableServices:
                    description: AvailableServices lists services available in the
                      environment
                    items:
                      type: string
                    type: array
                  name:
                    description: Name of the connected environment
                    type: string
                  targetNamespace:
                    description: TargetNamespace where environment services are deployed
                    type: string
                required:
                - name
                - targetNamespace
                type: object
              failedPackages:
                description: FailedPackages list of packages that failed to install
                items:
                  type: string
                type: array
              installedPackages:
                description: InstalledPackages list of successfully installed packages
                items:
                  description: InstalledPackage represents a successfully installed
                    package
                  properties:
                    binPath:
                      description: BinPath where binaries are located
                      type: string
                    installedAt:
                      description: InstalledAt timestamp
                      format: date-time
                      type: string
                    name:
                      description: Name of the package
                      type: string
                    storePath:
                      description: StorePath in the Nix store
                      type: string
                    version:
                      description: Version of the installed package
                      type: string
                  required:
                  - name
                  type: object
                type: array
              lastActivityTime:
                description: LastActivityTime tracks when the workspace was last active
                format: date-time
                type: string
              message:
                description: Message provides additional information about the current
                  state
                type: string
              nodeName:
                description: NodeName where the pod is running
                type: string
              packageInstallationMessage:
                description: PackageInstallationMessage provides information about
                  package installation
                type: string
              phase:
                description: Phase represents the current phase of the workspace
                enum:
                - Pending
                - Creating
                - Running
                - Stopping
                - Stopped
                - Failed
                - Terminating
                type: string
              podIP:
                description: PodIP is the IP address of the workspace pod
                type: string
              podName:
                description: PodName is the name of the pod running the VS Code server
                type: string
              resourceUsage:
                description: ResourceUsage current resource consumption
                properties:
                  cpu:
                    description: CPU usage in cores
                    type: string
                  lastUpdated:
                    description: LastUpdated timestamp
                    format: date-time
                    type: string
                  memory:
                    description: Memory usage
                    type: string
                  storage:
                    description: Storage usage
                    type: string
                type: object
              sourceCloningStatus:
                description: SourceCloningStatus tracks when this workspace is being
                  used as a cloning source
                properties:
                  completionTime:
                    description: CompletionTime when the cloning operation completed
                    format: date-time
                    type: string
                  message:
                    description: Message provides additional information
                    type: string
                  phase:
                    description: Phase represents the current phase of source workspace
                      during cloning
                    type: string
                  startTime:
                    description: StartTime when this workspace started being used
                      as a clone source
                    format: date-time
                    type: string
                  targetWorkmachineName:
                    description: TargetWorkmachineName is the WorkMachine where the
                      target workspace will be created
                    type: string
                  targetWorkspaceName:
                    description: TargetWorkspaceName is the name of the workspace
                      being created from this source
                    type: string
                type: object
              startTime:
                description: StartTime when the workspace was started
                format: date-time
                type: string
              stopTime:
                description: StopTime when the workspace was stopped
                format: date-time
                type: string
              totalRuntime:
                description: TotalRuntime in minutes
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
