# Starship configuration for Kloudlite workspaces - Plain Text Symbols preset

format = """$directory$git_branch$git_status$character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[x](bold red)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = "git "
style = "bold purple"

[git_status]
style = "bold yellow"
ahead = ">"
diverged = "<>"
behind = "<"
deleted = "x"

[aws]
symbol = "aws "

[conda]
symbol = "conda "

[dart]
symbol = "dart "

[docker_context]
