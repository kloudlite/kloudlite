[supervisord]
nodaemon=true
user=root
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:init-kl-home]
command=/bin/bash -c "\
  chown kl:kl /home/kl && \
  mkdir -p /home/kl/.ssh /home/kl/.config/code-server /home/kl/.config/fish /home/kl/.local && \
  chmod 700 /home/kl/.ssh && \
  chown -R kl:kl /home/kl/.ssh /home/kl/.config /home/kl/.local && \
  echo 'bind-addr: 0.0.0.0:8080' > /home/kl/.config/code-server/config.yaml && \
  echo 'auth: none' >> /home/kl/.config/code-server/config.yaml && \
  echo 'cert: false' >> /home/kl/.config/code-server/config.yaml && \
  chown kl:kl /home/kl/.config/code-server/config.yaml && \
  cp /etc/kloudlite/starship.toml /home/kl/.config/starship.toml && \
  chown kl:kl /home/kl/.config/starship.toml && \
  if ! grep -q '/etc/kloudlite/shell-init.fish' /home/kl/.config/fish/config.fish 2>/dev/null; then \
    echo 'source /etc/kloudlite/shell-init.fish' >> /home/kl/.config/fish/config.fish; \
  fi && \
  chown kl:kl /home/kl/.config/fish/config.fish 2>/dev/null || true && \
  if ! grep -q '/etc/kloudlite/shell-init.sh' /home/kl/.bashrc 2>/dev/null; then \
    echo 'source /etc/kloudlite/shell-init.sh' >> /home/kl/.bashrc; \
  fi && \
  chown kl:kl /home/kl/.bashrc 2>/dev/null || true && \
  if ! grep -q '/etc/kloudlite/shell-init.sh' /home/kl/.zshrc 2>/dev/null; then \
    echo 'source /etc/kloudlite/shell-init.sh' >> /home/kl/.zshrc; \
  fi && \
  chown kl:kl /home/kl/.zshrc 2>/dev/null || true && \
  echo 'Init complete'"
priority=1
startsecs=0
autorestart=false
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:sshd]
priority=10
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:code-server]
priority=20
command=/usr/bin/code-server --auth none --bind-addr 0.0.0.0:8080
user=kl
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOME="/home/kl"

[program:ttyd]
priority=20
command=/usr/local/bin/ttyd -p 7681 -W fish
user=kl
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOME="/home/kl"
