AWSTemplateFormatVersion: '2010-09-09'
Description: 'Kloudlite One-Click Installation for AWS'

Parameters:
  InstallationKey:
    Type: String
    Description: 'Your Kloudlite installation key from console.kloudlite.io'
    NoEcho: true
    MinLength: 1

  Region:
    Type: String
    Description: 'AWS Region for installation (leave empty to use stack region)'
    Default: ''
    AllowedPattern: '^(|[a-z]{2}-[a-z]+-\d+)$'
    ConstraintDescription: 'Must be a valid AWS region (e.g., us-east-1) or empty for default'

Conditions:
  UseDefaultRegion: !Equals [!Ref Region, '']

Resources:
  # IAM Role for installer EC2 instance
  InstallerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'kloudlite-installer-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/IAMFullAccess
        - arn:aws:iam::aws:policy/AmazonRoute53FullAccess
      Tags:
        - Key: kloudlite.io/managed-by
          Value: cloudformation

  InstallerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub 'kloudlite-installer-${AWS::StackName}'
      Roles:
        - !Ref InstallerRole

  # Security Group - outbound only
  InstallerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Kloudlite installer - outbound only'
      GroupName: !Sub 'kloudlite-installer-${AWS::StackName}'
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'kloudlite-installer-${AWS::StackName}'
        - Key: kloudlite.io/managed-by
          Value: cloudformation

  # Installer EC2 Instance
  InstallerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: t3.micro
      IamInstanceProfile: !Ref InstallerInstanceProfile
      SecurityGroupIds:
        - !Ref InstallerSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub 'kloudlite-installer-${AWS::StackName}'
        - Key: kloudlite.io/managed-by
          Value: cloudformation
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > >(tee /var/log/kloudlite-install.log) 2>&1

          echo "Starting Kloudlite installation..."

          # Determine region
          INSTALL_REGION="${Region}"
          if [ -z "$INSTALL_REGION" ]; then
            INSTALL_REGION="${AWS::Region}"
          fi

          # Run install script
          curl -fsSL https://get.khost.dev/install/aws | bash -s -- --key "${InstallationKey}" --region "$INSTALL_REGION"

          INSTALL_STATUS=$?

          if [ $INSTALL_STATUS -eq 0 ]; then
            echo "Installation completed successfully!"
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource InstallerInstance --region ${AWS::Region}

            echo "Self-terminating in 5 minutes..."
            sleep 300
            aws ec2 terminate-instances --instance-ids $(curl -s http://169.254.169.254/latest/meta-data/instance-id) --region ${AWS::Region}
          else
            echo "Installation failed!"
            /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource InstallerInstance --region ${AWS::Region}
          fi
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M

Outputs:
  StackName:
    Description: 'CloudFormation Stack Name'
    Value: !Ref AWS::StackName

  InstallationRegion:
    Description: 'Region where Kloudlite is installed'
    Value: !If [UseDefaultRegion, !Ref 'AWS::Region', !Ref Region]

  InstallerInstanceId:
    Description: 'Installer EC2 Instance ID (will self-terminate)'
    Value: !Ref InstallerInstance

  ViewLogs:
    Description: 'Command to view installation logs'
    Value: !Sub 'aws ec2 get-console-output --instance-id ${InstallerInstance} --region ${AWS::Region}'

  UninstallCommand:
    Description: 'Command to uninstall Kloudlite (run manually when needed)'
    Value: !Sub
      - 'curl -fsSL https://get.khost.dev/uninstall/aws | bash -s -- --key "YOUR_KEY" --region "${InstallRegion}"'
      - InstallRegion: !If [UseDefaultRegion, !Ref 'AWS::Region', !Ref Region]
