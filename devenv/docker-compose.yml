services:
  k3s:
    image: rancher/k3s:v1.30.5-k3s1
    container_name: k3s-dev
    privileged: true
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - k3s-data:/var/lib/rancher/k3s
      - k3s-config:/etc/rancher/k3s
      - ../api/test-workspaces:/test-workspaces
      - kl-workspaces-home:/home/kl
    ports:
      - "6443:6443"
      - "80:80"
      - "443:443"
      - "30022:30022"
    command:
      - server
      - --node-name
      - master
      - --disable
      - traefik
      - --tls-san
      - k3s-dev

  # Pre-app: Extract kubeconfig and install CRDs
  pre-app:
    image: alpine:latest
    container_name: kloudlite-pre-app
    depends_on:
      - k3s
    volumes:
      - k3s-config:/kubeconfig
      - ./k3s-config:/output
      - ../manifests:/crds
    command:
      - /bin/sh
      - -c
      - |
        echo "=== PRE-APP SETUP ==="

        echo "Installing kubectl..."
        apk add --no-cache curl
        curl -LO "https://dl.k8s.io/release/$$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        mv kubectl /usr/local/bin/

        echo "1. Waiting for k3s.yaml to be generated..."
        until [ -f /kubeconfig/k3s.yaml ]; do sleep 1; done

        echo "2. Copying kubeconfig..."
        cp /kubeconfig/k3s.yaml /output/k3s.yaml
        chmod 644 /output/k3s.yaml

        echo "3. Waiting for k3s cluster to be ready..."
        # Create a modified kubeconfig for container use only
        cp /kubeconfig/k3s.yaml /tmp/k3s.yaml
        sed -i 's|https://127.0.0.1:6443|https://k3s-dev:6443|g' /tmp/k3s.yaml
        export KUBECONFIG=/tmp/k3s.yaml
        until kubectl get nodes 2>/dev/null; do sleep 2; done

        echo "4. Installing CRDs..."
        kubectl apply -f /crds/

        echo "=== PRE-APP SETUP COMPLETE ==="
    restart: "no"

  # Post-app: Install nginx and create initial resources
  post-app:
    image: alpine:latest
    container_name: kloudlite-post-app
    depends_on:
      - pre-app
    volumes:
      - k3s-config:/kubeconfig
      - ./k3s-config:/output
      - ./manifests:/manifests
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - /bin/sh
      - -c
      - |
        echo "=== POST-APP SETUP ==="

        echo "Installing kubectl and openssl..."
        apk add --no-cache curl openssl
        curl -LO "https://dl.k8s.io/release/$$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        mv kubectl /usr/local/bin/

        echo "Setting up kubeconfig..."
        cp /kubeconfig/k3s.yaml /tmp/k3s.yaml
        sed -i 's|https://127.0.0.1:6443|https://k3s-dev:6443|g' /tmp/k3s.yaml
        export KUBECONFIG=/tmp/k3s.yaml

        echo "1. Checking for existing TLS certificate..."
        mkdir -p /tmp/certs
        if kubectl get secret webhook-server-cert -n default >/dev/null 2>&1; then
          echo "Using existing TLS certificate..."
          kubectl get secret webhook-server-cert -n default -o jsonpath='{.data.tls\.crt}' | base64 -d > /tmp/certs/tls.crt
          kubectl get secret webhook-server-cert -n default -o jsonpath='{.data.tls\.key}' | base64 -d > /tmp/certs/tls.key
        else
          echo "Generating new TLS certificate..."
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /tmp/certs/tls.key -out /tmp/certs/tls.crt \
            -subj "/C=US/ST=State/L=City/O=Kloudlite/CN=nginx.default.svc" \
            -addext "subjectAltName=DNS:nginx.default.svc,DNS:nginx.default.svc.cluster.local,DNS:localhost,DNS:*.localhost,IP:127.0.0.1"
        fi

        echo "2. Creating/Updating TLS secret in k3s..."
        kubectl create secret tls webhook-server-cert \
          --cert=/tmp/certs/tls.crt --key=/tmp/certs/tls.key -n default \
          --dry-run=client -o yaml | kubectl apply -f -

        echo "3. Deploying nginx..."
        kubectl apply -f /manifests/nginx.yaml

        echo "4. Restarting nginx..."
        kubectl rollout restart deployment/nginx -n default 2>/dev/null || true
        kubectl wait --for=condition=available --timeout=60s deployment/nginx -n default 2>/dev/null || true

        echo "5. Waiting for backend API to be available..."
        until curl -s http://host.docker.internal:8080/health >/dev/null 2>&1; do
          echo "Waiting for API..."
          sleep 2
        done
        echo "Backend API is available!"

        echo "6. Applying users..."
        kubectl apply -f /manifests/users.yaml

        echo "7. Applying machine types..."
        kubectl apply -f /manifests/machine-types.yaml

        echo "8. Configuring admission webhooks..."
        CA_BUNDLE=$$(cat /tmp/certs/tls.crt | base64 | tr -d '\n')
        cat /manifests/webhooks.yaml | sed "s|\$${CA_BUNDLE}|$$CA_BUNDLE|g" | kubectl apply -f -

        echo "=== POST-APP SETUP COMPLETE ==="
    restart: "no"

volumes:
  k3s-data:
  k3s-config:
  webhook-certs:
  kl-workspaces-home:
