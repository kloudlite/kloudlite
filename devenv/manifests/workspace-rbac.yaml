---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workspace-sa
  namespace: wm-user
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workspace-user
  namespace: wm-user
rules:
- apiGroups: ["workspaces.kloudlite.io"]
  resources: ["workspaces"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workspace-user-binding
  namespace: wm-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workspace-user
subjects:
- kind: ServiceAccount
  name: workspace-sa
  namespace: wm-user
