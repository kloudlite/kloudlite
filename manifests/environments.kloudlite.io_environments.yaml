---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: environments.environments.kloudlite.io
spec:
  group: environments.kloudlite.io
  names:
    kind: Environment
    listKind: EnvironmentList
    plural: environments
    singular: environment
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetNamespace
      name: Namespace
      type: string
    - jsonPath: .spec.workmachineName
      name: WorkMachine
      type: string
    - jsonPath: .spec.activated
      name: Activated
      type: boolean
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.lastActivatedTime
      name: Last Activated
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Environment represents a deployment environment with its own
          namespace
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EnvironmentSpec defines the desired state of Environment
            properties:
              activated:
                default: true
                description: |-
                  Activated determines whether the environment is active (true) or inactive (false)
                  When deactivated, all deployments and statefulsets are scaled to 0
                type: boolean
              annotations:
                additionalProperties:
                  type: string
                description: Annotations to apply to the namespace
                type: object
              fromSnapshot:
                description: |-
                  FromSnapshot specifies a pushed snapshot to create this environment from
                  Only snapshots with status.registryStatus.pushed=true can be used
                  This field is automatically cleared after successful restoration
                properties:
                  snapshotName:
                    description: |-
                      SnapshotName is the name of the snapshot resource to clone from
                      The snapshot must have status.registryStatus.pushed=true
                    type: string
                required:
                - snapshotName
                type: object
              labels:
                additionalProperties:
                  type: string
                description: Labels to apply to the namespace
                type: object
              name:
                description: Name is the simple environment name (e.g., "dev-env")
                  used for display as {userName}/{envName}
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              networkPolicies:
                description: NetworkPolicies defines network policies for the environment
                properties:
                  allowedNamespaces:
                    description: List of namespaces allowed to communicate with this
                      environment
                    items:
                      type: string
                    type: array
                  enabled:
                    default: false
                    description: Whether to enable network policies
                    type: boolean
                  ingressRules:
                    description: Custom ingress rules
                    items:
                      description: IngressRule defines a network policy ingress rule
                      properties:
                        from:
                          description: From defines the source of the traffic
                          items:
                            description: NetworkPolicyPeer defines a peer for network
                              policy
                            properties:
                              namespaceSelector:
                                description: NamespaceSelector selects namespaces
                                properties:
                                  matchLabels:
                                    additionalProperties:
                                      type: string
                                    description: MatchLabels is a map of labels
                                    type: object
                                type: object
                              podSelector:
                                description: PodSelector selects pods
                                properties:
                                  matchLabels:
                                    additionalProperties:
                                      type: string
                                    description: MatchLabels is a map of labels
                                    type: object
                                type: object
                            type: object
                          type: array
                        ports:
                          description: Ports defines the destination ports
                          items:
                            description: NetworkPolicyPort defines a port for network
                              policy
                            properties:
                              port:
                                description: Port number
                                format: int32
                                type: integer
                              protocol:
                                description: Protocol (TCP or UDP)
                                enum:
                                - TCP
                                - UDP
                                type: string
                            type: object
                          type: array
                      type: object
                    type: array
                required:
                - enabled
                type: object
              nodeName:
                description: |-
                  NodeName specifies the node where all environment resources should run
                  This is set from the WorkMachine's node assignment
                type: string
              ownedBy:
                description: OwnedBy is the username of the user who owns this environment
                type: string
              resourceQuotas:
                description: ResourceQuotas defines resource quotas for the environment
                  namespace
                properties:
                  limits.cpu:
                    description: Maximum CPU limit for all pods in namespace
                    type: string
                  limits.memory:
                    description: Maximum memory limit for all pods in namespace
                    type: string
                  persistentvolumeclaims:
                    description: Maximum number of PVCs
                    type: string
                  requests.cpu:
                    description: Maximum CPU requests for all pods in namespace
                    type: string
                  requests.memory:
                    description: Maximum memory requests for all pods in namespace
                    type: string
                  services.loadbalancers:
                    description: Maximum number of LoadBalancer services
                    type: string
                  services.nodeports:
                    description: Maximum number of NodePort services
                    type: string
                type: object
              sharedWith:
                description: |-
                  SharedWith is the list of usernames this environment is shared with
                  Only used when Visibility is "shared"
                items:
                  type: string
                type: array
              targetNamespace:
                description: TargetNamespace is the namespace where all environment
                  resources will be deployed
                type: string
              visibility:
                default: private
                description: |-
                  Visibility controls who can see this environment
                  - private: only the owner can see
                  - shared: shared with specific users listed in SharedWith
                  - open: visible to all team members
                enum:
                - private
                - shared
                - open
                type: string
              workmachineName:
                description: WorkMachineName references the WorkMachine this environment
                  belongs to
                type: string
            required:
            - activated
            - ownedBy
            - targetNamespace
            - workmachineName
            type: object
          status:
            description: EnvironmentStatus defines the observed state of Environment
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the environment's state
                items:
                  description: EnvironmentCondition represents a condition of the
                    environment
                  properties:
                    lastTransitionTime:
                      description: LastTransitionTime is the last time the condition
                        changed
                      format: date-time
                      type: string
                    message:
                      description: Message is a human-readable message about the last
                        transition
                      type: string
                    reason:
                      description: Reason is a unique, one-word, CamelCase reason
                        for the condition's last transition
                      type: string
                    status:
                      description: Status of the condition (True, False, Unknown)
                      type: string
                    type:
                      description: Type of condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              hash:
                description: |-
                  Hash is an 8-character hash derived from environment name and owner for DNS-safe hostnames
                  Format: hash(envName-owner)
                type: string
              lastActivatedTime:
                description: LastActivatedTime is the last time the environment was
                  activated
                format: date-time
                type: string
              lastDeactivatedTime:
                description: LastDeactivatedTime is the last time the environment
                  was deactivated
                format: date-time
                type: string
              lastRestoredSnapshot:
                description: |-
                  LastRestoredSnapshot tracks the last snapshot that was restored to this environment
                  Used for automatic parent lineage tracking when new snapshots are created
                properties:
                  name:
                    description: Name is the name of the snapshot that was restored
                    type: string
                  restoredAt:
                    description: RestoredAt is when the snapshot was restored
                    format: date-time
                    type: string
                required:
                - name
                - restoredAt
                type: object
              message:
                description: Message provides human-readable information about the
                  current state
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation observed by the
                  controller
                format: int64
                type: integer
              resourceCount:
                description: ResourceCount tracks the number of resources in the namespace
                properties:
                  configmaps:
                    format: int32
                    type: integer
                  deployments:
                    format: int32
                    type: integer
                  pvcs:
                    format: int32
                    type: integer
                  secrets:
                    format: int32
                    type: integer
                  services:
                    format: int32
                    type: integer
                  statefulsets:
                    format: int32
                    type: integer
                type: object
              snapshotRestoreStatus:
                description: SnapshotRestoreStatus tracks the progress of creating
                  environment from a registry snapshot
                properties:
                  completionTime:
                    description: CompletionTime when restoration completed (success
                      or failure)
                    format: date-time
                    type: string
                  errorMessage:
                    description: ErrorMessage if restoration failed
                    type: string
                  imageRef:
                    description: ImageRef is the registry image reference being pulled
                    type: string
                  message:
                    description: Message provides additional information about the
                      current state
                    type: string
                  phase:
                    description: Phase represents the current phase of snapshot restoration
                    enum:
                    - Pending
                    - Pulling
                    - Restoring
                    - Completed
                    - Failed
                    type: string
                  snapshotRequestName:
                    description: SnapshotRequestName is the name of the SnapshotRequest
                      created for pulling
                    type: string
                  sourceSnapshot:
                    description: SourceSnapshot is the name of the snapshot being
                      restored from
                    type: string
                  startTime:
                    description: StartTime when restoration started
                    format: date-time
                    type: string
                type: object
              state:
                description: State represents the current state of the environment
                enum:
                - active
                - inactive
                - activating
                - deactivating
                - deleting
                - error
                type: string
              subdomain:
                description: Subdomain is the subdomain assigned to this environment's
                  workmachine (e.g., "beanbag.khost.dev")
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
