---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workmachines.machines.kloudlite.io
spec:
  group: machines.kloudlite.io
  names:
    kind: WorkMachine
    listKind: WorkMachineList
    plural: workmachines
    singular: workmachine
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.ownedBy
      name: Owner
      type: string
    - jsonPath: .spec.machineType
      name: Machine Type
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.startedAt
      name: Started At
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: WorkMachine represents a user's personal development machine
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkMachineSpec defines the desired state of WorkMachine
            properties:
              desiredState:
                default: stopped
                description: DesiredState indicates whether the machine should be
                  running or stopped
                enum:
                - running
                - stopped
                - disabled
                type: string
              machineType:
                description: MachineType references the MachineType to use for this
                  machine
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                description: |-
                  NodeSelector constrains this WorkMachine and all its workspaces to specific nodes
                  All workspaces and environments created by this user will inherit this nodeSelector
                type: object
              ownedBy:
                description: OwnedBy is the username/email of the user who owns this
                  machine
                type: string
              sshPublicKeys:
                description: SSHPublicKeys for SSH access to the VM
                items:
                  type: string
                type: array
              targetNamespace:
                description: |-
                  TargetNamespace is the namespace where the WorkMachine workloads will run
                  Defaults to wm-{username}
                type: string
            required:
            - desiredState
            - machineType
            - ownedBy
            - targetNamespace
            type: object
          status:
            description: WorkMachineStatus defines the observed state of WorkMachine
            properties:
              accessURL:
                description: AccessURL for accessing the machine (IDE, SSH, etc.)
                type: string
              allocatedResources:
                description: Resources actually allocated to the machine
                properties:
                  cpu:
                    description: CPU cores (e.g., "2", "4", "8")
                    type: string
                  gpu:
                    description: GPU count (optional, e.g., "1", "2")
                    type: string
                  memory:
                    description: Memory in Gi (e.g., "4Gi", "8Gi", "16Gi")
                    type: string
                required:
                - cpu
                - memory
                type: object
              conditions:
                description: Conditions represent the latest available observations
                items:
                  description: WorkMachineCondition represents a condition of the
                    WorkMachine
                  properties:
                    lastTransitionTime:
                      description: LastTransitionTime is the last time the condition
                        changed
                      format: date-time
                      type: string
                    message:
                      description: Message is a human-readable message about the last
                        transition
                      type: string
                    reason:
                      description: Reason is a unique, one-word, CamelCase reason
                        for the condition's last transition
                      type: string
                    status:
                      description: Status of the condition (True, False, Unknown)
                      type: string
                    type:
                      description: Type of condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              lastActivityAt:
                description: LastActivityAt timestamp of last user activity (for auto-stop)
                format: date-time
                type: string
              message:
                description: Message provides human-readable information about the
                  current state
                type: string
              nodeName:
                description: NodeName where the pod is running
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation observed by the
                  controller
                format: int64
                type: integer
              podIP:
                description: PodIP is the IP address of the pod
                type: string
              podName:
                description: PodName is the name of the pod running this machine
                type: string
              sshPublicKey:
                description: |-
                  SSHPublicKey is the WorkMachine's public SSH key for all workspaces
                  This key is shared across all workspaces in the WorkMachine
                  Users can copy this key to add to other systems' authorized_keys
                  The corresponding private key is stored in a Secret
                type: string
              startedAt:
                description: StartedAt timestamp when the machine was last started
                format: date-time
                type: string
              state:
                description: State is the current state of the machine
                type: string
              stoppedAt:
                description: StoppedAt timestamp when the machine was last stopped
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
