---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: snapshotrequests.snapshots.kloudlite.io
spec:
  group: snapshots.kloudlite.io
  names:
    kind: SnapshotRequest
    listKind: SnapshotRequestList
    plural: snapshotrequests
    singular: snapshotrequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.operation
      name: Operation
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          SnapshotRequest is a namespaced resource that instructs the workmachine-node-manager
          to perform btrfs snapshot operations on the local filesystem
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SnapshotRequestSpec defines the desired snapshot operation
            properties:
              environmentName:
                description: EnvironmentName is the environment being snapshotted
                  (for environment snapshots)
                type: string
              metadata:
                description: |-
                  Metadata contains K8s resource metadata to write to the snapshot directory
                  This is used for environment snapshots to include ConfigMaps, Secrets, Deployments, etc.
                properties:
                  compositions:
                    description: Compositions JSON
                    type: string
                  configMaps:
                    description: ConfigMaps JSON
                    type: string
                  deployments:
                    description: Deployments JSON
                    type: string
                  secrets:
                    description: Secrets JSON
                    type: string
                  services:
                    description: Services JSON
                    type: string
                  statefulSets:
                    description: StatefulSets JSON
                    type: string
                type: object
              metadataPath:
                description: |-
                  MetadataPath is the base path where metadata should be written
                  This is separate from SnapshotPath when metadata needs to go to a parent directory
                type: string
              operation:
                description: Operation is the type of operation to perform
                enum:
                - create
                - delete
                - restore
                - push
                - pull
                type: string
              parentSnapshotPath:
                description: ParentSnapshotPath is the path to the parent snapshot
                  (for incremental push)
                type: string
              readOnly:
                default: true
                description: ReadOnly indicates whether to create a read-only snapshot
                  (recommended)
                type: boolean
              registryRef:
                description: RegistryRef contains registry configuration for push/pull
                  operations
                properties:
                  parentImageRef:
                    description: |-
                      ParentImageRef is the full image reference of the parent snapshot
                      Used to fetch parent layers to prepend to this image
                    type: string
                  registryURL:
                    description: RegistryURL is the registry base URL (e.g., "image-registry:5000")
                    type: string
                  repository:
                    description: Repository is the image repository path (e.g., "snapshots/username")
                    type: string
                  tag:
                    description: Tag is the image tag
                    type: string
                required:
                - registryURL
                - repository
                - tag
                type: object
              snapshotPath:
                description: SnapshotPath is where to create the snapshot or the snapshot
                  to delete/restore from
                type: string
              snapshotRef:
                description: SnapshotRef references the parent Snapshot resource
                type: string
              sourcePath:
                description: SourcePath is the btrfs subvolume path to snapshot (for
                  create/restore)
                type: string
              workspaceName:
                description: WorkspaceName is the workspace being snapshotted (for
                  workspace snapshots)
                type: string
            required:
            - operation
            - readOnly
            - snapshotPath
            type: object
          status:
            description: SnapshotRequestStatus defines the observed state of SnapshotRequest
            properties:
              compressedSize:
                description: CompressedSize is the total compressed size in bytes
                  (for push operations)
                format: int64
                type: integer
              digest:
                description: Digest is the OCI image manifest digest (for push operations)
                type: string
              finishedAt:
                description: FinishedAt is when the operation finished
                format: date-time
                type: string
              layerDigests:
                description: LayerDigests are the digests of all layers pushed (for
                  push operations)
                items:
                  type: string
                type: array
              message:
                description: Message provides human-readable status information
                type: string
              phase:
                default: Pending
                description: Phase is the current phase of the request
                type: string
              pulledMetadata:
                description: |-
                  PulledMetadata contains the K8s resource metadata extracted from the OCI layer (for pull operations)
                  This is used by the environment controller to restore K8s resources without reading files from disk
                properties:
                  compositions:
                    description: Compositions JSON
                    type: string
                  configMaps:
                    description: ConfigMaps JSON
                    type: string
                  deployments:
                    description: Deployments JSON
                    type: string
                  secrets:
                    description: Secrets JSON
                    type: string
                  services:
                    description: Services JSON
                    type: string
                  statefulSets:
                    description: StatefulSets JSON
                    type: string
                type: object
              pulledSnapshots:
                description: |-
                  PulledSnapshots contains metadata for all snapshots pulled from registry (including parent chain)
                  This enables creating Snapshot CRs for the entire parent lineage
                items:
                  description: PulledSnapshotInfo contains metadata about a pulled
                    snapshot from the registry
                  properties:
                    environmentName:
                      description: EnvironmentName for environment snapshots
                      type: string
                    name:
                      description: Name is the original snapshot name
                      type: string
                    ownedBy:
                      description: OwnedBy is the owner of the original snapshot
                      type: string
                    parentSnapshotName:
                      description: ParentSnapshotName is the name of this snapshot's
                        parent (if any)
                      type: string
                    path:
                      description: Path is the local path where this snapshot was
                        extracted
                      type: string
                    resources:
                      description: Resources contains K8s resource metadata (for environment
                        snapshots)
                      properties:
                        compositions:
                          description: Compositions JSON
                          type: string
                        configMaps:
                          description: ConfigMaps JSON
                          type: string
                        deployments:
                          description: Deployments JSON
                          type: string
                        secrets:
                          description: Secrets JSON
                          type: string
                        services:
                          description: Services JSON
                          type: string
                        statefulSets:
                          description: StatefulSets JSON
                          type: string
                      type: object
                    snapshotType:
                      description: SnapshotType indicates whether this is an environment
                        or workspace snapshot
                      type: string
                    targetName:
                      description: TargetName is the name of the environment or workspace
                        that was snapshotted
                      type: string
                    workMachineName:
                      description: WorkMachineName where the original snapshot was
                        created
                      type: string
                    workspaceName:
                      description: WorkspaceName for workspace snapshots
                      type: string
                  required:
                  - name
                  - ownedBy
                  - path
                  type: object
                type: array
              sizeBytes:
                description: SizeBytes is the size of the snapshot (for create operations)
                format: int64
                type: integer
              startedAt:
                description: StartedAt is when the operation started
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
