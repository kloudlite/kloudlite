---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: snapshots.snapshots.kloudlite.io
spec:
  group: snapshots.kloudlite.io
  names:
    kind: Snapshot
    listKind: SnapshotList
    plural: snapshots
    singular: snapshot
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.owner
      name: Owner
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.referencedBy
      name: References
      type: string
    - jsonPath: .status.sizeHuman
      name: Size
      type: string
    - jsonPath: .spec.parentSnapshot
      name: Parent
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Snapshot represents metadata about a snapshot stored in an OCI registry.
          This is purely metadata - it doesn't know about nodes or local paths.
          Snapshots are created by SnapshotRequest after data is pushed to registry.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SnapshotSpec defines the snapshot metadata
            properties:
              artifacts:
                description: Artifacts define metadata stored alongside the snapshot
                items:
                  description: ArtifactSpec defines a metadata artifact stored with
                    the snapshot
                  properties:
                    data:
                      description: Data is the artifact content (base64 encoded for
                        binary safety)
                      type: string
                    name:
                      description: Name identifies this artifact (e.g., "k8s-resources",
                        "app-config")
                      type: string
                    type:
                      default: raw
                      description: Type hints at how to handle this artifact during
                        restore
                      enum:
                      - kubernetes-manifests
                      - json
                      - yaml
                      - sql
                      - raw
                      type: string
                  required:
                  - name
                  type: object
                type: array
              description:
                description: Description is a human-readable description
                type: string
              owner:
                description: Owner identifies who owns this snapshot (e.g., username)
                type: string
              parentSnapshot:
                description: ParentSnapshot is the parent snapshot name for incremental
                  storage
                type: string
              retentionPolicy:
                description: RetentionPolicy defines automatic deletion rules
                properties:
                  expiresAt:
                    description: ExpiresAt is when this snapshot should be automatically
                      deleted
                    format: date-time
                    type: string
                  keepForDays:
                    description: KeepForDays is the number of days to keep the snapshot
                    format: int32
                    minimum: 1
                    type: integer
                type: object
            required:
            - owner
            type: object
          status:
            description: SnapshotStatus defines the observed state of Snapshot
            properties:
              artifacts:
                description: Artifacts lists the stored artifacts
                items:
                  description: ArtifactStatus tracks a stored artifact
                  properties:
                    name:
                      type: string
                    sizeBytes:
                      format: int64
                      type: integer
                    stored:
                      type: boolean
                    type:
                      description: ArtifactType represents the type of artifact
                      type: string
                  required:
                  - name
                  - stored
                  - type
                  type: object
                type: array
              createdAt:
                description: CreatedAt is when the snapshot was successfully created
                format: date-time
                type: string
              lineage:
                description: Lineage is the ordered list of parent snapshots (root
                  first)
                items:
                  type: string
                type: array
              message:
                description: Message provides human-readable status information
                type: string
              referencedBy:
                description: |-
                  ReferencedBy lists the environment/workspace names that reference this snapshot
                  Snapshot cannot be garbage collected when this list is non-empty
                items:
                  type: string
                type: array
              registry:
                description: Registry contains OCI registry storage information
                properties:
                  compressedSize:
                    description: CompressedSize is the total compressed size in bytes
                    format: int64
                    type: integer
                  digest:
                    description: Digest is the image manifest digest (sha256:...)
                    type: string
                  imageRef:
                    description: ImageRef is the full image reference (registry/repo:tag)
                    type: string
                  parentImageRef:
                    description: |-
                      ParentImageRef is the parent snapshot's image reference
                      Used for incremental restore
                    type: string
                  pushedAt:
                    description: PushedAt is when the snapshot was pushed to registry
                    format: date-time
                    type: string
                required:
                - imageRef
                type: object
              sizeBytes:
                description: SizeBytes is the snapshot size in bytes
                format: int64
                type: integer
              sizeHuman:
                description: SizeHuman is the human-readable size (e.g., "1.5 GB")
                type: string
              state:
                default: Ready
                description: State is the current state of the snapshot
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
