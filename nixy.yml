nixpkgs:
  default: 050e09e091117c3d7328c7b2b7b577492c43c134
packages:
  - go
  - nodejs
  - nodePackages.pnpm
  - kubernetes-controller-tools
  - go-task
  - kubectl
  - kubernetes-helm
  - k9s
  - upx
  - installHook: |
      ./aws/install --bin-dir $out/bin --install-dir $out/aws-cli --update
    name: aws
    sources:
      linux/amd64:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        sha256: f3e62f065cc2b6941546cf9e49e0a65bf08f5c83cd15d13664b630b3dde9c317
  - ssm-session-manager-plugin
env:
  KUBECONFIG: $PWD/.secrets/kubeconfig.yaml
