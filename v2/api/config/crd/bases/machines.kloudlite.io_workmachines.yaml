                      format: date-time
                      type: string
                    message:
                      description: Message is a human-readable message about the last
                        transition
                      type: string
                    reason:
                      description: Reason is a unique, one-word, CamelCase reason
                        for the condition's last transition
                      type: string
                    status:
                      description: Status of the condition (True, False, Unknown)
                      type: string
                    type:
                      description: Type of condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              lastActivityAt:
                description: LastActivityAt timestamp of last user activity (for auto-stop)
                format: date-time
                type: string
              message:
                description: Message provides human-readable information about the
                  current state
                type: string
              nodeName:
                description: NodeName where the pod is running
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation observed by the
                  controller
