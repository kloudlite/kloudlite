---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workmachines.machines.kloudlite.io
spec:
  group: machines.kloudlite.io
  names:
    kind: WorkMachine
    listKind: WorkMachineList
    plural: workmachines
    singular: workmachine
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.ownedBy
      name: Owner
      type: string
    - jsonPath: .spec.machineType
      name: Machine Type
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.startedAt
      name: Started At
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: WorkMachine represents a user's personal development machine
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkMachineSpec defines the desired state of WorkMachine
            properties:
              desiredState:
                default: stopped
                description: DesiredState indicates whether the machine should be
                  running or stopped
                enum:
                - running
                - stopped
                - disabled
                type: string
              machineType:
                description: MachineType references the MachineType to use for this
                  machine
                type: string
              ownedBy:
                description: OwnedBy is the username/email of the user who owns this
                  machine
                type: string
              sshPublicKeys:
                description: SSHPublicKeys for SSH access to the VM
                items:
                  type: string
                type: array
              targetNamespace:
                description: |-
                  TargetNamespace is the namespace where the WorkMachine workloads will run
                  Defaults to wm-{username}
                type: string
            required:
            - desiredState
            - machineType
            - ownedBy
            - targetNamespace
            type: object
          status:
            description: WorkMachineStatus defines the observed state of WorkMachine
            properties:
              accessURL:
                description: AccessURL for accessing the machine (IDE, SSH, etc.)
                type: string
              allocatedResources:
                description: Resources actually allocated to the machine
                properties:
                  cpu:
                    description: CPU cores (e.g., "2", "4", "8")
                    type: string
                  ephemeralStorage:
                    default: 10Gi
                    description: EphemeralStorage for temporary files
                    type: string
                  gpu:
                    description: GPU count (optional, e.g., "1", "2")
                    type: string
                  memory:
                    description: Memory in Gi (e.g., "4Gi", "8Gi", "16Gi")
                    type: string
                  storage:
                    default: 50Gi
                    description: Storage for workspace (e.g., "50Gi", "100Gi")
                    type: string
                required:
                - cpu
                - memory
                - storage
                type: object
              conditions:
