services:
  k3s:
    image: rancher/k3s
    container_name: k3s-dev
    privileged: true
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - k3s-data:/var/lib/rancher/k3s
      - k3s-config:/etc/rancher/k3s
    ports:
      - "6443:6443"
      - "80:80"
      - "443:443"
    command:
      - server
      - --node-name
      - master
      - --disable
      - traefik
      - --disable-helm-controller
    mem_limit: 4GB
    cpus: 2

  k3s-setup:
    image: alpine:latest
    container_name: k3s-setup
    depends_on:
      - k3s
    volumes:
      - k3s-config:/kubeconfig
      - ./k3s-config:/output:Z
      - webhook-certs:/certs
      - ../manifests:/crds:Z
      - ./manifests:/bootstrap:Z
    command:
      - /bin/sh
      - -c
      - |
        echo "Installing kubectl and openssl..."
        apk add --no-cache curl openssl
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        mv kubectl /usr/local/bin/

        echo "Waiting for k3s to be ready..."
        # Create a modified kubeconfig that points to k3s-dev container
        cp /kubeconfig/k3s.yaml /tmp/k3s.yaml
        sed -i 's/127.0.0.1/k3s-dev/g' /tmp/k3s.yaml
        until kubectl --kubeconfig=/tmp/k3s.yaml get nodes 2>/dev/null; do sleep 2; done

        echo "Copying kubeconfig..."
        cp /kubeconfig/k3s.yaml /output/k3s.yaml
        chmod 644 /output/k3s.yaml

        # Check if certificate already exists
        if [ ! -f /certs/tls.crt ] || [ ! -f /certs/tls.key ]; then
          echo "Generating self-signed certificate..."
          mkdir -p /certs
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /certs/tls.key -out /certs/tls.crt \
            -subj "/C=US/ST=State/L=City/O=Kloudlite/CN=nginx.default.svc" \
            -addext "subjectAltName=DNS:nginx.default.svc,DNS:nginx.default.svc.cluster.local,DNS:localhost,DNS:*.localhost,IP:127.0.0.1"
        else
          echo "Certificate already exists, skipping generation"
        fi

        # Create/update TLS secret atomically
        echo "Creating TLS secret..."
        kubectl --kubeconfig=/tmp/k3s.yaml create secret tls webhook-server-cert \
          --cert=/certs/tls.crt --key=/certs/tls.key -n default \
          --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/k3s.yaml apply -f -

        # Get CA bundle for webhooks
        CA_BUNDLE=$(cat /certs/tls.crt | base64 | tr -d '\n')

        echo "Applying CRDs..."
        kubectl --kubeconfig=/tmp/k3s.yaml apply -f /crds/

        echo "Applying bootstrap manifests..."
        kubectl --kubeconfig=/tmp/k3s.yaml apply -f /bootstrap/

        echo "Configuring webhook configurations atomically..."
        # Create ValidatingWebhookConfiguration
        cat <<EOF | kubectl --kubeconfig=/tmp/k3s.yaml apply -f -
        apiVersion: admissionregistration.k8s.io/v1
        kind: ValidatingWebhookConfiguration
        metadata:
          name: kloudlite-validating-webhook
        webhooks:
        - name: users.platform.kloudlite.io
          clientConfig:
            service:
              name: nginx
              namespace: default
              path: /webhooks/validate/users
            caBundle: $${CA_BUNDLE}
          rules:
          - operations: ["CREATE", "UPDATE"]
            apiGroups: ["platform.kloudlite.io"]
            apiVersions: ["v1alpha1"]
            resources: ["users"]
          admissionReviewVersions: ["v1"]
          sideEffects: None
        - name: environments.environments.kloudlite.io
          clientConfig:
            service:
              name: nginx
              namespace: default
              path: /webhooks/validate/environments
            caBundle: $${CA_BUNDLE}
          rules:
          - operations: ["CREATE", "UPDATE"]
            apiGroups: ["environments.kloudlite.io"]
            apiVersions: ["v1"]
            resources: ["environments"]
          admissionReviewVersions: ["v1"]
          sideEffects: None
        - name: configmaps.core.envvars
          clientConfig:
            service:
              name: nginx
              namespace: default
              path: /webhooks/validate/configmaps
            caBundle: $${CA_BUNDLE}
          rules:
          - operations: ["CREATE", "UPDATE"]
            apiGroups: [""]
            apiVersions: ["v1"]
            resources: ["configmaps"]
          admissionReviewVersions: ["v1"]
          sideEffects: None
          namespaceSelector:
            matchExpressions:
            - key: kloudlite.io/environment
              operator: Exists
          objectSelector:
            matchLabels:
              kloudlite.io/config-type: "envvars"
        - name: secrets.core.envvars
          clientConfig:
            service:
              name: nginx
              namespace: default
              path: /webhooks/validate/secrets
            caBundle: $${CA_BUNDLE}
          rules:
          - operations: ["CREATE", "UPDATE"]
            apiGroups: [""]
            apiVersions: ["v1"]
            resources: ["secrets"]
          admissionReviewVersions: ["v1"]
          sideEffects: None
          namespaceSelector:
            matchExpressions:
            - key: kloudlite.io/environment
              operator: Exists
          objectSelector:
            matchLabels:
              kloudlite.io/config-type: "envvars"
        EOF

        # Create MutatingWebhookConfiguration
        cat <<EOF | kubectl --kubeconfig=/tmp/k3s.yaml apply -f -
        apiVersion: admissionregistration.k8s.io/v1
        kind: MutatingWebhookConfiguration
        metadata:
          name: kloudlite-mutating-webhook
        webhooks:
        - name: users.platform.kloudlite.io
          clientConfig:
            service:
              name: nginx
              namespace: default
              path: /webhooks/mutate/users
            caBundle: $${CA_BUNDLE}
          rules:
          - operations: ["CREATE", "UPDATE"]
            apiGroups: ["platform.kloudlite.io"]
            apiVersions: ["v1alpha1"]
            resources: ["users"]
          admissionReviewVersions: ["v1"]
          sideEffects: None
        - name: environments.environments.kloudlite.io
          clientConfig:
            service:
              name: nginx
              namespace: default
              path: /webhooks/mutate/environments
            caBundle: $${CA_BUNDLE}
          rules:
          - operations: ["CREATE", "UPDATE"]
            apiGroups: ["environments.kloudlite.io"]
            apiVersions: ["v1"]
            resources: ["environments"]
          admissionReviewVersions: ["v1"]
          sideEffects: None
        EOF

        echo "Setup complete!"
    restart: "no"

volumes:
  k3s-data:
  k3s-config:
  webhook-certs:
