---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: machinetypes.machines.kloudlite.io
spec:
  group: machines.kloudlite.io
  names:
    kind: MachineType
    listKind: MachineTypeList
    plural: machinetypes
    singular: machinetype
  scope: Cluster
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - displayName
            - category
            - resources
            properties:
              displayName:
                description: DisplayName is the human-friendly name shown to users
                type: string
              description:
                description: Description provides details about this machine type
                type: string
              category:
                description: Category groups machine types
                type: string
                enum:
                - general
                - compute-optimized
                - memory-optimized
                - gpu
                - development
                default: general
              resources:
                description: Resources defines the compute resources for this machine type
                type: object
                required:
                - cpu
                - memory
                properties:
                  cpu:
                    description: CPU cores (e.g., "2", "4", "8")
                    type: string
                  memory:
                    description: Memory in Gi (e.g., "4Gi", "8Gi", "16Gi")
                    type: string
                  gpu:
                    description: GPU count (optional, e.g., "1", "2")
                    type: string
              active:
                description: Active determines if this machine type can be selected by users
                type: boolean
                default: true
              priority:
                description: Priority for sorting in UI (lower numbers appear first)
                type: integer
                default: 100
              podLabels:
                description: Labels to apply to WorkMachine pods
                type: object
                additionalProperties:
                  type: string
              podAnnotations:
                description: Annotations to apply to WorkMachine pods
                type: object
                additionalProperties:
                  type: string
              nodeSelector:
                description: NodeSelector for pod scheduling
                type: object
                additionalProperties:
                  type: string
              tolerations:
                description: Tolerations for pod scheduling
                type: array
                items:
                  type: object
                  properties:
                    key:
                      description: Key is the taint key that the toleration applies to
                      type: string
                    operator:
                      description: Operator represents a key's relationship to the value
                      type: string
                      enum:
                      - Exists
                      - Equal
                    value:
                      description: Value is the taint value the toleration matches to
                      type: string
                    effect:
                      description: Effect indicates the taint effect to match
                      type: string
                      enum:
                      - NoSchedule
                      - PreferNoSchedule
                      - NoExecute
          status:
            type: object
            properties:
              inUseCount:
                description: InUseCount tracks how many WorkMachines are using this type
                type: integer
              lastUpdated:
                description: LastUpdated timestamp
                type: string
                format: date-time
              conditions:
                description: Conditions represent the latest available observations
                type: array
                items:
                  type: object
                  required:
                  - type
                  - status
                  properties:
                    type:
                      description: Type of condition
                      type: string
                    status:
                      description: Status of the condition (True, False, Unknown)
                      type: string
                    lastTransitionTime:
                      description: LastTransitionTime is the last time the condition changed
                      type: string
                      format: date-time
                    reason:
                      description: Reason is a unique, one-word, CamelCase reason
                      type: string
                    message:
                      description: Message is a human-readable message
                      type: string
    additionalPrinterColumns:
    - name: CPU
      type: string
      jsonPath: .spec.resources.cpu
    - name: Memory
      type: string
      jsonPath: .spec.resources.memory
    - name: GPU
      type: string
      jsonPath: .spec.resources.gpu
    - name: Active
      type: boolean
      jsonPath: .spec.active
    - name: Category
      type: string
      jsonPath: .spec.category
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
