                type: string
              lastDeactivatedTime:
                description: LastDeactivatedTime is the last time the environment
                  was deactivated
                format: date-time
                type: string
              message:
                description: Message provides human-readable information about the
                  current state
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation observed by the
                  controller
                format: int64
                type: integer
              resourceCount:
                description: ResourceCount tracks the number of resources in the namespace
                properties:
                  configmaps:
                    format: int32
                    type: integer
                  deployments:
                    format: int32
                    type: integer
                  pvcs:
                    format: int32
                    type: integer
                  secrets:
                    format: int32
                    type: integer
                  services:
                    format: int32
                    type: integer
                  statefulsets:
                    format: int32
                    type: integer
                type: object
              state:
                description: State represents the current state of the environment
                enum:
                - active
                - inactive
                - activating
                - deactivating
                - error
                type: string
            type: object
