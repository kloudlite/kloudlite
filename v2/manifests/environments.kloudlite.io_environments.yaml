                              port:
                                description: Port number
                                format: int32
                                type: integer
                              protocol:
                                description: Protocol (TCP or UDP)
                                enum:
                                - TCP
                                - UDP
                                type: string
                            type: object
                          type: array
                      type: object
                    type: array
                required:
                - enabled
                type: object
              resourceQuotas:
                description: ResourceQuotas defines resource quotas for the environment
