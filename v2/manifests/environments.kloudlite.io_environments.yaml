---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: environments.environments.kloudlite.io
spec:
  group: environments.kloudlite.io
  names:
    kind: Environment
    listKind: EnvironmentList
    plural: environments
    singular: environment
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetNamespace
      name: Namespace
      type: string
    - jsonPath: .spec.activated
      name: Activated
      type: boolean
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.lastActivatedTime
      name: Last Activated
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Environment represents a deployment environment with its own
          namespace
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EnvironmentSpec defines the desired state of Environment
            properties:
              activated:
                default: false
                description: |-
                  Activated determines whether the environment is active (true) or inactive (false)
                  When deactivated, all deployments and statefulsets are scaled to 0
                type: boolean
              annotations:
                additionalProperties:
                  type: string
                description: Annotations to apply to the namespace
                type: object
              createdBy:
                description: CreatedBy is the username/email of the user who created
                  this environment
                type: string
              labels:
                additionalProperties:
                  type: string
                description: Labels to apply to the namespace
                type: object
              networkPolicies:
                description: NetworkPolicies defines network policies for the environment
                properties:
                  allowedNamespaces:
