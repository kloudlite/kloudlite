version: '3'

vars:
  EXTENSION_NAME: kloudlite-workspace

tasks:
  bump-version:
    desc: Increment patch version in package.json
    cmds:
      - npm version patch --no-git-tag-version
    silent: true

  compile:
    desc: Compile TypeScript code
    cmds:
      - npm run compile

  package:
    desc: Package extension into VSIX file
    deps: [bump-version, compile]
    cmds:
      - rm -f *.vsix
      - npx @vscode/vsce package --allow-missing-repository

  check-installed:
    desc: Check if extension is installed and show version
    cmds:
      - |
        echo "Checking installed extensions..."
        code --list-extensions --show-versions | grep kloudlite || echo "Extension not installed"
    silent: false

  uninstall:
    desc: Uninstall the extension from VS Code
    deps: [check-installed]
    cmds:
      - code --uninstall-extension kloudlite.{{.EXTENSION_NAME}} || true
    silent: true

  install:
    desc: Install the extension to VS Code
    deps: [package]
    cmds:
      - code --install-extension *.vsix

  reinstall:
    desc: Uninstall old version, compile, package and install new version
    cmds:
      - task: uninstall
      - task: compile
      - task: package
      - task: install

  dev:
    desc: Quick reinstall for development (compile, package, install)
    cmds:
      - task: reinstall

  clean:
    desc: Remove built files and VSIX packages
    cmds:
      - rm -rf out/
      - rm -f *.vsix

  watch:
    desc: Watch for changes and compile
    cmds:
      - npm run watch

  lint:
    desc: Run ESLint
    cmds:
      - npm run lint

  test:
    desc: Run tests
    cmds:
      - npm test

  all:
    desc: Clean, reinstall and test
    cmds:
      - task: clean
      - task: reinstall
      - task: test
